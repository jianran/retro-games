function buyItem(name) {
  const nl = name.toLowerCase();
  let found = null;
  for (const [id, item] of Object.entries(DATA.shop_items)) {
    if (nl.includes(id) || item.name.toLowerCase().includes(nl)) { found = [id, item]; break; }
  }
  if (!found) { out('\x1b[31mItem not found. Type \'shop\'.\x1b[0m'); return; }
  const [iid, item] = found;
  var price = item.price * 3;
  if (player.points < price) { out('\x1b[31mNot enough points! '+escapeHtml(item.name)+' costs '+price+'. You have '+player.points+'.\x1b[0m'); return; }
  player.points -= price;
  player.inventory.push(iid);
  if (iid === 'shield') player.shield_uses = item.uses || 3;
  if (iid === 'armor') player.has_armor = true;
  save();
  out('\x1b[32mPurchased '+escapeHtml(item.name)+' for '+price+' pts!\x1b[0m');
}

function doAttack(targetName) {
  if (!targetName) { out('\x1b[31mUsage: attack &lt;player or NPC&gt;\x1b[0m'); return; }

  // Check if target is an NPC
  const npc = gameState.npcs ? gameState.npcs.find(n => n.name.toLowerCase() === targetName.toLowerCase()) : null;
  if (npc) {
    doAttackNpc(npc);
    return;
  }

  const target = gameState.players[targetName.toLowerCase()];
  if (!target) { out('\x1b[31mPlayer \''+escapeHtml(targetName)+'\' not found.\x1b[0m'); return; }
  if (target.name === player.name) { out('\x1b[31mCan\'t attack yourself!\x1b[0m'); return; }

  // Same-family check
  if (target.family === player.family) {
    out('\n<span class="same-family">⚠ !!SAME FAMILY!! ⚠</span>');
    return;
  }

  pendingPvpTarget = targetName;
  showWeaponPicker(pickWeaponForPvpTarget);
}

var activeNpcFight = null;
var pendingPvpTarget = null;

function pickWeaponForPvpTarget(wid) {
  if (!pendingPvpTarget) return;
  pickWeaponForPvp(pendingPvpTarget, wid);
  pendingPvpTarget = null;
}

function doAttackNpc(npc) {
  if (npc.family === player.family) {
    out('\n<span class="same-family">⚠ !!SAME FAMILY!! ⚠</span>');
    return;
  }
  if (npc.health <= 0) {
    out('\x1b[33m'+escapeHtml(npc.name)+' is already eliminated.\x1b[0m');
    return;
  }
  if (player.health <= 0) {
    out('\x1b[31mYou are eliminated! Cannot attack.\x1b[0m');
    return;
  }
  activeNpcFight = npc.name;
  showWeaponPicker(pickWeaponForActiveNpc);
}

function npcTurn(npc) {
  const npcWeapon = DATA.shop_items[npc.weapon_id] || {name:'fists',damage:0.5};
  // Bomb shield blocks bomb weapons
  if (player.inventory.includes('bomb_shield') && npcWeapon.name.toLowerCase().includes('bomb')) {
    out('\n\x1b[33m🛡 BOMB SHIELD absorbed '+escapeHtml(npc.name)+'\'s '+escapeHtml(npcWeapon.name)+'!\x1b[0m');
    updateStatus(); return;
  }
  let dmg = npcWeapon.damage;
  let blocked = 0;
  // Speed Boots: 25% dodge chance
  if (player.inventory.includes('speed_boots') && Math.random() < 0.25) {
    out('\n\x1b[36m👟 Speed Boots! You dodged the attack!\x1b[0m');
    updateStatus(); return;
  }
  if (player.has_armor) dmg = Math.max(0, dmg - 1);
  if (player.inventory.includes('reflective_armor')) dmg = Math.max(0, dmg - 3);
  if (player.shield_uses > 0 && dmg > 0) {
    blocked = Math.min(2, dmg);
    dmg -= blocked;
    player.shield_uses--;
    if (player.shield_uses <= 0) {
      const si = player.inventory.indexOf('shield');
      if (si >= 0) player.inventory.splice(si, 1);
    }
  }
  player.health = Math.round(Math.max(0, player.health - dmg) * 10) / 10;
  out('\n<span class="combat-anim">\x1b[1;31m◄ '+escapeHtml(npc.name)+'\'s TURN\x1b[0m');
  out('\x1b[31m'+escapeHtml(npc.name)+' strikes with '+escapeHtml(npcWeapon.name)+' for '+fmtHP(dmg)+' damage!\x1b[0m');
  if (blocked > 0) out('\x1b[33mYour defenses blocked '+blocked+' damage!\x1b[0m');
  out('\x1b[31mYour HP: '+fmtHP(player.health)+'/'+player.max_health+'</span>\x1b[0m');

  if (player.health <= 0) {
    out('\n<span class="kill-confirm">\x1b[1;31m💀 You were defeated by '+escapeHtml(npc.name)+'!\x1b[0m</span>');
    player.health = player.max_health;
    player.is_poisoned = false;
    player.kill_streak = 0;
    player.points = Math.max(0, player.points - 20);
    out('\x1b[31m📉 -20 pts penalty. Health restored. Kill streak reset.\x1b[0m');
    activeNpcFight = null;
  }
}

  for (const family of families) {

    const fc = family==='python'?'32':family==='rally'?'31':family==='cyber'?'36':'33';
    out('  '+familyEmblemSVG(family,16)+' \x1b['+fc+'m'+fam.name+'\x1b[0m');
    if (!gameState.npcs) continue;
    var html = '<div class="npc-cards">';
    for (const npc of gameState.npcs) {
      if (npc.family !== family) continue;
      const isSameFam = npc.family === (player ? player.family : '');
      const alive = npc.health > 0;
      const hpStr = fmtHP(npc.health)+'/'+npc.max_health+' HP';
      const weapon = DATA.shop_items[npc.weapon_id] || {name:'fists',damage:0.5};
      const loc = npc.location_index < DATA.locations.length ? DATA.locations[npc.location_index] : {name:'???'};
      const hpColor = alive ? 'green' : 'red';
      const hpDisplay = alive ? '<span class="'+hpColor+'">'+hpStr+'</span>' : '<span class="red">ELIMINATED</span>';
      const attackLabel = isSameFam ? 'SAME FAMILY' : '⚔ ATTACK';
      const clickHandler = isSameFam ? '' : 'onclick="doAttackNpcByName(\''+npc.name+'\')"';
      html += '<div class="npc-card-attack'+(isSameFam?' same-fam':'')+'" '+clickHandler+'>'+
        '<span class="npc-avatar '+npc.family+'">'+npc.name[0]+'</span>'+
        '<div class="nca-info"><div class="nca-name">'+escapeHtml(npc.name)+'</div><div class="nca-meta">'+hpDisplay+' | '+escapeHtml(weapon.name)+' ('+weapon.damage+') | Clue '+(npc.location_index+1)+'</div></div>'+
        '<span class="nca-attack-label">'+attackLabel+'</span></div>';
    }
    html += '</div>'; outHtml(html);
  }
  out('\x1b[2mTap an NPC to attack. Same-family NPCs are protected.\x1b[0m');
}

function doAttackNpcByName(name) {
  if (!player) return;

function send() {
  const text = input.value;
  if (!text.trim()) return;

  // Handle family choice
  if (familyChoiceCallback) {
    out('\x1b[1m> '+escapeHtml(text)+'\x1b[0m');
    if (familyChoiceCallback(text.trim())) {
      input.value = '';
      output.scrollTop = output.scrollHeight;
      return;
    }
  }

  // Display the command
  out('\x1b[1m> '+escapeHtml(text)+'\x1b[0m');
  handleCommand(text);
  input.value = '';
  output.scrollTop = output.scrollHeight;
  updateStatus();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); send(); }
});

    out('\x1b[31mPlease fill in Name, City, and Answer.\x1b[0m'); return;
  }

  var newClue = {
    id: 'custom_'+Date.now(),
    name: name,
    city: city,
    region: '🏰 CLUE MASTER CUSTOM',
    number: DATA.locations.length + 1,
    points: pts,
    mystery: 'A custom clue forged by '+player.name+' — '+gameState.ultimateMaster === player.name ? 'Ultimate Clue Master' : 'Clue Master'+' of House '+DATA.families[player.family].name+'.',
    stages: [{
      desc: 'You arrive at '+name+', '+city+'. The air is thick with mystery. What do you investigate?',
      triggers: ['examine area','search around','look closely','investigate '+name],
      success: 'You uncover the hidden secret of '+name+'! The answer becomes clear.',
      hint: 'The answer is: '+answer
    }],
    final_answer: answer,
    lore: 'Custom clue created by '+player.name+'.',

// ── AUTO-MODE: target fights back automatically ──
function autoRetaliate(target, attacker, attackerWeaponName, attackerDmg) {
  // Find target's best weapon
  var targetWeapons = (target.inventory||[]).filter(function(id){
    return DATA.shop_items[id] && DATA.shop_items[id].type === 'weapon';
  });
  if (targetWeapons.length === 0) return; // No weapons, can't fight back

  // Pick best by damage
  targetWeapons.sort(function(a,b){
    return (DATA.shop_items[b].damage||0) - (DATA.shop_items[a].damage||0);
  });
  var bestWid = targetWeapons[0];
  var bestW = DATA.shop_items[bestWid];
  var retalDmg = bestW.damage;

  // Apply target's wrappers
  var tWrId = (target.weapon_wrappers||{})[bestWid];
  if (tWrId) {
    var tWrDef = (DATA.shop_items[tWrId+'_wrapper']||{}).wrapper||{};
    if (tWrDef.bonusDmg) retalDmg += tWrDef.bonusDmg;
    if (tWrDef.multiplier) retalDmg = Math.round(retalDmg * tWrDef.multiplier);
    delete target.weapon_wrappers[bestWid];
  }

  // Apply attacker's defenses
  var retalBlocked = 0;
  if (attacker.has_armor) retalDmg = Math.max(0, retalDmg - 1);
  if (attacker.inventory.includes('reflective_armor')) retalDmg = Math.max(0, retalDmg - 3);
  if (attacker.shield_uses > 0 && retalDmg > 0) {
    retalBlocked = Math.min(2, retalDmg);
    retalDmg -= retalBlocked;
    attacker.shield_uses--;
    if (attacker.shield_uses <= 0) {
      var si = attacker.inventory.indexOf('shield');
      if (si >= 0) attacker.inventory.splice(si, 1);
    }
  }

  attacker.health = Math.round(Math.max(0, attacker.health - retalDmg) * 10) / 10;

  out('\n\x1b[1;36m🤖 AUTO-MODE: '+escapeHtml(target.name)+' counterattacks!\x1b[0m');
  out('\x1b[31m'+escapeHtml(target.name)+' strikes back with '+escapeHtml(bestW.name)+' for '+fmtHP(retalDmg)+' damage!\x1b[0m');
  if (retalBlocked > 0) out('\x1b[33mYour defenses blocked '+retalBlocked+' damage!\x1b[0m');
  out('\x1b[31mYour HP: '+fmtHP(attacker.health)+'/'+attacker.max_health+'\x1b[0m');

  // Log for the target (offline player) so they see what happened
  target.combat_log.push(
    '🤖 AUTO-MODE defended you! '+attacker.name+' of House '+DATA.families[attacker.family].name+' attacked with '+attackerWeaponName+' ('+fmtHP(attackerDmg)+' dmg). '+
    'You countered with '+bestW.name+' for '+fmtHP(retalDmg)+' damage! '+
    (attacker.health <= 0 ? '💀 You ELIMINATED '+attacker.name+'!' : 'They survived with '+fmtHP(attacker.health)+' HP.')
  );

  // Remove single-use weapon from target
  if (!bestW.reusable) {
    var twi = target.inventory.indexOf(bestWid);
    if (twi >= 0) target.inventory.splice(twi, 1);
  }

  // Check if attacker died from retaliation
  if (attacker.health <= 0) {
    out('\n\x1b[1;31m💀 '+escapeHtml(target.name)+'\'s AUTO-MODE defeated you!\x1b[0m');
    attacker.health = attacker.max_health;
    attacker.is_poisoned = false;
    attacker.kill_streak = 0;
    attacker.points = Math.max(0, attacker.points - 20);
    out('\x1b[31m-20 pts penalty. Health restored.\x1b[0m');
  }
}


// ── Two-way trade: swap items between players ──
function tradeItems(targetName, myItemName, theirItemName) {
  if (!player) return;
  var target = gameState.players[targetName.toLowerCase()];
  if (!target) { out('\x1b[31mPlayer \''+escapeHtml(targetName)+'\' not found.\x1b[0m'); return; }
  if (target.name === player.name) { out('\x1b[31mCan\'t trade with yourself.\x1b[0m'); return; }

  // Find MY item in my inventory
  var myNl = myItemName.toLowerCase().trim();
  var myIdx = -1, myId = null;
  for (var i = 0; i < player.inventory.length; i++) {
    var id = player.inventory[i];
    var item = DATA.shop_items[id] || {name:id};
    if (myNl.includes(id.toLowerCase()) || item.name.toLowerCase().includes(myNl)) { myIdx = i; myId = id; break; }
  }
  if (myIdx < 0) { out('\x1b[31mYou don\'t have \''+escapeHtml(myItemName)+'\'. Check \'inv\'.\x1b[0m'); return; }

  // Find THEIR item in target's inventory
  var theirNl = theirItemName.toLowerCase().trim();
  var theirIdx = -1, theirId = null;
  for (var i = 0; i < target.inventory.length; i++) {
    var id = target.inventory[i];
    var item = DATA.shop_items[id] || {name:id};
    if (theirNl.includes(id.toLowerCase()) || item.name.toLowerCase().includes(theirNl)) { theirIdx = i; theirId = id; break; }
  }
  if (theirIdx < 0) { out('\x1b[31m'+escapeHtml(target.name)+' doesn\'t have \''+escapeHtml(theirItemName)+'\'.\x1b[0m'); return; }

  // Execute the swap
  var myItem = DATA.shop_items[myId] || {name:myId};
  var theirItem = DATA.shop_items[theirId] || {name:theirId};

  player.inventory.splice(myIdx, 1);
  target.inventory.splice(theirIdx, 1);
  player.inventory.push(theirId);
  target.inventory.push(myId);

  // Transfer wrappers if any
  if (player.weapon_wrappers && player.weapon_wrappers[myId]) {
    if (!target.weapon_wrappers) target.weapon_wrappers = {};
    target.weapon_wrappers[myId] = player.weapon_wrappers[myId];
    delete player.weapon_wrappers[myId];
  }
  if (target.weapon_wrappers && target.weapon_wrappers[theirId]) {
    if (!player.weapon_wrappers) player.weapon_wrappers = {};
    player.weapon_wrappers[theirId] = target.weapon_wrappers[theirId];
    delete target.weapon_wrappers[theirId];
  }

  save();

  // Show trade result
  out('\n\x1b[1;33m🤝 TRADE COMPLETE!\x1b[0m');
  out('\x1b[32mYou gave: '+escapeHtml(myItem.name)+' → '+escapeHtml(target.name)+'\x1b[0m');
  out('\x1b[32mYou received: '+escapeHtml(theirItem.name)+' ← '+escapeHtml(target.name)+'\x1b[0m');

  // Log to target
  target.combat_log.push(
    '🤝 '+player.name+' of House '+DATA.families[player.family].name+' traded you: gave '+escapeHtml(theirItem.name)+' ← received '+escapeHtml(myItem.name)
  );

  // Show what each gained
  if (myItem.type === 'weapon' && theirItem.type === 'weapon') {
    out('\x1b[2mWeapon swap: '+myItem.damage+'dmg ↔ '+theirItem.damage+'dmg\x1b[0m');
  }
}

var milestoneBosses = {
  10:  {name:'THE SENTINEL',      emoji:'🗿', damage:5,  maxHealth:30,  level:2},
  20:  {name:'SHADOW PHOENIX',    emoji:'🦅', damage:8,  maxHealth:50,  level:3},
  30:  {name:'IRON COLOSSUS',     emoji:'🤖', damage:10, maxHealth:70,  level:4},
  40:  {name:'VOID WALKER',       emoji:'👻', damage:12, maxHealth:90,  level:5},
  50:  {name:'DRAGON LORD',       emoji:'🐉', damage:15, maxHealth:120, level:6},
  60:  {name:'TITAN SLAYER',      emoji:'⚡', damage:18, maxHealth:150, level:7},
  70:  {name:'DEATH WHISPER',     emoji:'☠', damage:22, maxHealth:190, level:8},
  80:  {name:'CHAOS BRINGER',     emoji:'🌀', damage:28, maxHealth:240, level:9},
  90:  {name:'APEX PREDATOR',     emoji:'👾', damage:35, maxHealth:300, level:10},
  100: {name:'BOSS GAUNTLET',      emoji:'👑', damage:0, maxHealth:1, level:99, isGauntlet:true},
};

function checkMilestoneBoss() {
  if (!player) return;
  var clueNum = player.current_location_index + 1;
  if (milestoneBosses[clueNum] && !player.solved_locations.includes(DATA.locations[player.current_location_index]?.id)) {
    var bossDef = milestoneBosses[clueNum];

    if (bossDef.isGauntlet) {
      // Level 100: GAUNTLET — all previous bosses in sequence
      if (!player._gauntletQueue) player._gauntletQueue = [];
      player._gauntletQueue = [10,20,30,40,50,60,70,80,90];
      player._gauntletIndex = 0;
      player._gauntletHP = player.health; // save starting HP for summary
      spawnNextGauntletBoss();
      return;
    }

    currentBoss = {
      name: bossDef.name,
      damage: bossDef.damage,
      health: bossDef.maxHealth,
      maxHealth: bossDef.maxHealth,
      level: bossDef.level,
      emoji: bossDef.emoji
    };
    out('\n\x1b[1;35m══════════════════════════════════════\x1b[0m');
    out('\x1b[1;35m  '+bossDef.emoji+' MILESTONE BOSS: '+bossDef.name+' '+bossDef.emoji+'\x1b[0m');
    out('\x1b[1;35m  Clue '+clueNum+' • Level '+bossDef.level+' • '+bossDef.maxHealth+' HP • '+bossDef.damage+' dmg\x1b[0m');
    out('\x1b[1;35m  Type \'attack boss\' to fight!\x1b[0m');
    out('\x1b[1;35m══════════════════════════════════════\x1b[0m');
    out('\x1b[2mYou must defeat this boss before solving this clue.\x1b[0m');
  }
}

// ── GAUNTLET: spawn next boss in sequence ──
function spawnNextGauntletBoss() {
  if (!player || !player._gauntletQueue) return;
  if (player._gauntletIndex >= player._gauntletQueue.length) {
    // ALL BOSSES DEFEATED!
    var startHP = player._gauntletHP || 10;
    var endHP = player.health;
    out('\n\x1b[1;33m══════════════════════════════════════\x1b[0m');
    out('\x1b[1;33m  👑 BOSS GAUNTLET — COMPLETE! 👑\x1b[0m');
    out('\x1b[1;33m  All 9 milestone bosses DEFEATED!\x1b[0m');
    out('\x1b[1;33m  HP: '+fmtHP(startHP)+' → '+fmtHP(endHP)+'\x1b[0m');
    out('\x1b[1;33m══════════════════════════════════════\x1b[0m');
    currentBoss = null;
    player._gauntletQueue = null;
    player._gauntletIndex = 0;
    addToFeed('👑 '+player.name+' CONQUERED THE BOSS GAUNTLET!', 'boss');
    checkAchievements();
    save();
    // Now they can solve the clue
    out('\x1b[32mThe path to Clue 100 is clear! Type the final answer.\x1b[0m');
    return;
  }

  var bossClue = player._gauntletQueue[player._gauntletIndex];
  var bossDef = milestoneBosses[bossClue];
  currentBoss = {
    name: bossDef.name,
    damage: bossDef.damage,
    health: bossDef.maxHealth,
    maxHealth: bossDef.maxHealth,
    level: bossDef.level,
    emoji: bossDef.emoji,
    isGauntletBoss: true
  };

  out('\n\x1b[1;35m══════════════════════════════════════\x1b[0m');
  out('\x1b[1;33m  👑 BOSS GAUNTLET ['+(player._gauntletIndex+1)+'/9] 👑\x1b[0m');
  out('\x1b[1;35m  '+bossDef.emoji+' '+bossDef.name+' '+bossDef.emoji+'\x1b[0m');
  out('\x1b[1;35m  Level '+bossDef.level+' • '+bossDef.maxHealth+' HP • '+bossDef.damage+' dmg\x1b[0m');
  out('\x1b[1;35m  Type \'attack boss\' to fight!\x1b[0m');
  out('\x1b[1;35m══════════════════════════════════════\x1b[0m');
  out('\x1b[2mYour HP: '+fmtHP(player.health)+'/'+player.max_health+' — survive all 9!\x1b[0m');
}

// Override boss defeat to advance gauntlet
var originalBossDefeat = pickWeaponForBoss;
pickWeaponForBoss = function(wid) {
  originalBossDefeat(wid);
  if (currentBoss && currentBoss.health <= 0) {
    if (currentBoss.isGauntletBoss) {
      // Move to next gauntlet boss
      player._gauntletIndex++;
      out('\n\x1b[1;32m💀 '+currentBoss.name+' defeated! ('+player._gauntletIndex+'/9 down)\x1b[0m');
      spawnNextGauntletBoss();
      save();
    } else {
      var bossMsg = player.name+' slayed '+currentBoss.name+'!';
      addToFeed(bossMsg, 'boss');
      checkAchievements();
    }
  }
};

// Also override bossTurn to handle gauntlet counter-attacks
var originalBossTurn = bossTurn;
bossTurn = function() {
  if (currentBoss && currentBoss.isGauntletBoss && player.health <= 0) {
    // Player died during gauntlet
    out('\n\x1b[1;31m💀 You fell during the Boss Gauntlet!\x1b[0m');
    out('\x1b[31m'+player._gauntletIndex+'/9 bosses defeated before falling.\x1b[0m');
    player.health = player.max_health;
    player.is_poisoned = false;
    player.points = Math.max(0, player.points - 30);
    player._gauntletQueue = null;
    player._gauntletIndex = 0;
    currentBoss = null;
    save();
    out('\x1b[31m-30 pts. Health restored. The gauntlet resets — try again!\x1b[0m');
    return;
  }
  originalBossTurn();
};

// Override solveLocation to check for milestone boss first
var originalSolveLocation = solveLocation;
solveLocation = function(loc) {
  // Check if there's a milestone boss first
  if (currentBoss) {
    out('\x1b[31m⚠ You must defeat '+currentBoss.name+' first! Type \'attack boss\'.\x1b[0m');
    return;
  }
  // Check achievements after solve
  originalSolveLocation(loc);
  checkAchievements();
  // Check next clue for milestone boss
  setTimeout(checkMilestoneBoss, 500);
};

function quickEquip() {
  if (!player) return;
  var weapons = player.inventory.filter(function(id){ return DATA.shop_items[id] && DATA.shop_items[id].type === 'weapon'; });
  if (weapons.length === 0) { out('\x1b[31mNo weapons! Buy one at the shop.\x1b[0m'); return; }
  weapons.sort(function(a,b){ return (DATA.shop_items[b].damage||0) - (DATA.shop_items[a].damage||0); });
  var best = weapons[0];
  var w = DATA.shop_items[best];
  out('\n\x1b[1;33m⚡ QUICK-EQUIP\x1b[0m');
  out('\x1b[32mBest weapon ready: '+escapeHtml(w.name)+' ('+w.damage+' dmg '+w.tier+')\x1b[0m');
  out('\x1b[2mType \'attack <target>\' — this weapon will be first pick.\x1b[0m');
}

// ═══════════════════════════════════════════
// Wire kill feed into existing actions
// ═══════════════════════════════════════════
var originalPickWeaponForNpc = pickWeaponForNpc;
pickWeaponForNpc = function(npc, wid) {
  originalPickWeaponForNpc(npc, wid);
  if (npc.health <= 0) {
    addToFeed(player.name+' defeated '+npc.name+' of '+DATA.families[npc.family].name, 'kill');
    checkAchievements();
  }
};

var originalPickWeaponForPvp = pickWeaponForPvp;
pickWeaponForPvp = function(targetName, wid) {
  originalPickWeaponForPvp(targetName, wid);
  var target = gameState.players[targetName.toLowerCase()];
  if (target && target.health <= 0) {
    addToFeed(player.name+' eliminated '+target.name+'!', 'kill');
    checkAchievements();
  }
};

var originalPickWeaponForBoss = pickWeaponForBoss;
pickWeaponForBoss = function(wid) {
  originalPickWeaponForBoss(wid);
  if (currentBoss && currentBoss.health <= 0) {
    var bossMsg = player.name+' slayed '+currentBoss.name+'!';
    if (currentBoss.level === 99) {
      bossMsg = '👑 '+player.name+' DEFEATED THE ULTIMATE CLUE MASTER '+currentBoss.name+'!!';
      out('\n\x1b[1;33m🏆 LEGENDARY ACHIEVEMENT: You defeated the Ultimate Clue Master!\x1b[0m');
      out('\x1b[1;33mYou are worthy of the throne...\x1b[0m');
    }
    addToFeed(bossMsg, 'boss');
    checkAchievements();
  }
};

// Override tradeItems for feed
var originalTradeItems = tradeItems;
tradeItems = function(targetName, myItem, theirItem) {
  originalTradeItems(targetName, myItem, theirItem);
  addToFeed(player.name+' traded with '+targetName, 'trade');
};

// Initialize feed on load
setTimeout(function(){ renderFeed(); }, 1000);


// ── SELL ITEMS for points ──
function sellItem(name) {
  if (!player) return;
  var nl = name.toLowerCase().trim();
  var foundIdx = -1, foundId = null;
  for (var i = 0; i < player.inventory.length; i++) {
    var id = player.inventory[i];
    var item = DATA.shop_items[id] || {name:id};
    if (nl.includes(id.toLowerCase()) || item.name.toLowerCase().includes(nl)) { foundIdx = i; foundId = id; break; }
  }
  if (foundIdx < 0) { out('\x1b[31mYou don\'t have \''+escapeHtml(name)+'\'. Check \'inv\'.\x1b[0m'); return; }

  var item = DATA.shop_items[foundId] || {name:foundId, type:'unknown', price:5};
  var sellPrice = 0;

  if (item.type === 'weapon') {
    sellPrice = Math.ceil(item.price * 1.5); // 50% of 3x buy price
  } else if (item.type === 'tool' || item.type === 'defense') {
    sellPrice = Math.ceil(item.price * 1.5);
  } else {
    sellPrice = 5; // unknown items
  }

  // Handle artifact selling
  var artifactNames = {python_egg:'🥚 Python Egg', rally_crystal:'🔮 Rally Fire Crystal', cyber_laptop:'💻 Super Cyber Laptop', encyclopedia_book:'📖 Super Encyclopedia'};
  var artifactPrices = {python_egg:500, rally_crystal:500, cyber_laptop:500, encyclopedia_book:500};

  if (artifactNames[foundId]) {
    sellPrice = artifactPrices[foundId] || 500;
    // Remove from artifacts list
    if (player.artifacts) {
      var ai = player.artifacts.indexOf(foundId);
      if (ai >= 0) player.artifacts.splice(ai, 1);
    }
    player.inventory.splice(foundIdx, 1);
    player.points += sellPrice;
    save();
    out('\n\x1b[1;33m💰 SOLD: '+artifactNames[foundId]+' for '+sellPrice+' pts!\x1b[0m');
    out('\x1b[2mArtifacts remaining: '+(player.artifacts?player.artifacts.length:0)+'/4\x1b[0m');
    out('\x1b[2mCurrent points: '+player.points+'\x1b[0m');
    return;
  }

  // Remove wrapper if attached
  if (player.weapon_wrappers && player.weapon_wrappers[foundId]) {
    delete player.weapon_wrappers[foundId];
  }

  // Remove shield/armor effects
  if (foundId === 'shield') { player.shield_uses = 0; }
  if (foundId === 'armor') { player.has_armor = false; }

  player.inventory.splice(foundIdx, 1);
  player.points += sellPrice;
  save();

  var ico = item.type==='weapon'?'⚔':item.type==='defense'?'🛡':'🛠';
  out('\n\x1b[1;33m💰 SOLD: '+ico+' '+escapeHtml(item.name)+' for '+sellPrice+' pts!\x1b[0m');
  if (item.type === 'weapon') {
    out('\x1b[2mBuy price was '+(item.price*3)+' — sold at 50%\x1b[0m');
  }
  out('\x1b[2mCurrent points: '+player.points+'\x1b[0m');

  // If they sold their last weapon, warn them
  var remainingWeapons = player.inventory.filter(function(id){ return DATA.shop_items[id] && DATA.shop_items[id].type === 'weapon'; });
  if (remainingWeapons.length === 0 && item.type === 'weapon') {
    out('\x1b[1;31m⚠ You now have NO weapons! Type \'shop\' to buy one.\x1b[0m');
  }
}
