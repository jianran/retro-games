<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Clue Hunt</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#c0c0c0; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

/* ── Header ── */
#game-header { background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%); border-bottom:1px solid #222; padding:14px 16px; text-align:center; }
#game-header h1 {
  font-family:Georgia,'Times New Roman',serif;
  font-size:32px; font-weight:900;
  background:linear-gradient(135deg, #00ff88 0%, #ffe600 20%, #ff6b00 40%, #ff0044 60%, #cc00ff 80%, #00e5ff 100%);
  background-size:300% 300%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:6px; margin:0;
  animation: titleShimmer 4s ease-in-out infinite;
  text-shadow:none;
  filter:drop-shadow(0 0 12px rgba(255,255,255,0.15)) drop-shadow(0 0 25px rgba(100,200,255,0.1));
  position:relative;
}
@keyframes titleShimmer {
  0%,100% { background-position:0% 50%; filter:drop-shadow(0 0 12px rgba(255,255,255,0.15)) drop-shadow(0 0 25px rgba(100,200,255,0.1)); }
  25% { background-position:100% 0%; filter:drop-shadow(0 0 18px rgba(255,200,0,0.25)) drop-shadow(0 0 35px rgba(255,100,0,0.15)); }
  50% { background-position:100% 100%; filter:drop-shadow(0 0 20px rgba(255,0,100,0.3)) drop-shadow(0 0 40px rgba(200,0,255,0.2)); }
  75% { background-position:0% 100%; filter:drop-shadow(0 0 18px rgba(0,200,255,0.25)) drop-shadow(0 0 35px rgba(0,255,200,0.15)); }
}
#game-header h1::after {
  content:'CLUE HUNT';
  position:absolute; left:0; top:0; width:100%; text-align:center;
  background:linear-gradient(180deg, transparent 60%, rgba(255,255,255,0.08) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  pointer-events:none;
}
#game-header .subtitle { color:#555; font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-top:2px; }

/* ── Status bar ── */
#status { background:#0d0d0d; color:#aaa; padding:8px 16px; font-size:12px; border-bottom:1px solid #1a1a1a; font-family:'Segoe UI',system-ui,sans-serif; display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-height:36px; }
#status .stat-pill { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; background:rgba(255,255,255,0.04); border-radius:12px; font-size:11px; white-space:nowrap; }
#status .stat-pill.danger { background:rgba(255,0,0,0.1); color:#f66; }
#status .stat-pill.warn { background:rgba(255,255,0,0.08); color:#ff0; }
#status .stat-pill.boost { background:rgba(0,255,0,0.08); color:#0f0; }
#status .family-badge { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; font-size:11px; font-weight:bold; flex-shrink:0; }
.family-badge.python { background:#0f0; color:#000; }
.family-badge.rally { background:#f44; color:#000; }
.family-badge.cyber { background:#0ff; color:#000; }
.family-badge.encyclopedia { background:#ff0; color:#000; }

/* ── Output area ── */
#output { flex:1; overflow-y:auto; padding:16px; font-family:'Cascadia Code','Fira Code',Consolas,monospace; font-size:13px; line-height:1.55; white-space:pre-wrap; word-break:break-word; background:radial-gradient(ellipse at top, #0d0d0d 0%, #0a0a0a 100%); scroll-behavior:smooth; }

/* ── Input area ── */
#input-area { display:flex; padding:10px 16px; background:linear-gradient(0deg, #080808, #111); border-top:1px solid #1a1a1a; gap:8px; }
#input { flex:1; background:#0a0a0a; color:#0f0; border:1px solid #2a2a2a; padding:12px 16px; font-family:'Cascadia Code','Fira Code',Consolas,monospace; font-size:15px; outline:none; border-radius:8px; transition:border-color 0.2s; }
#input:focus { border-color:#0f0; box-shadow:0 0 8px rgba(0,255,0,0.1); }
#send { background:linear-gradient(180deg, #0c0, #090); color:#000; border:none; padding:10px 20px; font-weight:bold; font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; border-radius:8px; cursor:pointer; transition:all 0.15s; }
#send:hover { background:linear-gradient(180deg, #0e0, #0a0); }
#send:active { transform:scale(0.96); }

/* ── Color classes (replacing ANSI codes) ── */
.green { color:#0f0; }
.red { color:#f44; }
.yellow { color:#ff0; }
.cyan { color:#0ff; }
.magenta { color:#f0f; }
.dim { color:#666; }
.bold { font-weight:bold; }
.white { color:#fff; }
.python { color:#0f0; }
.rally { color:#f44; }
.cyber { color:#0ff; }
.encyclopedia { color:#ff0; }

/* ── Location image cards (CSS gradients by region) ── */
.location-card { margin:8px 0 14px 0; border-radius:10px; overflow:hidden; border:1px solid #1a1a1a; position:relative; height:180px; }
.location-card .lc-img { width:100%; height:100%; position:relative; }
.location-card .lc-label { position:absolute; bottom:10px; left:10px; right:10px; background:rgba(0,0,0,0.75); color:#fff; padding:6px 10px; border-radius:6px; font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; font-weight:600; }
/* Region gradient patterns */
.region-NAMERICA { background:linear-gradient(180deg, #1a1a3e 0%, #2d2d6e 30%, #1a2a1a 60%, #2d4d2d 100%); }
.region-SAMERICA { background:linear-gradient(180deg, #3e1a1a 0%, #6e2d2d 30%, #1a3a1a 60%, #2d6e2d 100%); }
.region-WEUROPE { background:linear-gradient(180deg, #1a1a2e 0%, #3d3d6e 30%, #2e2e4e 60%, #4d4d7e 100%); }
.region-EEUROPE { background:linear-gradient(180deg, #2e1a1a 0%, #4e3d3d 30%, #3e2e2e 60%, #5e4d4d 100%); }
.region-ASIA { background:linear-gradient(180deg, #1a2e1a 0%, #3d6e3d 30%, #2e2e1a 60%, #6e6e3d 100%); }
.region-AFRICA { background:linear-gradient(180deg, #3e2e1a 0%, #6e4d2d 30%, #2e1a1a 60%, #4d2d2d 100%); }
.region-MIDEAST { background:linear-gradient(180deg, #3e3a1a 0%, #6e6d2d 30%, #3a2e1a 60%, #6d5d2d 100%); }
.region-OCEANIA { background:linear-gradient(180deg, #1a2e3e 0%, #2d4d6e 30%, #1a3a2e 60%, #2d6e4d 100%); }
.region-ANTARCTICA { background:linear-gradient(180deg, #ddeeff 0%, #aaccff 30%, #ffffff 60%, #bbddff 100%); }
.region-ANTARCTICA .lc-label { color:#000; background:rgba(255,255,255,0.75); }

/* Region accent shapes (CSS pseudo-elements) */
.location-card .lc-img::before {
  content:''; position:absolute; top:15%; left:10%; width:60px; height:60px;
  border-radius:50%; background:rgba(255,255,255,0.03);
  box-shadow: 80px -20px 0 rgba(255,255,255,0.04), 30px 40px 0 rgba(255,255,255,0.02), -20px 30px 0 rgba(255,255,255,0.03);
}
.location-card .lc-photo { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transition:opacity 0.6s ease-in; z-index:0; }
.location-card .lc-label { z-index:1; }
.location-card .lc-img::after {
  content:''; position:absolute; bottom:20%; right:15%; width:40px; height:40px;
  border:2px solid rgba(255,255,255,0.04); border-radius:50%;
}

/* ── NPC avatars ── */
.npc-card { display:inline-flex; align-items:center; gap:8px; margin:2px 0; padding:4px 8px; background:rgba(255,255,255,0.02); border-radius:6px; border:1px solid rgba(255,255,255,0.04); }
.npc-avatar { width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; flex-shrink:0; font-family:'Segoe UI',system-ui,sans-serif; }
.npc-avatar.python { background:#0a0; color:#000; }
.npc-avatar.rally { background:#c22; color:#000; }
.npc-avatar.cyber { background:#088; color:#000; }
.npc-avatar.encyclopedia { background:#880; color:#000; }

/* ── Family emblem SVGs ── */
.family-emblem { display:inline-block; width:40px; height:40px; vertical-align:middle; margin-right:8px; }
.family-emblem-sm { width:24px; height:24px; }

/* ── Item cards (shop/inventory) ── */
.item-card { display:inline-block; margin:3px 6px 3px 0; padding:6px 12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:8px; font-size:13px; }
.item-card.weapon { border-left:3px solid #f44; }
.item-card.tool { border-left:3px solid #0ff; }
.item-card.defense { border-left:3px solid #0f0; }

/* ── Animations ── */
@keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
@keyframes glowPulse { 0%,100% { box-shadow:0 0 4px rgba(0,255,0,0.2); } 50% { box-shadow:0 0 16px rgba(0,255,0,0.5); } }
@keyframes shake { 0%,100% { transform:translateX(0); } 20% { transform:translateX(-4px); } 40% { transform:translateX(4px); } 60% { transform:translateX(-3px); } 80% { transform:translateX(3px); } }
@keyframes celebrateGlow { 0% { text-shadow:0 0 4px #0f0; } 50% { text-shadow:0 0 20px #0f0, 0 0 40px #0f0; } 100% { text-shadow:0 0 4px #0f0; } }
.combat-anim { animation:slideIn 0.3s ease-out; }
.solve-anim { animation:celebrateGlow 0.8s ease-in-out 3; }
.same-family { animation:shake 0.4s ease-in-out; color:#f44; font-weight:bold; }
.crit-hit { animation:glowPulse 0.6s ease-in-out 2; color:#f44; font-weight:bold; text-shadow:0 0 8px rgba(255,0,0,0.6); }
.kill-confirm { animation:celebrateGlow 0.5s ease-in-out 2; }
@keyframes hpDrain { from { color:#f44; } to { color:inherit; } }
@keyframes flyToChar {
  0% { opacity:1; transform:scale(1); }
  30% { opacity:1; transform:scale(1.3); }
  100% { opacity:0; transform:scale(0.3) translate(var(--fly-x), var(--fly-y)); }
}
.fly-item { position:fixed; z-index:999; pointer-events:none; font-weight:bold; font-size:14px; font-family:'Segoe UI',system-ui,sans-serif; color:#0f0; text-shadow:0 0 8px rgba(0,255,0,0.6); animation:flyToChar 0.7s ease-in forwards; white-space:nowrap; }

/* ── Quick-action bar ── */
#action-bar { display:flex; gap:4px; padding:6px 8px; background:#0b0b0b; border-bottom:1px solid #1a1a1a; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.action-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 10px; background:transparent; border:1px solid transparent; border-radius:8px; cursor:pointer; color:#888; font-family:'Segoe UI',system-ui,sans-serif; font-size:10px; white-space:nowrap; transition:all 0.15s; min-width:48px; }
.action-btn:hover { background:rgba(255,255,255,0.04); color:#ccc; border-color:rgba(255,255,255,0.1); }
.action-btn:active { background:rgba(0,255,0,0.08); border-color:#0f0; transform:scale(0.94); }
.ab-ico { font-size:18px; }
.ab-label { font-size:9px; font-weight:500; letter-spacing:0.5px; text-transform:uppercase; }
@media (max-width:600px) {
  #action-bar { gap:2px; padding:4px; }
  .action-btn { padding:5px 6px; min-width:38px; }
  .ab-ico { font-size:16px; }
  .ab-label { font-size:8px; }
}
@media (min-width:768px) {
  .shop-card, .inv-card { flex:1 1 calc(33% - 6px); }
}

/* ── Character design ── */
.char-start-btn { padding:14px 36px; background:linear-gradient(180deg,#0a0,#070); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; font-family:'Segoe UI',system-ui,sans-serif; letter-spacing:1px; transition:all 0.15s; }
.char-start-btn:hover { background:linear-gradient(180deg,#0c0,#090); box-shadow:0 0 20px rgba(0,255,0,0.2); transform:translateY(-1px); }
.char-skip-btn { padding:14px 24px; background:transparent; color:#888; border:1px solid #444; border-radius:10px; font-size:14px; cursor:pointer; font-family:'Segoe UI',system-ui,sans-serif; transition:all 0.15s; }
.char-skip-btn:hover { color:#ccc; border-color:#888; }
.color-dot { width:24px; height:24px; border-radius:50%; border:2px solid #555; cursor:pointer; padding:0; }
.color-dot:hover { border-color:#fff; transform:scale(1.2); }

/* ── Family choice cards ── */
.family-cards { display:flex; flex-wrap:wrap; gap:10px; margin:10px 0; }
.family-card { flex:1 1 calc(50% - 5px); min-width:150px; padding:16px; border-radius:12px; border:2px solid rgba(255,255,255,0.1); cursor:pointer; text-align:center; transition:all 0.2s; font-family:'Segoe UI',system-ui,sans-serif; background:rgba(255,255,255,0.02); }
.family-card:hover { transform:translateY(-2px); }
.family-card:active { transform:scale(0.96); }
.family-card.python:hover, .family-card.python:active { border-color:#0f0; background:rgba(0,255,0,0.06); box-shadow:0 0 20px rgba(0,255,0,0.1); }
.family-card.rally:hover, .family-card.rally:active { border-color:#f44; background:rgba(255,0,0,0.06); box-shadow:0 0 20px rgba(255,0,0,0.1); }
.family-card.cyber:hover, .family-card.cyber:active { border-color:#0ff; background:rgba(0,255,255,0.06); box-shadow:0 0 20px rgba(0,255,255,0.1); }
.family-card.encyclopedia:hover, .family-card.encyclopedia:active { border-color:#ff0; background:rgba(255,255,0,0.06); box-shadow:0 0 20px rgba(255,255,0,0.1); }
.family-card .fc-emoji { font-size:40px; display:block; margin-bottom:8px; }
.family-card .fc-name { font-size:18px; font-weight:700; margin-bottom:4px; }
.family-card .fc-trait { font-size:11px; color:#888; line-height:1.3; }
.family-card .fc-key { display:inline-block; margin-top:6px; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; }
.fc-key.python { background:#0a0; color:#000; }
.fc-key.rally { background:#c22; color:#000; }
.fc-key.cyber { background:#088; color:#000; }
.fc-key.encyclopedia { background:#880; color:#000; }

/* ── Shop / Inventory cards ── */
.item-cards { display:flex; flex-wrap:wrap; gap:8px; margin:6px 0; }
.shop-card, .inv-card { display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); border-radius:10px; font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; min-width:200px; flex:1 1 calc(50% - 4px); transition: all 0.2s; }
.shop-card:hover { border-color:rgba(255,255,255,0.15); background:rgba(255,255,255,0.03); }
.shop-card { cursor:default; }
.shop-card .sc-buy, .inv-card .ic-use { padding:8px 16px; border-radius:8px; border:none; font-weight:700; font-size:12px; cursor:pointer; font-family:'Segoe UI',system-ui,sans-serif; transition:all 0.15s; white-space:nowrap; }
.sc-buy { background:linear-gradient(180deg,#0a0,#070); color:#fff; }
.sc-buy:hover { background:linear-gradient(180deg,#0c0,#090); box-shadow:0 0 12px rgba(0,255,0,0.2); transform:translateY(-1px); }
.sc-buy:active { transform:scale(0.93); }
.sc-buy.owned { background:transparent; color:#555; border:1px solid #2a2a2a; cursor:default; }
.sc-buy.owned:hover { background:transparent; box-shadow:none; transform:none; }
.ic-use { background:linear-gradient(180deg,#08a,#068); color:#fff; }
.ic-use:hover { background:linear-gradient(180deg,#0af,#08a); box-shadow:0 0 12px rgba(0,136,255,0.2); transform:translateY(-1px); }
.ic-use:active { transform:scale(0.93); }
.ic-use { background:#08a; color:#fff; }
.ic-use:hover { background:#0af; }
.ic-use:active { transform:scale(0.93); }
.shop-card .sc-info, .inv-card .ic-info { flex:1; min-width:0; }
.shop-card .sc-name, .inv-card .ic-name { font-weight:600; margin-bottom:2px; }
.shop-card .sc-meta, .inv-card .ic-meta { font-size:11px; color:#888; }

/* ── NPC attack cards ── */
.npc-cards { display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 8px 0; }
.npc-card-attack { display:flex; align-items:center; gap:8px; padding:8px 12px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.08); border-radius:10px; cursor:pointer; font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; transition:all 0.15s; flex:1 1 calc(50% - 3px); min-width:180px; }
.npc-card-attack:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.15); }
.npc-card-attack:active { transform:scale(0.96); }
.npc-card-attack.same-fam { opacity:0.4; cursor:not-allowed; border-color:rgba(255,0,0,0.2); }
.npc-card-attack.same-fam:hover { background:rgba(255,255,255,0.02); }
.npc-card-attack.same-fam:active { transform:none; }
.npc-card-attack .nca-info { flex:1; min-width:0; }
.npc-card-attack .nca-name { font-weight:600; }
.npc-card-attack .nca-meta { font-size:10px; color:#888; }
.npc-card-attack .nca-attack-label { font-size:10px; font-weight:700; color:#f44; padding:4px 8px; border:1px solid #f44; border-radius:4px; white-space:nowrap; }
.npc-card-attack.same-fam .nca-attack-label { color:#666; border-color:#444; }

@media (max-width:600px) {
  .shop-card, .inv-card { flex:1 1 100%; min-width:0; }
  .npc-card-attack { flex:1 1 100%; min-width:0; }
}

/* ── Weapon tiers ── */
.tier-Splus { color:#f0f; text-shadow:0 0 6px rgba(255,0,255,0.5); font-weight:900; }
.tier-S { color:#ff0; text-shadow:0 0 4px rgba(255,255,0,0.4); font-weight:800; }
.tier-A { color:#f80; font-weight:700; }
.tier-B { color:#0cf; font-weight:600; }
.tier-C { color:#8f8; }
.tier-D { color:#888; }

/* ── Weapon picker ── */
.weapon-picker { display:flex; flex-wrap:wrap; gap:8px; margin:6px 0; }
.wp-btn { padding:10px 16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.15); border-radius:10px; cursor:pointer; color:#ddd; font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; font-weight:600; text-align:center; transition:all 0.15s; min-width:100px; position:relative; overflow:hidden; }
.wp-btn:hover { background:rgba(255,0,0,0.08); border-color:#f44; transform:translateY(-1px); box-shadow:0 4px 12px rgba(255,0,0,0.15); }
.wp-btn:active { transform:scale(0.94); background:rgba(255,0,0,0.15); }
.wp-btn .wp-tier { font-size:9px; display:block; margin-bottom:2px; letter-spacing:1px; }
.wp-btn .wp-dmg { font-size:11px; color:#f88; font-weight:700; }
.wp-btn .wp-dmg.oneshot { color:#f0f; text-shadow:0 0 4px #f0f; }
.wp-dmg { font-size:10px; color:#888; font-weight:400; }

/* ── NPC Fight ── */
.npc-fight-btn { display:inline-block; padding:10px 22px; background:linear-gradient(180deg,#c22,#900); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; font-family:'Segoe UI',system-ui,sans-serif; transition:all 0.15s; }
.npc-fight-btn:hover { background:linear-gradient(180deg,#e44,#b00); box-shadow:0 0 16px rgba(255,0,0,0.25); }
.npc-fight-btn:active { transform:scale(0.94); }

/* ── Leaderboard ── */
.lb-list { display:flex; flex-direction:column; gap:3px; margin:6px 0 10px 0; }
.lb-row { display:flex; align-items:center; gap:8px; padding:8px 12px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:8px; font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; }
.lb-row.lb-me { background:rgba(0,255,0,0.04); border-color:rgba(0,255,0,0.12); }
.lb-rank { font-weight:bold; min-width:28px; color:#aaa; }
.lb-name { flex:1; min-width:0; }
.lb-stat { color:#aaa; font-size:12px; white-space:nowrap; }
.lb-attack-btn { padding:5px 12px; background:linear-gradient(180deg,#c22,#900); color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer; transition:all 0.15s; }
.lb-attack-btn:hover { background:linear-gradient(180deg,#e44,#b00); box-shadow:0 0 8px rgba(255,0,0,0.25); }
.lb-attack-btn:active { transform:scale(0.9); }
.lb-samefam { font-size:10px; color:#a44; padding:4px 8px; border:1px solid #a44; border-radius:4px; white-space:nowrap; }

/* ── Boss fight ── */
.boss-card { display:flex; align-items:center; gap:14px; padding:18px; margin:8px 0; background:rgba(255,0,0,0.06); border:2px solid rgba(255,0,0,0.3); border-radius:14px; }
.boss-avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#600,#a00); display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:bold; color:#fff; font-family:'Georgia',serif; flex-shrink:0; }

const DATA = {"families": {"python": {"name": "Python", "motto": "Logic conquers all.", "color": "\u001b[32m", "bonus": "Starts with one random weapon in inventory.", "trait": "Masters of lethal inventory \u2014 begin the race already armed."}, "rally": {"name": "Rally", "motto": "Strike first, strike true.", "color": "\u001b[31m", "bonus": "Starts with 20 Health Points instead of 10.", "trait": "High endurance \u2014 double the health of any other family."}, "cyber": {"name": "Cyber", "motto": "Information is the ultimate weapon.", "color": "\u001b[36m", "bonus": "One free decryption / code-breaking hint per clue location.", "trait": "Tech geniuses \u2014 type 'decrypt' at any location for a free puzzle hint."}, "encyclopedia": {"name": "Encyclopedia", "motto": "Knowledge never fails.", "color": "\u001b[33m", "bonus": "One free historical trivia / lore hint per clue location.", "trait": "Infinite knowledge \u2014 type 'lore' at any location for deep historical context."}}, "locations": [{"id": "franklin_institute", "name": "Franklin Institute", "city": "Philadelphia, USA", "region": "NORTH AMERICA & CARIBBEAN", "number": 1, "mystery": "The marble halls of the Franklin Institute lie silent after hours. A janitor's\nreport mentions a strange blue spark arcing across the massive Tesla coil in the\nelectricity exhibit at exactly 10:04 PM \u2014 the moment of Ben Franklin's legendary\nkite experiment. Security footage shows a shadow pressing something into the base\nof the Lightning Rod obelisk in the courtyard.", "stages": [{"desc": "You stand beneath the giant Tesla coil. The air smells of ozone. A loose floor tile\nhas faint scorch marks. Something glints beneath it.", "triggers": ["examine tesla coil", "search floor", "check loose tile", "lift tile", "examine obelisk", "look under coil", "inspect tile", "search courtyard", "examine lightning rod"], "success": "Beneath the loose tile: a brass plaque with Franklin's words. Below, a second\nengraving glows faintly: 'What force did I capture from the heavens in 1752?'", "hint": "Look near the Tesla coil. There's something under the loose floor tile."}], "final_answer": "LIGHTNING", "answer_hint": "What Franklin famously captured from the sky in 1752 (9 letters).", "points": 5, "lore": "Founded in 1824, the Franklin Institute is a hands-on science museum. Ben Franklin's 1752 kite experiment proved lightning is electrical."}, {"id": "smithsonian_castle", "name": "Smithsonian Castle", "city": "Washington D.C., USA", "region": "NORTH AMERICA & CARIBBEAN", "number": 2, "mystery": "The red sandstone towers loom over the National Mall. An intercepted curator email\nmentions a hidden safe behind the portrait of James Smithson \u2014 the British founder\nwho never set foot in America. The safe's combination is tied to his name.", "stages": [{"desc": "James Smithson's portrait hangs above a fireplace in the Castle's west wing. The\ngilded frame is slightly crooked, with a rectangular outline on the wallpaper.", "triggers": ["examine portrait", "look behind painting", "check smithson", "move painting", "search frame", "examine fireplace", "look behind frame", "check wall", "check portrait"], "success": "Behind the portrait, a wall safe bears a golden plate: 'Who am I? I gave my fortune\nto a nation I never saw. My legacy became the world's largest museum complex.'", "hint": "Behind the portrait of James Smithson. The curators' hiding spot."}], "final_answer": "SMITHSON", "answer_hint": "The British scientist whose fortune founded the Smithsonian (8 letters).", "points": 5, "lore": "James Smithson (1765-1829) left $500,000 to the US to found the Smithsonian. He never visited America in his lifetime."}, {"id": "statue_of_liberty", "name": "Statue of Liberty Pedestal", "city": "New York, USA", "region": "NORTH AMERICA & CARIBBEAN", "number": 3, "mystery": "Lady Liberty's torch burns bright over New York Harbor. A French diplomat's journal\nreveals sculptor Bartholdi hid a time capsule in the pedestal during construction.\nThe capsule bears the name of the gift France gave to America.", "stages": [{"desc": "Inside the pedestal museum, you find the 1886 cornerstone. A copper plate shaped\nlike a flame bears an inscription asking what this monument represents.", "triggers": ["examine cornerstone", "read inscription", "search pedestal", "look at copper plate", "check museum", "examine flame plate", "read cornerstone"], "success": "The copper flame plate reads: 'I am the gift of one republic to another \u2014 a symbol\nrecognized across every ocean. My name is the promise of welcome to every weary\ntraveler. What am I called?'", "hint": "The cornerstone in the pedestal museum. Look for a flame-shaped copper plate."}], "final_answer": "LIBERTY", "answer_hint": "The name of the statue \u2014 the ideal she represents (7 letters).", "points": 5, "lore": "A gift from France in 1886, the Statue of Liberty was engineered by Gustave Eiffel and stands 305 feet tall."}, {"id": "harvard_old_yard", "name": "Harvard Old Yard", "city": "Boston, USA", "region": "NORTH AMERICA & CARIBBEAN", "number": 4, "mystery": "Crimson leaves carpet Harvard Yard. The John Harvard statue \u2014 the 'Statue of Three\nLies' \u2014 sits at its center. A graduate donor's will mentions a hidden compartment\nin the statue's base containing a clue from the university's namesake himself.", "stages": [{"desc": "The John Harvard statue gleams with polished bronze. The inscription reads 'JOHN\nHARVARD, FOUNDER, 1638' \u2014 though students know none of those three facts are true.\nA loose bronze plate at the base catches your eye.", "triggers": ["examine statue", "check statue base", "examine john harvard", "look at bronze plate", "search base", "examine inscription", "touch loose plate", "inspect statue"], "success": "The bronze plate shifts. Behind it, a parchment asks: 'I am the man whose name this\nuniversity bears. Though I was not its founder, my library of 400 books began it all.'", "hint": "The John Harvard statue. The base has a loose bronze plate."}], "final_answer": "HARVARD", "answer_hint": "The clergyman whose name graces America's oldest university (7 letters).", "points": 5, "lore": "Founded in 1636, Harvard is America's oldest university. John Harvard donated his library and half his estate to the fledgling college."}, {"id": "alamo_mission", "name": "Alamo Mission Chapel", "city": "San Antonio, USA", "region": "NORTH AMERICA & CARIBBEAN", "number": 5, "mystery": "The limestone walls of the Alamo still bear musket-fire scars from 1836. A classified\nTexas Ranger report describes a message carved into the back of the chapel altar by a\ndefender during the siege \u2014 a single word that became a revolution's battle cry.", "stages": [{"desc": "Inside the dim chapel, the altar stands worn and solemn. Behind it, the limestone wall\nbears faint scratches \u2014 letters carved in haste by a desperate hand.", "triggers": ["examine altar", "look behind altar", "read scratches", "check limestone wall", "search behind altar", "examine carving", "inspect wall", "study carving"], "success": "The crude carving reads: 'For Texas and for freedom. Shout the word that echoed\nthrough these walls on that final morning.'", "hint": "Behind the chapel altar. The defenders left messages on these walls."}], "final_answer": "REMEMBER", "answer_hint": "The battle cry of the Alamo \u2014 '_______ the Alamo!' (8 letters).", "points": 5, "lore": "The 1836 Battle of the Alamo saw 200 defenders hold out for 13 days against Santa Anna's army. 'Remember the Alamo!' became the rallying cry."}, {"id": "golden_gate", "name": "Golden Gate Fort Point", "city": "San Francisco, USA", "region": "NORTH AMERICA & CARIBBEAN", "number": 6, "mystery": "Beneath the Golden Gate Bridge, Fort Point stands sentinel over churning waters. A\n1937 engineer's notebook describes a rivet in the south tower stamped with a coded\nmessage naming what the bridge spans.", "stages": [{"desc": "You descend into Fort Point beneath the south tower. A massive riveted steel beam\nrises overhead. One rivet is larger than the rest, stamped with letters.", "triggers": ["examine rivet", "look at beam", "read stamp", "inspect south tower", "check steel beam", "search fort point", "examine stamped rivet", "look at large rivet"], "success": "The rivet reads: 'I am the narrow passage this bridge crosses \u2014 the mile-wide\nentrance to the greatest bay on the Pacific. What am I called?'", "hint": "Beneath the south tower at Fort Point. Look for an unusual rivet in the steel."}], "final_answer": "STRAIT", "answer_hint": "The Golden Gate is this type of narrow water passage (6 letters).", "points": 5, "lore": "The Golden Gate Bridge (1937) spans the Golden Gate strait. At 4,200 feet it was the world's longest suspension bridge."}, {"id": "space_needle", "name": "Space Needle Mechanics Deck", "city": "Seattle, USA", "region": "NORTH AMERICA & CARIBBEAN", "number": 7, "mystery": "The Space Needle's saucer-top hovers 605 feet above Seattle. A maintenance logbook\nmentions an engraving on the main drive gear \u2014 a message from the 1962 World's Fair\nbuilders naming the era this tower was built to celebrate.", "stages": [{"desc": "The mechanical room hums. The massive drive gear is as tall as a person. Shining a\nlight on its inner face reveals etched text beneath decades of grease.", "triggers": ["examine gear", "look at drive gear", "read engraving", "clean gear", "search mechanical room", "inspect motor", "examine etching", "check inner face"], "success": "The etching reveals: 'Built for the World's Fair of 1962 \u2014 the fair that looked\nto tomorrow. We called it the _____ 21 Exposition. What era did we usher in?'", "hint": "The mechanical room. Check the giant drive gear that turns the restaurant."}], "final_answer": "CENTURY", "answer_hint": "The 1962 World's Fair was the '_______ 21 Exposition' (7 letters).", "points": 5, "lore": "The Space Needle was built for the 1962 Century 21 Exposition. It can withstand 200 mph winds and 9.1 magnitude earthquakes."}, {"id": "cn_tower", "name": "CN Tower Sub-structure", "city": "Toronto, Canada", "region": "NORTH AMERICA & CARIBBEAN", "number": 8, "mystery": "The CN Tower pierces the Toronto skyline. In the sub-basement, an engineer's blueprint\nshows a sealed capsule embedded in the foundation. The seal reads: 'Open with the one\nthing this tower lets you see through.'", "stages": [{"desc": "The sub-basement is cavernous. A metal access panel near the central pillar has a glass\nviewing port revealing a capsule inside.", "triggers": ["examine capsule", "look through glass", "open panel", "search foundation", "check access panel", "look at glass port", "examine pillar", "inspect base", "check viewing port"], "success": "The capsule reads: 'I rise 1,815 feet above this city. My most famous feature lets\nvisitors walk on air, looking down through what transparent material?'", "hint": "The sub-basement foundation. An access panel has a glass viewing port."}], "final_answer": "GLASS", "answer_hint": "The transparent material of the CN Tower's famous Glass Floor (5 letters).", "points": 5, "lore": "The CN Tower held the record for world's tallest freestanding structure for 34 years (1976-2010). Its Glass Floor can hold 14 hippos."}, {"id": "chateau_frontenac", "name": "Chateau Frontenac Cellars", "city": "Quebec City, Canada", "region": "NORTH AMERICA & CARIBBEAN", "number": 9, "mystery": "The castle-like Chateau Frontenac dominates Old Quebec. In its deepest cellar, behind\nracks of vintage wine, a 17th-century stone wall bears the mark of the explorer who\nfounded this city in 1608. His name is carved into the foundation itself.", "stages": [{"desc": "The cellar stairs descend into centuries of history. Behind wine racks, a section of\noriginal foundation wall bears a fleur-de-lis and a barely legible carved name.", "triggers": ["examine cellar", "look behind wine racks", "read carving", "move wine       const weapons = Object.entries(DATA.shop_items).filter(([id,item]) => item.type === 'weapon');
      const [wid, w] = weapons[Math.floor(Math.random() * weapons.length)];
      npcs.push({
        name, family,
        health: maxHp, max_health: maxHp,
        weapon_id: wid,
        location_index: Math.floor(Math.random() * DATA.locations.length)
      });
    }
  }
  return npcs;
}

    if (player) payload.player = player;

  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function smartEscape(str) {
  // Don't escape text that is HTML (starts with a tag)
  if (/^\s*<\/?\w+[^>]*>/.test(str)) return str;
  return escapeHtml(str);
}

function ansiToHtml(text) {
  const styleMap = {'0':'','1':'bold','2':'dim','31':'red','32':'green','33':'yellow','36':'cyan','35':'magenta'};
  let result = '';
  let lastIdx = 0;
  const regex = /\x1b\[([0-9;]*)m/g;
  let m;
  while ((m = regex.exec(text)) !== null) {
    result += smartEscape(text.slice(lastIdx, m.index));
    const codes = m[1].split(';');
    if (codes.includes('0') || m[1] === '') {
      result += '</span>'.repeat(ansiSpanDepth);
      ansiSpanDepth = 0;
    } else {
      const classes = codes.map(c => styleMap[c]).filter(Boolean).join(' ');
      if (classes) { result += '<span class="'+classes+'">'; ansiSpanDepth++; }
    }
    lastIdx = m.index + m[0].length;
  }
  result += smartEscape(text.slice(lastIdx));
  return result;
}

function out(text) { output.innerHTML += ansiToHtml(text) + '\n'; output.scrollTop = output.scrollHeight; }
function outHtml(html) { output.innerHTML += html + '\n'; output.scrollTop = output.scrollHeight; }
function clearOutput() { output.innerHTML = ''; ansiSpanDepth = 0; }

function fmtHP(hp) { return Number.isInteger(hp) ? hp.toString() : hp.toFixed(1); }
function hpBar(current, max, color) {
  var pct = Math.max(0, Math.min(100, Math.round(current / max * 100)));
  var c = color || (pct > 50 ? '#0f0' : pct > 25 ? '#ff0' : '#f44');
  return '<span style="display:inline-block;width:60px;height:10px;background:#222;border-radius:5px;vertical-align:middle;margin:0 4px;overflow:hidden"><span style="display:block;width:'+pct+'%;height:100%;background:'+c+';border-radius:5px;transition:width 0.4s"></span></span>';
}

function regionClass(region) {
  const r = (region || '').toUpperCase();
  if (r.includes('NORTH AMERICA') || r.includes('CARIBBEAN')) return 'region-NAMERICA';
  if (r.includes('SOUTH AMERICA')) return 'region-SAMERICA';
  if (r.includes('WESTERN EUROPE') || r.includes('UNITED KINGDOM')) return 'region-WEUROPE';
  if (r.includes('EASTERN EUROPE') || r.includes('RUSSIA')) return 'region-EEUROPE';
  if (r.includes('ASIA') || r.includes('SOUTHEAST ASIA') || r.includes('EAST ASIA')) return 'region-ASIA';
  if (r.includes('AFRICA')) return 'region-AFRICA';
  if (r.includes('MIDDLE EAST')) return 'region-MIDEAST';
  if (r.includes('OCEANIA') || r.includes('AUSTRALIA')) return 'region-OCEANIA';
  if (r.includes('ANTARCTICA')) return 'region-ANTARCTICA';
  return 'region-NAMERICA';
}

var locationImageCache = {};

function fetchLocationImage(loc) {
  var imgEl = document.getElementById('loc-img-' + loc.id);
  if (!imgEl) return;

  if (locationImageCache[loc.id] !== undefined) {
    if (locationImageCache[loc.id] && locationImageCache[loc.id] !== 'none') imgEl.src = locationImageCache[loc.id];
    else imgEl.style.opacity = '1';
    return;
  }

  // Use Wikipedia search API — finds the right page even with partial/specific names
  var query = loc.name + ' ' + loc.city.split(',')[0];
  var url = 'https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=' +
    encodeURIComponent(query) + '&gsrlimit=1&prop=pageimages&pithumbsize=600&format=json&origin=*';

  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    var pages = data.query && data.query.pages;
    if (!pages) throw new Error('no results');
    var page = Object.values(pages)[0];
    var src = page && page.thumbnail && page.thumbnail.source;
    if (src) {
      locationImageCache[loc.id] = src;
      imgEl.src = src;
      imgEl.style.opacity = '1';
    } else {
      throw new Error('no thumbnail');
    }
  }).catch(function() {
    // Fallback: try just the city name
    var city = loc.city.split(',')[0].trim();
    var url2 = 'https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=' +
      encodeURIComponent(city) + '&gsrlimit=1&prop=pageimages&pithumbsize=600&format=json&origin=*';

function triggerToLabel(trigger) {
  const words = trigger.split(/\s+/);
  if (words.length <= 1) return '🔍 ' + trigger.charAt(0).toUpperCase() + trigger.slice(1);
  const verb = words[0].toLowerCase();
  const emoji = triggerEmoji(verb);
  const rest = words.slice(1).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  return emoji + ' ' + rest;
}

function showInvestigationOptions(stage) {
  if (!stage || !stage.triggers || stage.triggers.length === 0) return;
  // Show up to 5 tiles — only first 2 are correct, rest are decoys
  const seen = new Set();
  const unique = [];
  for (const t of stage.triggers) {
    const label = triggerToLabel(t);
    if (!seen.has(label) && unique.length < 5) { seen.add(label); unique.push(t); }
  }
  // Add some decoy tiles from wrong actions
  const decoys = ['search shadows','look around','check walls','examine ceiling','inspect floor','open door','read sign','touch panel'];
  while (unique.length < 5) {
    var d = decoys[Math.floor(Math.random() * decoys.length)];
    var dl = triggerToLabel(d);
    if (!seen.has(dl)) { seen.add(dl); unique.push(d); }
  }
  var html = '<div class="investigate-tiles">';
  for (var i = 0; i < unique.length; i++) {
    var t = unique[i];
    var label = triggerToLabel(t);
    var isCorrect = i < 2; // First 2 tiles are correct
    var safeTrigger = t.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    html += '<div class="investigate-tile" onclick="handlePuzzleClick(\''+safeTrigger+'\','+isCorrect+')"><span class="tile-emoji">'+label.slice(0,2)+'</span><span class="tile-label">'+escapeHtml(label.slice(3))+'</span></div>';
  }
  html += '</div>';
  outHtml(html);
  out('\x1b[2m⚠ Some clues are misleading — choose wisely! Wrong picks cost -3 pts.\x1b[0m');
}

function handlePuzzleClick(trigger, isCorrect) {
  out('\x1b[2m> '+escapeHtml(trigger)+'\x1b[0m');
  const idx = player.current_location_index;
  if (idx >= DATA.locations.length) return;
  const loc = DATA.locations[idx];
  if (player.solved_locations.includes(loc.id)) return;
  const progress = player.location_progress[loc.id] || 0;
  if (progress >= loc.stages.length) return;
  const stage = loc.stages[progress];

  if (!isCorrect) {
    // Wrong pick — penalty
    player.wrong_picks = (player.wrong_picks || 0) + 1;
    var penalty = player.wrong_picks > 3 ? 1 : 0;
    if (penalty > 0) player.points = Math.max(0, player.points - penalty);
    out('\n\x1b[31m✗ That leads nowhere!'+(penalty>0?' -1 pt':'')+' ('+player.wrong_picks+' wrong pick'+(player.wrong_picks>1?'s':'')+') (Total: '+player.points+')\x1b[0m');
    out('\x1b[2mHint: '+escapeHtml(stage.hint)+'\x1b[0m');
    save(); updateStatus(); return;
  }

  // Correct pick — advance stage
  out('\n\x1b[32m'+stage.success+'\x1b[0m');
  player.points += 10;
  out('\x1b[32m+10 points! (Total: '+player.points+')\x1b[0m');
  player.location_progress[loc.id] = progress + 1;
  save();
  if (player.location_progress[loc.id] >= loc.stages.length) {
    promptFinalAnswer(loc);
  } else {
    const ns = loc.stages[player.location_progress[loc.id]];
    out('\n\x1b[1mInvestigation — Stage '+(player.location_progress[loc.id]+1)+'/'+loc.stages.length+'\x1b[0m');
    out(ns.desc);
    showInvestigationOptions(ns);
  }
  output.scrollTop = output.scrollHeight;
  updateStatus();
}

  outHtml(renderLocationCard(loc));

const STOP_WORDS = new Set(["the","a","an","to","in","at","on","for","of","and","or","is","it","its","this","that","with","from","by","around","behind","under","over","inside","through","up","down","into","onto","me","my","i","you","your","let"]);
const INVESTIGATE_VERBS = new Set(["examine","search","look","check","inspect","read","open","enter","climb","move","lift","pull","push","find","access","study","descend","dig","use","spin","wade","cross","dive","try","approach","touch","slide","pry","remove","clean","hold","flip","turn","shake","knock","peer","reach","feel","tap","press","crawl","step","walk","run","jump","swim","hack","decode","translate","solve","answer","say","speak","whisper","shout","type","input","scan","photograph","sketch","investigate","explore","peek","grab","take","get","watch","observe","note","review","probe","test","pick","sneak","head","go","break","smash","force","cut","pocket","steal","hide","follow","track"]);

function matchesTrigger(action, triggers) {
  const al = action.toLowerCase();
  for (const trigger of triggers) {
    const tl = trigger.toLowerCase();
    if (al.includes(tl) || tl.includes(al)) return true;
    const aWords = new Set(al.split(/\s+/).filter(w => !STOP_WORDS.has(w)));
    const tWords = new Set(tl.split(/\s+/).filter(w => !STOP_WORDS.has(w)));
    const hasVerb = [...aWords].some(w => INVESTIGATE_VERBS.has(w));
    if (!hasVerb) continue;
    const contentWords = new Set([...aWords].filter(w => !INVESTIGATE_VERBS.has(w)));
    const overlap = [...contentWords].filter(w => tWords.has(w));
    if (overlap.length >= 1) return true;
  }
  return false;
}

function answerMatches(input, correct) {
  const il = input.toLowerCase().trim();
  const cl = correct.toLowerCase();
  if (il === cl) return true;
  // Answer can be anywhere in the sentence
  if (il.includes(cl) || cl.includes(il)) return true;
  return false;
}

function closeMatch(input, correct) {
  for (const word of input.toLowerCase().split(/\s+/)) {
    if (word.length < 3) continue;
    if (word.length === correct.length) {
      let diffs = 0;
      for (let i = 0; i < word.length; i++) { if (word[i] !== correct[i]) diffs++; }
      if (diffs === 1) return true;
    }
    if (Math.abs(word.length - correct.length) === 1) {
      const shorter = word.length < correct.length ? word : correct;
      const longer = word.length < correct.length ? word : correct;
      for (let i = 0; i < longer.length; i++) {
        if (longer.slice(0,i) + longer.slice(i+1) === shorter) return true;
      }
    }
  }
  return false;
}

function fetchBossImage(imgId, query) {
  var imgEl = document.getElementById(imgId);
  if (!imgEl) return;
  var url = 'https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch='+encodeURIComponent(query)+'&gsrlimit=1&prop=pageimages&pithumbsize=400&format=json&origin=*';
  fetch(url).then(function(r){return r.json();}).then(function(data){
    var pages = data.query && data.query.pages;
    if (!pages) return;
    var page = Object.values(pages)[0];
    var src = page && page.thumbnail && page.thumbnail.source;
    if (src) {
      imgEl.style.backgroundImage = 'url('+src+')';
      imgEl.style.backgroundSize = 'cover';
      imgEl.style.backgroundPosition = 'center';
      imgEl.querySelector('.boss-avatar-fallback').style.display = 'none';

function bossTurn() {
  if (!currentBoss) return;
  var dmg = currentBoss.damage;
  var blocked = 0;
  // Speed Boots: 25% dodge chance
  if (player.inventory.includes('speed_boots') && Math.random() < 0.25) {
    out('\n\x1b[36m👟 Speed Boots! You dodged the attack!\x1b[0m');
    updateStatus(); return;
  }
  if (player.has_armor) dmg = Math.max(0, dmg - 1);
  if (player.inventory.includes('reflective_armor')) dmg = Math.max(0, dmg - 3);
  if (player.shield_uses > 0 && dmg > 0) {
    blocked = Math.min(2, dmg);
    dmg -= blocked;
    player.shield_uses--;
    if (player.shield_uses <= 0) {
      var si = player.inventory.indexOf('shield');
      if (si >= 0) player.inventory.splice(si, 1);
    }
  }
  player.health = Math.round(Math.max(0, player.health - dmg) * 10) / 10;
  out('\n<span class="combat-anim">\x1b[1;31m◄ '+currentBoss.name+'\'s TURN\x1b[0m');
  out('\x1b[31m'+currentBoss.name+' strikes for '+fmtHP(dmg)+' damage!\x1b[0m');
  if (blocked > 0) out('\x1b[33mYour defenses blocked '+blocked+' damage!\x1b[0m');
  out('\x1b[31mYour HP: '+fmtHP(player.health)+'/'+player.max_health+'</span>\x1b[0m');

  if (player.health <= 0) {
    out('\n\x1b[1;31m☠ You were defeated by '+currentBoss.name+'!\x1b[0m');
    player.health = player.max_health;
    player.is_poisoned = false;
    player.kill_streak = 0;
    player.points = Math.max(0, player.points - 20);
    out('\x1b[31m-20 points penalty. Your health is restored.\x1b[0m');
    currentBoss.health = currentBoss.maxHealth;
    out('\x1b[33m'+currentBoss.name+' regained full health. Attack again!\x1b[0m');
  }

  updateStatus();

  // Show attack-again button if both still alive
  if (player.health > 0 && currentBoss.health > 0) {

  player.solved_locations.push(loc.id);
  player.solved_count++;
  player.current_location_index++;
  save();
  if (player.current_location_index >= DATA.locations.length) {

      out('\n\x1b[36mAdvancing to Clue '+(player.current_location_index+1)+': '+escapeHtml(next.name)+', '+escapeHtml(next.city)+'...\x1b[0m');

}

function tradeItem(targetName, itemName) {
  if (!player) return;
  var target = gameState.players[targetName.toLowerCase()];
  if (!target) { out('\x1b[31mPlayer \''+escapeHtml(targetName)+'\' not found.\x1b[0m'); return; }
  if (target.name === player.name) { out('\x1b[31mCan\'t trade with yourself!\x1b[0m'); return; }
  // Find item in inventory
  var nl = itemName.toLowerCase();
  var foundIdx = -1, foundId = null;
  for (var i = 0; i < player.inventory.length; i++) {
    var id = player.inventory[i];
    var item = DATA.shop_items[id] || {name:id};
    if (nl.includes(id) || item.name.toLowerCase().includes(nl)) { foundIdx = i; foundId = id; break; }
  }
  if (foundIdx < 0) { out('\x1b[31mYou don\'t have that item.\x1b[0m'); return; }
  var theItem = DATA.shop_items[foundId] || {name:foundId};
  // Transfer
  player.inventory.splice(foundIdx, 1);
  target.inventory.push(foundId);
  // If trading weapon_wrappers, transfer that too
  if (player.weapon_wrappers && player.weapon_wrappers[foundId]) {
    if (!target.weapon_wrappers) target.weapon_wrappers = {};
    target.weapon_wrappers[foundId] = player.weapon_wrappers[foundId];
    delete player.weapon_wrappers[foundId];
  }
  save();
  out('\x1b[32m✅ Traded '+escapeHtml(theItem.name)+' to '+escapeHtml(target.name)+'!\x1b[0m');
  // Check if target now has all 4 artifacts
  if (target.artifacts && target.artifacts.length >= 4 && !gameState.clueMaster) {
    gameState.clueMaster = target.name;
    out('\n\x1b[1;33m🌟 '+escapeHtml(target.name)+' has assembled ALL 4 ARTIFACTS!');
    out('They are now the CLUE MASTER — they can create their own clue!\x1b[0m');
  }
  // Notify target
  if (!target.combat_log) target.combat_log = [];
  target.combat_log.push(player.name+' of House '+DATA.families[player.family].name+' traded you: '+theItem.name);
  save();
}

// Weapon picker — shows clickable weapon buttons, calls callback(weaponId)
function showWeaponPicker(callback) {
  var weapons = player.inventory.filter(function(id){ return DATA.shop_items[id] && DATA.shop_items[id].type === 'weapon'; });
  var tierOrder = {'S+':0,'S':1,'A':2,'B':3,'C':4,'D':5};
  weapons.sort(function(a,b){
    var tA = tierOrder[DATA.shop_items[a].tier] != null ? tierOrder[DATA.shop_items[a].tier] : 9;
    var tB = tierOrder[DATA.shop_items[b].tier] != null ? tierOrder[DATA.shop_items[b].tier] : 9;
    if (tA !== tB) return tA - tB;
    return (DATA.shop_items[b].damage||0) - (DATA.shop_items[a].damage||0);
  });
  if (weapons.length === 0) { out('\x1b[31mNo weapons! Buy one at the shop.\x1b[0m'); return; }
  if (weapons.length === 1) { callback(weapons[0]); return; }
  weaponPickerCallback = callback;
  out('\n\x1b[1m⚔ Choose your weapon:\x1b[0m');
  var html = '<div class="weapon-picker">';
  weapons.forEach(function(wid){
    var w = DATA.shop_items[wid];
    var wrId = (player.weapon_wrappers||{})[wid];
    var wrTag = wrId ? ' <span style="font-size:9px;color:#f80">+'+wrId+'</span>' : '';
    var dmgClass = w.damage >= 10 ? 'oneshot' : '';
    var tierStr = String(w.tier||'D'); var tierClass = 'tier-'+tierStr.replace('+','plus');
    html += '<button class="wp-btn" onclick="wpClick(\''+wid+'\')"><span class="wp-tier '+tierClass+'">'+(w.tier||'?')+'</span>'+escapeHtml(w.name)+wrTag+'<br><span class="wp-dmg '+dmgClass+'">'+w.damage+' dmg '+(w.reusable?'♻':'💥')+'</span></button>';
  });
  html += '</div>';
  outHtml(html);
  output.scrollTop = output.scrollHeight;
}

function pickWeaponForBoss(wid) {
  var w = DATA.shop_items[wid];
  var wrId = (player.weapon_wrappers||{})[wid];
  var dmg = w.damage;
  var freezeTarget = false;
  if (wrId) {
    var wrDef = (DATA.shop_items[wrId+'_wrapper']||{}).wrapper||{};
    if (wrDef.bonusDmg) dmg += wrDef.bonusDmg;
    if (wrDef.multiplier) dmg = Math.round(dmg * wrDef.multiplier);
    if (wrDef.freeze) freezeTarget = true;
    if (wrDef.heal) { player.health = Math.min(player.max_health, player.health + wrDef.heal); }
    out('\n<span class="combat-anim">\x1b['+(wrDef.color||'31')+'m'+(wrDef.icon||'')+' '+wrId+' wrapper activates!\x1b[0m');
    delete player.weapon_wrappers[wid];
  }
  var critText = dmg >= 10 ? ' <span class="crit-hit">CRITICAL!</span>' : '';
  currentBoss.health = Math.round(Math.max(0, currentBoss.health - dmg) * 10) / 10;
  out('\n<span class="combat-anim">\x1b[32m► YOUR TURN\x1b[0m');
  out('\x1b[31m⚔ You strike '+currentBoss.name+' with '+escapeHtml(w.name)+' for '+fmtHP(dmg)+' damage!'+critText+'\x1b[0m');
  if (currentBoss.health > 0 && currentBoss.health <= currentBoss.maxHealth * 0.3) out('\x1b[33m'+currentBoss.name+' is enraged but weakening!\x1b[0m');
  out('\x1b[31mBoss HP: '+fmtHP(currentBoss.health)+'/'+currentBoss.maxHealth+'</span>\x1b[0m');
  if (!w.reusable) { var wi = player.inventory.indexOf(wid); if (wi >= 0) player.inventory.splice(wi, 1); out('\x1b[2m'+escapeHtml(w.name)+' spent.\x1b[0m'); }
  if (currentBoss.health <= 0) {
    var reward = currentBoss.level * 50;
    out('\n<span class="kill-confirm">\x1b[1;32m👑 BOSS DEFEATED: '+currentBoss.name+'!\x1b[0m</span>');
    out('\x1b[32m💰 +'+reward+' boss bounty! (Total: '+(player.points + reward)+' pts)\x1b[0m');
    player.points += reward; currentBoss = null; save();
    var next = DATA.locations[player.current_location_index];
    player.location_progress[next.id] = 0;
    out('\n\x1b[36mAdvancing to Clue '+(player.current_location_index+1)+': '+escapeHtml(next.name)+', '+escapeHtml(next.city)+'...\x1b[0m');
    describeLocation(); updateStatus(); return;
  }
  if (freezeTarget) {
    out('\x1b[36m❄ '+currentBoss.name+' is frozen and cannot counterattack!\x1b[0m');
  } else {
    bossTurn();
  }
  save();
}

function pickWeaponForPvp(targetName, wid) {
  var target = gameState.players[targetName.toLowerCase()];
  if (!target) return;
  var w = DATA.shop_items[wid];
  var wrId = (player.weapon_wrappers||{})[wid];
  var dmg = w.damage;
  if (wrId) {
    var wrDef = (DATA.shop_items[wrId+'_wrapper']||{}).wrapper||{};
    if (wrDef.bonusDmg) dmg += wrDef.bonusDmg;
    if (wrDef.multiplier) dmg = Math.round(dmg * wrDef.multiplier);
    if (wrDef.heal) { player.health = Math.min(player.max_health, player.health + wrDef.heal); }
    out('\n<span class="combat-anim">\x1b['+(wrDef.color||'31')+'m'+(wrDef.icon||'')+' '+wrId+' wrapper activates!\x1b[0m');
    delete player.weapon_wrappers[wid];
  }
  var pierce = wrId && ((DATA.shop_items[wrId+'_wrapper']||{}).wrapper||{}).pierce;
  var blocked = 0;
  if (!pierce) {
    if (target.has_armor) dmg = Math.max(0, dmg - 1);
    if (target.shield_uses > 0 && dmg > 0) { blocked = Math.min(2, dmg); dmg -= blocked; target.shield_uses--; if (target.shield_uses <= 0) { var si = target.inventory.indexOf('shield'); if (si >= 0) target.inventory.splice(si, 1); } }
  }
  target.health = Math.round(Math.max(0, target.health - dmg) * 10) / 10;
  out('\n<span class="combat-anim">\x1b[31m⚔ You attack '+escapeHtml(target.name)+' with '+escapeHtml(w.name)+'!\x1b[0m');
  if (blocked > 0) out('\x1b[33m'+escapeHtml(target.name)+' blocked '+blocked+' damage!\x1b[0m');
  if (pierce) out('\x1b[35m🕳 Pierced through armor & shield!\x1b[0m');
  out('\x1b[31m'+escapeHtml(target.name)+' takes '+fmtHP(dmg)+' damage! ('+fmtHP(target.health)+'/'+target.max_health+')</span>\x1b[0m');
  if (w.poisons) { target.is_poisoned = true; out('\x1b[35m'+escapeHtml(target.name)+' is poisoned!\x1b[0m'); }
  if (!w.reusable) { var wi = player.inventory.indexOf(wid); if (wi >= 0) player.inventory.splice(wi, 1); out('\x1b[2m'+escapeHtml(w.name)+' spent.\x1b[0m'); }
  if (target.health <= 0) {
    player.kill_streak = (player.kill_streak || 0) + 1;
    var streakBonus = Math.min(player.kill_streak * 5, 30);
    var stolen = target.points + streakBonus;
    player.points += stolen;

    out('\n\x1b[1;31m💀 '+escapeHtml(target.name)+' ELIMINATED!\x1b[0m');
    out('\x1b[32m💰 +'+stolen+' pts ('+target.points+' pts + '+streakBonus+' streak)\x1b[0m');

    // FULL LOOT — take ALL their items
    var lootedItems = [];
    if (target.inventory && target.inventory.length > 0) {
      for (var li = 0; li < target.inventory.length; li++) {
        var lootId = target.inventory[li];
        var lootItem = DATA.shop_items[lootId] || {name:lootId};
        player.inventory.push(lootId);
        lootedItems.push(lootItem.name);
      }
      // Transfer wrappers too
      if (target.weapon_wrappers) {
        if (!player.weapon_wrappers) player.weapon_wrappers = {};
        for (var wk in target.weapon_wrappers) {
          player.weapon_wrappers[wk] = target.weapon_wrappers[wk];
        }
      }
      // Transfer shield uses and armor
      if (target.shield_uses > 0 && !player.inventory.includes('shield')) {
        player.shield_uses = Math.max(player.shield_uses||0, target.shield_uses);
      }
      if (target.has_armor) player.has_armor = true;


    }

    if (lootedItems.length > 0) {
      out('\x1b[1;33m🎒 FULL LOOT: '+lootedItems.length+' items taken!\x1b[0m');
      var lootPreview = lootedItems.slice(0, 8).join(', ');
      if (lootedItems.length > 8) lootPreview += '... +'+(lootedItems.length-8)+' more';
      out('\x1b[2m'+lootPreview+'\x1b[0m');
    }

    target.health = target.max_health; target.is_poisoned = false; target.points = 0;
    target.inventory = []; target.weapon_wrappers = {}; target.shield_uses = 0; target.has_armor = false;
    target.combat_log.push('💀 '+player.name+' eliminated you and took ALL your items! You respawn with nothing.');
  }
  // Log attack to target's combat_log
  target.combat_log.push(
    player.name+' of House '+DATA.families[player.family].name+' attacked you with '+w.name+' for '+fmtHP(dmg)+' damage! ('+fmtHP(target.health)+'/'+target.max_health+' HP)'+
    (target.health <= 0 ? ' 💀 You were eliminated!' : '')
  );
  // AUTO-MODE: target counterattacks if enabled and still alive
  if (target.auto_mode && target.health > 0) {
    autoRetaliate(target, player, w.name, dmg);
  }
  save();
}

function flyToCharacter(btnEl, itemName, itemIcon) {
  if (!btnEl) return;
  var btnRect = btnEl.getBoundingClientRect();
  var statusEl = document.getElementById('status');
  var statusRect = statusEl ? statusEl.getBoundingClientRect() : {left:16, top:60};
  var flyEl = document.createElement('span');
  flyEl.className = 'fly-item';
  flyEl.textContent = (itemIcon||'📦')+' '+itemName;
  flyEl.style.left = (btnRect.left + btnRect.width/2 - 30)+'px';
  flyEl.style.top = (btnRect.top - 10)+'px';
  var dx = (statusRect.left + statusRect.width/2) - (btnRect.left + btnRect.width/2);
  var dy = (statusRect.top + statusRect.height/2) - (btnRect.top);
  flyEl.style.setProperty('--fly-x', dx+'px');
  flyEl.style.setProperty('--fly-y', dy+'px');
  document.body.appendChild(flyEl);
  setTimeout(function(){ if (flyEl.parentNode) flyEl.parentNode.removeChild(flyEl); }, 750);
}

function buyItemById(iid) {
  const item = DATA.shop_items[iid];
  if (!item) { out('\x1b[31mItem not found.\x1b[0m'); return; }
  var price = item.price * 3;
  if (player.points < price) { out('\x1b[31mNot enough points! '+escapeHtml(item.name)+' costs '+price+'. You have '+player.points+'.\x1b[0m'); return; }
  if (player.inventory.includes(iid) && (iid === 'shield' || iid === 'armor')) { out('\x1b[33mYou already own '+escapeHtml(item.name)+'.\x1b[0m'); return; }
  player.points -= price;
  player.inventory.push(iid);
  if (iid === 'shield') player.shield_uses = item.uses || 3;
  if (iid === 'armor') player.has_armor = true;
  save();
  out('\x1b[32mPurchased '+escapeHtml(item.name)+' for '+price+' pts!\x1b[0m');
  // Fly animation - find the clicked button
  var ico = item.type==='weapon'?'⚔':item.type==='defense'?'🛡':'🛠';
  var btns = document.querySelectorAll('.sc-buy');
  for (var b=0;b<btns.length;b++) {
    if (btns[b].textContent.includes(item.price*3) && !btns[b].classList.contains('owned')) {
      flyToCharacter(btns[b], item.name, ico); break;
    }
  }
  showShop(); // Refresh the shop view
}

function useItemById(iid) {
  const idx = player.inventory.indexOf(iid);
  if (idx < 0) { out('\x1b[31mYou don\'t have that item.\x1b[0m'); return; }
  const item = DATA.shop_items[iid] || {name:iid, type:'unknown'};
  const loc = DATA.locations[player.current_location_index];

  if (iid === 'flashlight' || iid === 'magnifier') {
    player.inventory.splice(idx, 1);
    const progress = player.location_progress[loc.id] || 0;
    out('\x1b[33mUsing '+escapeHtml(item.name)+'...\x1b[0m');
    if (progress < loc.stages.length) out('\x1b[36m'+escapeHtml(loc.stages[progress].hint)+'\x1b[0m');
    else out('\x1b[36m'+escapeHtml(loc.answer_hint)+'\x1b[0m');
  } else if (iid === 'compass') {
    player.inventory.splice(idx, 1);
    const unsolved = DATA.locations.filter(l => !player.solved_locations.includes(l.id) && DATA.locations.indexOf(l) !== player.current_location_index);
    if (unsolved.length) {
      const best = unsolved.reduce((a,b) => a.points > b.points ? a : b);
      out('\x1b[33mCompass points to: '+escapeHtml(best.name)+', '+escapeHtml(best.city)+' ('+best.points+' pts)\x1b[0m');
    }
  } else if (iid === 'lockpick') {
    player.inventory.splice(idx, 1);
    const progress = player.location_progress[loc.id] || 0;
    if (progress < loc.stages.length) {
      out('\x1b[33mLockpick bypasses the obstacle!\x1b[0m');
      out('\x1b[32m'+loc.stages[progress].success+'\x1b[0m');
      player.points += 10;
      player.location_progress[loc.id] = progress + 1;
      save();
      if (progress + 1 >= loc.stages.length) promptFinalAnswer(loc);
      else { out(loc.stages[progress+1].desc); showInvestigationOptions(loc.stages[progress+1]); }
    }
  } else if (iid === 'health_potion' || iid.startsWith('hp_')) {
    player.inventory.splice(idx, 1);
    var oldHp = player.health;
    var healAmt = item.heal || 3;
    player.health = Math.min(player.max_health, player.health + healAmt);
    var actualHeal = player.health - oldHp;
    var potionColor = item.color || '#fff';
    out('\n\x1b[1m🧪 '+escapeHtml(item.name)+' used!\x1b[0m');
    out('\x1b[32m+'+fmtHP(actualHeal)+' HP! ('+fmtHP(player.health)+'/'+player.max_health+')');
    if (player.health >= player.max_health) out('\x1b[33m💪 Fully healed!\x1b[0m');
    if (healAmt >= 50) out('\x1b[1;35m✨ LEGENDARY POTION! ✨\x1b[0m');
    save();
  } else if (iid === 'antidote') {
    player.inventory.splice(idx, 1);
    player.is_poisoned = false;
    player.health = Math.min(player.max_health, player.health + 1);
    out('\x1b[32mPoison cured! +1 HP ('+fmtHP(player.health)+'/'+player.max_health+')\x1b[0m');
    save();
  } else if (iid === 'medkit') {
    player.inventory.splice(idx, 1);
    player.health = player.max_health;
    player.is_poisoned = false;
    out('\x1b[32m💉 Medkit used! HP fully restored to '+player.max_health+'!\x1b[0m');
    save();
  } else if (iid === 'spy_drone') {
    player.inventory.splice(idx, 1); save();
    out('\n\x1b[36m🛸 Spy Drone deployed! Scanning...\x1b[0m');
    if (gameState.npcs) {
      gameState.npcs.forEach(function(n){
        var loc = DATA.locations[n.location_index]||{name:'???'};
        var wp = DATA.shop_items[n.weapon_id]||{name:'fists'};
        var alive = n.health > 0 ? '\x1b[32m'+fmtHP(n.health)+'/'+n.max_health+'\x1b[0m' : '\x1b[31mDEAD\x1b[0m';
        out('  '+n.name+' ['+DATA.families[n.family].name+'] | '+alive+' | '+wp.name+' | Clue '+(n.location_index+1)+' ('+loc.name+')');
      });
    }
  } else if (iid === 'lucky_charm') {
    player.inventory.splice(idx, 1);
    if (!player.lucky_charm_active) player.lucky_charm_active = true;
    save();
    out('\x1b[33m🍀 Lucky Charm activated! Next clue awards DOUBLE points!\x1b[0m');
  } else if (iid === 'treasure_map') {
    player.inventory.splice(idx, 1); save();
    out('\n\x1b[33m🗺 Treasure Map revealed:\x1b[0m');
    for (var i = player.current_location_index; i < Math.min(player.current_location_index+5, DATA.locations.length); i++) {
      var l = DATA.locations[i];
      out('  Clue '+(i+1)+': \x1b[1m'+escapeHtml(l.name)+'\x1b[0m — '+escapeHtml(l.city)+' ('+l.points+' pts)');
    }
  } else if (iid === 'airplane') {
    player.inventory.splice(idx, 1); save();

    if (currentBoss) {

      describeLocation();
    } else if (activeNpcFight) {

      activeNpcFight = null;
    } else {
      // Skip current puzzle location
      var skipLoc = DATA.locations[player.current_location_index];

        player.points += skipLoc.points;

      } else {
        out('\x1b[33mNothing to skip right now.\x1b[0m');

      }
    }
    updateStatus();
  } else if (iid.endsWith('_wrapper')) {
    var wrapType = iid.replace("_wrapper",""); var wDef = item.wrapper || {};
    player.inventory.splice(idx, 1); // Remove wrapper
    save();
    out('\n\x1b[1mChoose a weapon to apply '+escapeHtml(item.name)+':\x1b[0m');
    // Show weapon picker, then apply wrapper
    var cb = function(wid){
      if (!player.weapon_wrappers) player.weapon_wrappers = {};
      player.weapon_wrappers[wid] = wrapType;
      var w = DATA.shop_items[wid];
      out('\x1b[32m✅ '+escapeHtml(item.name)+' applied to '+escapeHtml(w.name)+'!\x1b[0m');


      save();
    };
    weaponPickerCallback = cb;
    var weapons = player.inventory.filter(function(id){ return DATA.shop_items[id] && DATA.shop_items[id].type === 'weapon'; });
    var tierOrder = {'S+':0,'S':1,'A':2,'B':3,'C':4,'D':5};
    weapons.sort(function(a,b){
      var tA = tierOrder[DATA.shop_items[a].tier] != null ? tierOrder[DATA.shop_items[a].tier] : 9;
      var tB = tierOrder[DATA.shop_items[b].tier] != null ? tierOrder[DATA.shop_items[b].tier] : 9;
      if (tA !== tB) return tA - tB;
      return (DATA.shop_items[b].damage||0) - (DATA.shop_items[a].damage||0);
    });
    var html = '<div class="weapon-picker">';
    weapons.forEach(function(wid){
      var w = DATA.shop_items[wid];
      var already = (player.weapon_wrappers||{})[wid];
      var tierStr = String(w.tier||'D'); var tierClass = 'tier-'+tierStr.replace('+','plus');
      html += '<button class="wp-btn" onclick="wpClick(\''+wid+'\')"><span class="wp-tier '+tierClass+'">'+(w.tier||'?')+'</span>'+escapeHtml(w.name)+(already?' <span class="dim">['+already+']</span>':'')+'<br><span class="wp-dmg">'+w.damage+' dmg '+(w.reusable?'♻':'💥')+'</span></button>';
    });
    html += '</div>';
    outHtml(html);
    output.scrollTop = output.scrollHeight;
  } else {
    out('\x1b[33m'+escapeHtml(item.name)+' is passive or equipped.\x1b[0m');
  }
  showInventory(); // Refresh
}

  const groups = {weapon:[],tool:[],defense:[],unknown:[]};

        '<button class="ic-use" style="background:linear-gradient(180deg,#c22,#900);margin-left:4px" onclick="sellItem(\''+id+'\')">💰 SELL</button></div>';
    }

function handleCommand(raw) {
  const cmd = raw.trim();
  const lower = cmd.toLowerCase();

  if (!player) {
    if (lower.startsWith('new ')) {
      const name = cmd.split(/\s+/).slice(1).join(' ').trim();
      if (!name) { out('\x1b[31mEnter a name: new &lt;name&gt;\x1b[0m'); return; }
      if (gameState.players[name.toLowerCase()]) { out('\x1b[33mName taken. Use login.\x1b[0m'); return; }
      showFamilyChoice(name);
      return;
    }
    if (lower.startsWith('login ')) {
      const name = cmd.split(/\s+/).slice(1).join(' ').trim();
      // Load player from SERVER first, fallback to localStorage
      fetch('/api/game/load?player='+encodeURIComponent(name)).then(function(r){return r.json();}).then(function(d){
        if (d.player && d.player.name) {
          // Server has the player — use server data as source of truth
          player = d.player;
          // Ensure all fields exist
          player.max_health = player.max_health || 10;
          player.health = player.health != null ? player.health : player.max_health;
          player.points = player.points || 0;
          player.inventory = player.inventory || [];
          player.solved_locations = player.solved_locations || [];
          player.solved_count = player.solved_count || 0;
          player.current_location_index = player.current_location_index || 0;
          player.location_progress = player.location_progress || {};
          player.cyber_hints_used = player.cyber_hints_used || [];
          player.encyclopedia_hints_used = player.encyclopedia_hints_used || [];
          player.wrong_answers = player.wrong_answers || 0;
          player.is_poisoned = player.is_poisoned || false;
          player.shield_uses = player.shield_uses || 0;
          player.has_armor = player.has_armor || false;
          player.notes = player.notes || [];
          player.combat_log = player.combat_log || [];
          player.weapon_wrappers = player.weapon_wrappers || {};
          player.kill_streak = player.kill_streak || 0;
          player.artifacts = player.artifacts || [];
          player.auto_mode = player.auto_mode !== false;
          // Update gameState from server
          if (d.npcs) gameState.npcs = d.npcs;
          if (d.ultimateMaster) gameState.ultimateMaster = d.ultimateMaster;
          if (d.clueMaster) gameState.clueMaster = d.clueMaster;
          gameState.players[name.toLowerCase()] = player;
          save();
          out('\n\x1b[32mWelcome back, '+escapeHtml(player.name)+'!\x1b[0m');
          showCombatLog(); describeLocation(); updateStatus();
        } else {
          // Server doesn't have player, try localStorage
          var p = gameState.players[name.toLowerCase()];
          if (p) { player = p;
            out('\n\x1b[32mWelcome back, '+escapeHtml(p.name)+'! (local save)\x1b[0m');
            showCombatLog(); describeLocation(); updateStatus();
          } else { out('\x1b[33mNot found. Use \'new '+escapeHtml(name)+'\'.\x1b[0m'); }
        }
      }).catch(function(e){
        // Server offline — fallback to localStorage
        var p = gameState.players[name.toLowerCase()];
        if (p) { player = p;
          out('\n\x1b[32mWelcome back, '+escapeHtml(p.name)+'! (offline)\x1b[0m');
          showCombatLog(); describeLocation(); updateStatus();
        } else { out('\x1b[33mNot found. Use \'new '+escapeHtml(name)+'\'.\x1b[0m'); }
      });
      else { out('\x1b[33mNot found. Use \'new '+escapeHtml(name)+'\'.\x1b[0m'); }
      updateStatus();
      return;
    }
    if (lower === 'help') { showTitle(); return; }
    if (lower === 'leaderboard' || lower === 'lb') { showLeaderboard(); return; }
    if (lower === 'families') { showFamilies(); return; }
    out('\x1b[2mLogin first: \'new &lt;name&gt;\' or \'login &lt;name&gt;\'\x1b[0m');
    return;
  }

  // Logged-in commands
  updateStatus();

  if (lower === 'help') { showHelp(); }
  else if (lower === 'who' || lower === 'players' || lower === 'online') { showOnlinePlayers(); }
  else if (lower === 'base' || lower === 'cluemaster' || lower === 'cm') { showClueMasterBase(); }
  else if (lower === 'claimbase') { claimUltimateMaster(); }
  else if (lower === 'shop' || lower === 'store') { showShop(); }
  else if (lower.startsWith('sell ')) { sellItem(cmd.split(/\s+/).slice(1).join(' ')); }
  else if (lower.startsWith('buy ')) { buyItem(cmd.split(/\s+/).slice(1).join(' ')); }
  else if (lower.startsWith('use ')) { useItem(cmd.split(/\s+/).slice(1).join(' ')); }
  else if (lower === 'inventory' || lower === 'inv' || lower === 'i') { showInventory(); }
  else if (lower === 'status' || lower === 'stats' || lower === 'st') { showStatus(); }
  else if (lower === 'locations' || lower === 'loc') { showLocations(); }
  else if (lower === 'hint') { showHint(); }
  else if (lower === 'decrypt') { doDecrypt(); }
  else if (lower === 'lore') { doLore(); }
  else if (lower === 'solve') { doSolve(); }
  else if (lower === 'leaderboard' || lower === 'lb') { showLeaderboard(); }
  else if (lower === 'notes' || lower === 'journal') { showNotes(); }
  else if (lower === 'automode') { toggleAutoMode(); }
  else if (lower === 'save') { save(); out('\x1b[32mSaved.\x1b[0m'); }
  else if (lower === 'npcs' || lower === 'npc') { showNpcs(); }
  else if (lower.startsWith('attack ') || lower.startsWith('kill ')) {
    const target = cmd.split(/\s+/).slice(1).join(' ');
    if (currentBoss && (target.toLowerCase() === 'boss' || target.toLowerCase() === currentBoss.name.toLowerCase())) {
      attackBoss();
    } else {
      doAttack(target);
    }
  }
  else if (lower.startsWith('give ')) {
    var parts = cmd.split(/\s+/);
    if (parts.length >= 3) {
      var targetPlayer = parts[1];
      var itemName = parts.slice(2).join(' ');
      if (isUltimateMaster()) {
        ultimateGiveItem(targetPlayer, itemName);
      } else {
        out('\x1b[33mOnly the Ultimate Clue Master can spawn items. Use \'trade\' to give from your inventory.\x1b[0m');
      }
    } else {
      out('\x1b[31mUsage: give &lt;player&gt; &lt;item name&gt;\x1b[0m');
    }
  }
  else if (lower.startsWith('trade ')) {
    var parts = cmd.split(/\s+/);
    if (parts.length >= 4) {
      // Format: trade <player> <your item> <their item>
      var targetPlayer = parts[1];
      // Find the split point — look for 'for' keyword or use middle
      var rest = parts.slice(2).join(' ').toLowerCase();
      var forIdx = rest.indexOf(' for ');
      var myItem, theirItem;
      if (forIdx >= 0) {
        myItem = rest.substring(0, forIdx).trim();
        theirItem = rest.substring(forIdx + 5).trim();
      } else {
        // Split in half — first half is yours, second half is theirs
        var mid = Math.floor(parts.length / 2) + 1;
        myItem = parts.slice(2, mid).join(' ');
        theirItem = parts.slice(mid).join(' ');
      }
      tradeItems(targetPlayer, myItem, theirItem);
    } else {
      out('\x1b[31m⚠ Trade must be a fair exchange — both sides give something.\x1b[0m');
      out('\x1b[31mUsage: trade &lt;player&gt; &lt;your item&gt; for &lt;their item&gt;\x1b[0m');
      out('\x1b[2mExample: trade Jianran katana for medkit\x1b[0m');
      out('\x1b[2mYou must offer an item from YOUR inventory.\x1b[0m');
    }
  }
  else if (lower === 'familyclue') {
    startFamilyClue();
  }
  else if (lower === 'createclue') {
    if (gameState.clueMaster && gameState.clueMaster !== player.name) {
      // Must fight the Clue Master
      var cm = gameState.players[gameState.clueMaster.toLowerCase()];
      if (cm) {
        out('\n\x1b[1;31m👑 '+escapeHtml(gameState.clueMaster)+' is the Clue Master! You must defeat them to create a clue!\x1b[0m');
        doAttack(gameState.clueMaster);
      } else {
        out('\x1b[31mClue Master not found.\x1b[0m');
      }
    } else if (player.artifacts && player.artifacts.length >= 4) {
      out('\n\x1b[1;33m👑 CLUE MASTER: Create your custom clue!\x1b[0m');
      out('\x1b[2mType: createclue &lt;clue name&gt; | &lt;city&gt; | &lt;answer&gt;\x1b[0m');
      out('\x1b[2mExample: createclue The Secret Cave | Bermuda | crystal\x1b[0m');
    } else {
      out('\x1b[33mYou need all 4 artifacts to create a clue. Current: '+(player.artifacts?player.artifacts.length:0)+'/4\x1b[0m');
    }
  }
  else if (lower.startsWith('createclue ')) {
    if (gameState.clueMaster && gameState.clueMaster !== player.name) {
      var cm = gameState.players[gameState.clueMaster.toLowerCase()];
      if (cm) {
        out('\n\x1b[1;31m👑 '+escapeHtml(gameState.clueMaster)+' is the Clue Master! You must defeat them first!\x1b[0m');
        doAttack(gameState.clueMaster);
      }
    } else if (player.artifacts && player.artifacts.length >= 4) {
      var clueParts = cmd.split('|').map(function(s){ return s.trim(); });
      if (clueParts.length >= 3) {
        var clueName = clueParts[0].replace(/^createclue\s+/i,'');
        var clueCity = clueParts[1];
        var clueAnswer = clueParts[2];
        var newClue = {
          id: 'custom_' + Date.now(),
          name: clueName,
          city: clueCity,
          region: 'CUSTOM CLUES',
          number: DATA.locations.length + 1,
          points: 50,
          mystery: 'A custom clue forged by '+player.name+' of House '+DATA.families[player.family].name+'.',
          stages: [{desc:'Investigate the custom clue: '+clueName+'. What do you find?', triggers:['examine area','search around','look closely','investigate'], success:'You uncover the hidden truth of '+clueName+'!', hint:'The answer is: '+clueAnswer}],
          final_answer: clueAnswer,
          lore: 'Custom clue created by the Clue Master '+player.name+'.',
          answer_hint: clueAnswer
        };
        DATA.locations.push(newClue);
        out('\n\x1b[1;32m✅ Custom clue created! Clue #'+newClue.number+': '+escapeHtml(clueName)+' in '+escapeHtml(clueCity)+'\x1b[0m');
        out('\x1b[32mAnswer: '+escapeHtml(clueAnswer)+' | Points: 50\x1b[0m');
        player.points += 100;
        out('\x1b[33m+100 pts for creating a clue!\x1b[0m');
        save();
      } else {
        out('\x1b[31mFormat: createclue &lt;clue name&gt; | &lt;city&gt; | &lt;answer&gt;\x1b[0m');
      }
    } else {
      out('\x1b[33mYou need all 4 artifacts. Current: '+(player.artifacts?player.artifacts.length:0)+'/4\x1b[0m');
    }
  }
  else if (lower === 'families' || lower === 'family') { showFamilies(); }
  else if (lower === 'quit' || lower === 'exit') {
    save(); out('\x1b[32mSaved. Goodbye.\x1b[0m'); player = null; showTitle();
  }
  else if (lower.startsWith('go ') || lower.startsWith('travel ')) {
    out('\x1b[33mThe race is sequential! Solve Clue '+(player.current_location_index+1)+' first.\x1b[0m');
  }
  else { handlePuzzleAction(cmd); }
}

var drawColor = '#fff';
var isDrawing = false;

function initCanvas() {
  setTimeout(function(){
    var c = document.getElementById('draw-canvas');
    if (!c) return;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#222';
    ctx.fillRect(0,0,200,200);
    // Load existing avatar
    if (player && player.avatar) {
      var img = new Image();
      img.onload = function(){ ctx.drawImage(img,0,0,200,200); };
      img.src = player.avatar;
    }
    c.onmousedown = function(e){ isDrawing=true; drawDot(e); };
    c.onmouseup = function(){ isDrawing=false; ctx.beginPath(); };
    c.onmousemove = function(e){ if(isDrawing) drawDot(e); };
    c.ontouchstart = function(e){ e.preventDefault(); isDrawing=true; drawDot(e.touches[0]); };
    c.ontouchend = function(){ isDrawing=false; ctx.beginPath(); };
    c.ontouchmove = function(e){ e.preventDefault(); if(isDrawing) drawDot(e.touches[0]); };
  }, 200);
}

function drawDot(e) {
  var c = document.getElementById('draw-canvas');
  if (!c) return;
  var rect = c.getBoundingClientRect();
  var scaleX = 200 / rect.width;
  var scaleY = 200 / rect.height;
  var x = (e.clientX - rect.left) * scaleX;
  var y = (e.clientY - rect.top) * scaleY;
  var ctx = c.getContext('2d');
  ctx.fillStyle = drawColor;
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI*2);
  ctx.fill();
}

function setDrawColor(c) { drawColor = c; }
function clearCanvas() {
  var c = document.getElementById('draw-canvas');
  if (!c) return;
  var ctx = c.getContext('2d');
  ctx.fillStyle = '#222';
  ctx.fillRect(0,0,200,200);
}

function saveAvatar() {
  var c = document.getElementById('draw-canvas');
  if (!c) return;
  player.avatar = c.toDataURL('image/png');
  save();
  var preview = document.getElementById('avatar-preview');
  if (preview) { preview.style.backgroundImage = 'url('+player.avatar+')'; preview.style.backgroundSize='cover'; preview.innerHTML=''; }
  document.getElementById('avatar-editor').style.display = 'none';
  out('\x1b[32m✅ Avatar saved!\x1b[0m');
}

function toggleAvatarEditor() {
  var ed = document.getElementById('avatar-editor');
  if (ed) ed.style.display = ed.style.display === 'none' ? 'block' : 'none';
}

function capturePhoto() {
  document.getElementById('photo-input').click();
}

function loadPhoto(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var c = document.getElementById('draw-canvas');
      if (!c) return;
      var ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 200, 200);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

  if (answer.toLowerCase().includes(correct) || correct.includes(answer.toLowerCase())) {
    player.family_clue_attempted = true;
    player.family_clue_passed = true;
    if (!player.artifacts) player.artifacts = [];

      player.family_clue_passed = false;

      player.artifacts.push(fc.artifact);
      out('\n\x1b[33m'+(gameState.artifact_counts[fc.artifact])+' '+fc.artifactName+'s remaining.\x1b[0m');
      checkArtifactMastery();

      out('║   🏆 ARTIFACT CLAIMED! 🏆       ║');
      out('╚══════════════════════════════════╝\x1b[0m');
      out('');

      out('\x1b[2mArtifacts: '+player.artifacts.length+'/4\x1b[0m');

        gameState.clueMaster = player.name;

function handlePuzzleAction(action) {
  // Check if family clue answer
  if (familyClueActive && familyClueActive.waitingAnswer) {
    if (checkFamilyAnswer(action)) return;
  }
  const idx = player.current_location_index;
  if (idx >= DATA.locations.length) return;
  const loc = DATA.locations[idx];
  if (player.solved_locations.includes(loc.id)) return;
  const progress = player.location_progress[loc.id] || 0;

  if (progress >= loc.stages.length) {
    if (answerMatches(action, loc.final_answer)) {
      player.wrong_answers = 0;
      solveLocation(loc);
    } else {
      player.wrong_answers = (player.wrong_answers || 0) + 1;
      const w = player.wrong_answers;
      out('\n\x1b[31mThat\'s not the answer. ('+w+' wrong attempt'+(w>1?'s':'')+')\x1b[0m');
      if (closeMatch(action, loc.final_answer)) out('\x1b[33mClose! Check your spelling.\x1b[0m');
      if (w > 2) {
        const penalty = w - 2;
        player.points = Math.max(0, player.points - penalty);
        out('\x1b[31mPenalty: -'+penalty+' point'+(penalty>1?'s':'')+'! (Total: '+player.points+')\x1b[0m');
      }
      if (loc.answer_hint) out('\x1b[2mHint: '+escapeHtml(loc.answer_hint)+'\x1b[0m');
    }
    return;
  }

  const stage = loc.stages[progress];
  if (matchesTrigger(action, stage.triggers)) {
    out('\n\x1b[32m'+stage.success+'\x1b[0m');
    player.points += 10;
    out('\x1b[32m+10 points! (Total: '+player.points+')\x1b[0m');
    player.location_progress[loc.id] = progress + 1;
    save();
    if (player.location_progress[loc.id] >= loc.stages.length) {
      promptFinalAnswer(loc);
    } else {
      const ns = loc.stages[player.location_progress[loc.id]];
      out('\n\x1b[1mInvestigation — Stage '+(player.location_progress[loc.id]+1)+'/'+loc.stages.length+'\x1b[0m');
      out(ns.desc);
      showInvestigationOptions(ns);
    }
  } else {
    out('\n\x1b[31mThat doesn\'t seem to help.\x1b[0m');
    out('\x1b[2mHint: '+escapeHtml(stage.hint)+'\x1b[0m');
  }
}
