        d._kbSpeechShown = true; // only show once
      } else {
        d.bossIntroTimer = 2.5;
      }
    } else {
      d.showingBossIntro = false;
      d.bossIntroTimer = 0;
    }
  },

  update(dt) {
    // Handle transitions
    if (this._transitionTimer > 0) {
      this._transitionTimer -= dt;
      if (this._transitionTimer <= 0 && this._transitionTarget) {
        this.switchTo(this._transitionTarget);
        this._transitionTarget = null;
      }
      return;
    }

    switch (this._current) {
      case 'Title':
        // START GAME — always check first, regardless of code entry state
        if (SB.Input.pressed('Enter') || SB.Input.pressed('KeyX') || SB.Input.pressed('Space')) {
          // If code entry is active with content, Enter submits it instead
          if (this._codeEntry && this._codeEntry.length > 0 && SB.Input.pressed('Enter')) {
            if (this._codeEntry === '6724') { this._codeResult = 'success'; this._pendingReward = Math.random() < 0.5 ? 'lightning' : 'ultra_star'; }
            else { this._codeResult = 'fail'; }
            this._codeResultTimer = 2.0;
          } else {
            // Start the game!
            this._codeEntry = null; this._codeResult = null;
            SB.Audio.ensureCtx(); SB.Audio.stopTitleMusic();
            this.switchTo('Playing'); SB.Audio.startMusic();
          }
          break;
        }
        // Mode select
        if (SB.Input.pressed('Digit1') || SB.Input.pressed('Numpad1')) { this._pendingMode = '1P'; SB.Audio.sfxJump(); }
        if (SB.Input.pressed('Digit2') || SB.Input.pressed('Numpad2')) { this._pendingMode = '2P'; SB.Audio.sfxJump(); }
        if (SB.Input.pressed('Tab')) { this._pendingMode = this._pendingMode === '1P' ? '2P' : '1P'; SB.Audio.sfxJump(); }
        // Code entry
        if (SB.Input.pressed('KeyC')) { this._codeEntry = this._codeEntry ? null : ''; this._codeResult = null; }
        if (SB.Input.pressed('Escape')) { this._codeEntry = null; this._codeResult = null; }
        if (this._codeEntry !== undefined && this._codeEntry !== null) {
          for (const d of ['Digit0','Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9']) {
            if (SB.Input.pressed(d)) this._codeEntry += d.replace('Digit','');
          }
          if (SB.Input.pressed('Backspace')) this._codeEntry = this._codeEntry.slice(0, -1);
        }
        if (this._codeResultTimer > 0) { this._codeResultTimer -= 1/60; if (this._codeResultTimer <= 0) { this._codeEntry = null; this._codeResult = null; } }
        break;

      case 'Playing': this._updatePlaying(dt); break;
      case 'GameOver':
        if (SB.Input.pressed('Enter')) {
          this._data.score = 0;
          this.switchTo('Playing');
        }
        break;
      case 'Victory':
        if (SB.Input.pressed('Enter')) {
          this.switchTo('Title');
        }
        break;
      case 'StageClear': this._updateStageClear(dt); break;
    }
  },

  _updatePlaying(dt) {
    const d = this._data;
    const lvl = SB.getLevelData(d.floorNum);

    // Boss intro / Code reveal sequence
    if (d.showingBossIntro) {
      d.bossIntroTimer -= dt;
      // Floor 200 code reveal sequence
      if (d._codeRevealed && d._codeRevealPhase < 3) {
        d._codeRevealTimer += dt;
        if (d._codeRevealTimer > 2.0) { d._codeRevealPhase++; d._codeRevealTimer = 0; d.screenShake = 0.5; SB.Audio.sfxClear(); }
        if (d._codeRevealPhase >= 3) {
          d.showingBossIntro = false;
          d.stageClear = true; d.stageClearTimer = 1.0;
        }
        d.timer -= dt; if (d.timer <= 0) this._gameOver();
        return;
      }
      // King Blizzard speech progression
      if (d._kbSpeech && d._kbSpeechIndex < d._kbSpeech.length) {
        d._kbSpeechTimer -= dt;
        // Advance to next line every 1.8s, or skip with Enter
        if (d._kbSpeechTimer <= 0 || SB.Input.pressed('Enter') || SB.Input.pressed('KeyX')) {
          d._kbSpeechIndex++;
          d._kbSpeechTimer = 1.8;
          d.screenShake = 0.3; // slight shake on each line
        }
        if (d._kbSpeechIndex >= d._kbSpeech.length) {
          d._kbSpeech = null;
          d.bossIntroTimer = Math.min(d.bossIntroTimer, 1.0); // wrap up quickly
        }
      }
      if (d.bossIntroTimer <= 0) d.showingBossIntro = false;
      // Still update timer
      d.timer -= dt;
      if (d.timer <= 0) this._gameOver();
      return;
    }

    // Special platform behaviors
    for (const p of d.platforms) {
      const sp = p.special;
      if (!sp) continue;
      // Check if player is on this platform
      let playerOn = false;
      for (const pl of [d.player, d.player2]) {
        if (pl && pl.onGround && pl.x+pl.w > p.x && pl.x < p.x+p.w && pl.y+pl.h >= p.y-2 && pl.y+pl.h <= p.y+6) playerOn = true;
      }
      // --- Behavior by type ---
      if (sp === 'crumble') {
        if (playerOn) { p._crumbleLife = (p._crumbleLife||1.5) - dt; if (p._crumbleLife <= 0) p.type = 'broken'; }
      } else if (sp === 'conveyor') {
        const dir = (Math.floor(p.x/50) % 2 === 0) ? 1 : -1;
        for (const pl of [d.player, d.player2]) if (pl && pl.onGround && pl.x+pl.w > p.x && pl.x < p.x+p.w && pl.y+pl.h >= p.y-2 && pl.y+pl.h <= p.y+2) pl.x += dir * 150 * dt;
      } else if (sp === 'steam') {
        p._steamTimer = (p._steamTimer||0) - dt;
        if (p._steamTimer <= 0) { p._steamTimer = 2 + Math.random()*2; p._steaming = true; p._steamLife = 0.6; }
        if (p._steaming) { p._steamLife -= dt; if (p._steamLife <= 0) p._steaming = false; }
        if (p._steaming) for (const pl of [d.player, d.player2]) {
          if (pl && pl.x+pl.w > p.x && pl.x < p.x+p.w && Math.abs(pl.y+pl.h - p.y) < 60) {
            pl.vy = -500; pl.speed = SB.CONFIG.PLAYER_SPEED; pl.shotPower = 1; pl.shotRange = 1;
          }
        }
      } else if (sp === 'trampoline') {
        if (playerOn) for (const pl of [d.player, d.player2]) if (pl && pl.onGround && pl.x+pl.w > p.x && pl.x < p.x+p.w) pl.vy = -700;
      } else if (sp === 'spiked') {
        for (const pl of [d.player, d.player2]) if (pl && pl.x+pl.w > p.x && pl.x < p.x+p.w && pl.y > p.y+2 && pl.y < p.y+p.h+2) pl.takeDamage();
      } else if (sp === 'phase') {
        p._phaseTimer = (p._phaseTimer||3) - dt;
        if (p._phaseTimer <= 0) { p._phaseTimer = 3; p._phased = !p._phased; }
        p.type = p._phased ? 'broken' : 'solid';
      } else if (sp === 'sticky') {
        for (const pl of [d.player, d.player2]) if (pl && pl.onGround && pl.x+pl.w > p.x && pl.x < p.x+p.w && pl.y+pl.h >= p.y-2 && pl.y+pl.h <= p.y+2) { pl.speed = SB.CONFIG.PLAYER_SPEED * 0.4; }
      } else if (sp === 'ice') {
        for (const pl of [d.player, d.player2]) if (pl && pl.onGround && pl.x+pl.w > p.x && pl.x < p.x+p.w && pl.y+pl.h >= p.y-2 && pl.y+pl.h <= p.y+2) { pl.vx += (pl.vx > 0 ? 1 : -1) * 80 * dt; }
      } else if (sp === 'magnetic') {
        for (const gs of d.giantSnowballs) if (gs.alive && gs.x+gs.w > p.x-40 && gs.x < p.x+p.w+40) { gs.vx += ((p.x+p.w/2) - (gs.x+gs.w/2)) * 3 * dt; }
      } else if (sp === 'seesaw') {
        let leftW = 0, rightW = 0;
        for (const pl of [d.player, d.player2]) {
          if (pl && pl.x+pl.w > p.x && pl.x < p.x+p.w/2) leftW++;
          else if (pl && pl.x+pl.w > p.x+p.w/2 && pl.x < p.x+p.w) rightW++;
        }
        p._tilt = (rightW - leftW) * 0.15;
      } else if (sp === 'portal') {
        const pair = d.platforms.find(pp => pp !== p && pp.special === 'portal');
        if (pair) for (const pl of [d.player, d.player2]) {
          if (pl && pl.x+pl.w > p.x+p.w-8 && pl.x < p.x+p.w && Math.abs(pl.y - p.y) < 10) { pl.x = pair.x + 10; pl.y = pair.y - pl.h; }
        }
      } else if (sp === 'zerog') {
        p.y += Math.sin(Date.now()/2000 + p.x*0.01) * 40 * dt;
      } else if (sp === 'accordion') {
        p._accordionState = (p._accordionState||0) + dt;
        const cycle = Math.sin(p._accordionState * 1.5);
        p.w = p._origW || p.w || 200;
        if (!p._origW) p._origW = p.w;
        p.w = p._origW * (0.3 + Math.abs(cycle) * 0.7);
      } else if (sp === 'mimic') {
        let idle = true;
        for (const pl of [d.player, d.player2]) if (pl && pl.x+pl.w > p.x && pl.x < p.x+p.w && pl.y+pl.h >= p.y-4 && pl.y+pl.h <= p.y && Math.abs(pl.vx) < 10) idle = true;
        if (idle) { p._mimicAngry = (p._mimicAngry||0) + dt; if (p._mimicAngry > 1.5) for (const pl of [d.player, d.player2]) if (pl && pl.onGround && pl.x+pl.w > p.x && pl.x < p.x+p.w) pl.takeDamage(); }
        else p._mimicAngry = 0;
      } else if (sp === 'acid') {
        p._acidTimer = (p._acidTimer||0) - dt;
        if (p._acidTimer <= 0) { d._acidDrips = d._acidDrips || []; d._acidDrips.push({x:p.x+Math.random()*p.w, y:p.y+p.h, vy:40, life:2}); p._acidTimer = 0.5+Math.random(); }
      } else if (sp === 'crystal') {
        if (p._crystalIntact === false) { p._crystalRegen = (p._crystalRegen||0) + dt; if (p._crystalRegen > 3) { p._crystalIntact = true; p.type = 'solid'; } }
      }
    }
    // Broken/crystal-shattered platforms
    d.platforms = d.platforms.filter(p => p.type !== 'broken');
    // Acid drips
    if (d._acidDrips) { for (const ad of d._acidDrips) { ad.y += ad.vy*dt; ad.vy += 300*dt; ad.life -= dt; } d._acidDrips = d._acidDrips.filter(a => a.life>0); }

    // Update players
    d.player.update(dt, d.platforms);
    if (d.player2) d.player2.update(dt, d.platforms);

    // Shoot
    const p1Shoot = SB.Input.pressed('KeyX') || SB.Input.pressed('Space');
    const p2Shoot = SB.Input.pressed('KeyE') || SB.Input.pressed('KeyQ');
    // P1 shoot
    if (!d.player.balloonMode && p1Shoot) {
      const s = d.player.shoot(); if (s) d.snowballs.push(s);
    }
    // P2 shoot
    if (d.player2 && !d.player2.balloonMode && p2Shoot && !p1Shoot) {
      const s = d.player2.shoot(); if (s) d.snowballs.push(s);
    }

    // Update snowballs
    for (const s of d.snowballs) s.update(dt, d.platforms);
    d.snowballs = d.snowballs.filter(s => s.alive);

    // Update enemies (expose for Angler Fish suction)
    for (const e of d.enemies) {
      if (e.launched) { e.launchVY += 600*dt; e.x += e.launchVX*dt; e.y += e.launchVY*dt; e.launchLife -= dt; }
      else if (e.alive) e.update(dt, d.platforms, d.player);
    }
    window._SB_enemies = d.enemies;
    window._SB_sceneData = d;

    // Update bosses
    if (d.boss && d.boss.alive) d.boss.update(dt, d.platforms, d.player);
    if (d.boss2 && d.boss2.alive) d.boss2.update(dt, d.platforms, d.player);

    // Update giant snowballs
    for (const gs of d.giantSnowballs) gs.update(dt, d.platforms, d.player);
    d.giantSnowballs = d.giantSnowballs.filter(gs => gs.alive);

    // Update potions
    for (const p of d.potions) p.update(dt, d.platforms);
    d.potions = d.potions.filter(p => p.alive);

    // Update money cards
    for (const m of d.moneyCards) m.update(dt);
    d.moneyCards = d.moneyCards.filter(m => m.alive);

    // Update lightning strikes + screen effects
    if (d._lightningStrikes) {
      d._lightningTimer -= dt;
      for (const ls of d._lightningStrikes) ls.life -= dt;
      d._lightningStrikes = d._lightningStrikes.filter(ls => ls.life > 0);
      if (d._boltAfterimages) { for (const ai of d._boltAfterimages) ai.life -= dt; d._boltAfterimages = d._boltAfterimages.filter(ai => ai.life > 0); }
      if (d._lightningTimer <= 0) { d._lightningStrikes = null; d._boltAfterimages = null; }
    }
    d.screenShake = Math.max(0, d.screenShake - dt);
    d.violetFlash = Math.max(0, d.violetFlash - dt);
    // Enemy electrocution timer
    for (const e of d.enemies) { if (e.electrocuted) e.electroTimer = Math.max(0, (e.electroTimer||0) - dt); }

    // Update hearts
    for (const h of d.hearts) h.update(dt, d.platforms);
    d.hearts = d.hearts.filter(h => h.alive);

    // Update pumpkin ghost — chase nearest player
    if (d.pumpkinGhost) {
      const p2 = d.player2;
      const target = (p2 && SB.Utils.dist(d.pumpkinGhost, p2) < SB.Utils.dist(d.pumpkinGhost, d.player)) ? p2 : d.player;
      d.pumpkinGhost.update(dt, d.platforms, target);
    }

    // Update ultra-star
    if (d.ultraStar) { d.ultraStar.update(dt, d.platforms); if (!d.ultraStar.alive) d.ultraStar = null; }

    // Update trained monster
    if (d.trainedMonster) {
      d.trainedMonster.update(dt, d.platforms, d.player, d.enemies, [d.boss, d.boss2].filter(Boolean));
      if (!d.trainedMonster.alive) d.trainedMonster = null;
    }

    // Update train result timer
    if (d.trainResultTimer > 0) d.trainResultTimer -= dt;

    // Frost Potion aura — slow nearby enemies
    if (d.player.frostAura) {
      d.player.frostTimer = (d.player.frostTimer || 0) - dt;
      if (d.player.frostTimer <= 0) { d.player.frostAura = false; }
      for (const e of d.enemies) {
        if (!e.alive) continue;
        if (SB.Utils.dist(d.player, e) < 120) { e.frostSlowed = true; e.frostSlowTimer = 0.3; }
      }
    }
    for (const e of d.enemies) {
      if (e.frostSlowed) { e.frostSlowTimer -= dt; if (e.frostSlowTimer <= 0) e.frostSlowed = false; }
    }

    // King Blizzard - dark ice aura (slows player near boss)
    if (d.boss && d.boss instanceof SB.KingBlizzard && d.boss.alive && d.boss.darkIceActive) {
      const dist = SB.Utils.dist(d.player, d.boss);
      const auraRadius = 400; // massive aura for the colossus
      if (dist < auraRadius) {
        const factor = 1 - (1 - SB.CONFIG.DARK_ICE_SLOW) * (1 - dist/auraRadius);
        d.player.speed = SB.CONFIG.PLAYER_SPEED * Math.max(0.3, factor);
        if (d.player.shotRange > 0.3) d.player.shotRange = Math.max(0.3, 1 - (1-SB.CONFIG.DARK_ICE_RANGE_REDUCE)*(1-dist/auraRadius));
      }
    }

    // King Blizzard - blizzard damage (instant kill if not under cover)
    if (d.boss && d.boss instanceof SB.KingBlizzard && d.boss.alive && d.boss.blizzardActive && d.boss.blizzardWarning <= 0) {
      if (!d.player.balloonMode && !d.player.ultraStarMode) {
        // Check if player is under a platform (cover)
        let underCover = false;
        for (const p of d.platforms) {
          if (p.type === 'solid' && d.player.x + d.player.w > p.x && d.player.x < p.x + p.w) {
            if (d.player.y + d.player.h <= p.y + 4 && d.player.y + d.player.h >= p.y - 8) {
              underCover = true; break;
            }
          }
        }
        if (!underCover) {
          d.player.takeDamage();
          d.player.takeDamage(); // Double damage from blizzard
        }
      }
    }

    // King Blizzard - mini clone projectiles
    if (d.boss && d.boss instanceof SB.KingBlizzard && d.boss.alive) {
      for (const c of d.boss.miniClones) {
        if (c.attackTimer <= 0.1 && c.attackTimer > 0 && !d.player.balloonMode && !d.player.ultraStarMode && d.player.damageCooldown <= 0) {
          // Clone fires a projectile at player
          const dx = d.player.x - c.x;
          const dy = d.player.y - c.y;
          const cdist = Math.sqrt(dx*dx+dy*dy);
          if (cdist < 50) d.player.takeDamage();
        }
      }
    }

    // Lava update (Floor 200)
    if (d.hasLava) {
      const lavaSpeed = (SB.CONFIG.H + 200) / SB.CONFIG.LAVA_RISE_TIME; // pixels per second
      d.lavaLevel -= lavaSpeed * dt;
      if (d.lavaLevel < 0) d.lavaLevel = 0;
      // Check if player is in lava
      if (d.player.y + d.player.h >= d.lavaLevel && !d.player.balloonMode && !d.player.ultraStarMode && d.player.invincibleTimer <= 0) {
        d.player.alive = false;
        d.player.lives = 0;
        SB.Audio.sfxDeath();
        SB.spawnParticles(d.player.x+d.player.w/2, d.player.y+d.player.h/2, 25, '#ff4400', 150, 0.8, 5);
      }
    }

    // --- COLLISION CHECKS ---

    // Snowball vs crystal platforms — shatter them
    for (const s of d.snowballs) {
      for (const p of d.platforms) {
        if (p.special === 'crystal' && p._crystalIntact && SB.Physics.rectCollide(s, p)) { p._crystalIntact = false; p.type = 'broken'; p._crystalRegen = 0; s.alive = false; }
        if (p.special === 'forcefield' && SB.Physics.rectCollide(s, p)) s.alive = false; // forcefield blocks snow
      }
    }
    // Snowball vs Enemies
    for (const s of d.snowballs) {
      for (const e of d.enemies) {
        if (!e.alive) continue;
        if (SB.Physics.rectCollide(s, e)) {
          e.freeze(s.freezeAmount);
          s.alive = false;
          if (e.isFrozen()) {
            const gs = new SB.GiantSnowball(e.x, e.y, e.type);
            gs.shatterOnKick = true; // Shatter effect
            d.giantSnowballs.push(gs);
            d.score += Math.floor(200 * (d.player.combo || 1));
            e.alive = false;
            SB.spawnParticles(e.x+e.w/2, e.y+e.h/2, 15, '#ccddff', 80, 0.5, 3);
            // Drop potion
            if (Math.random() < SB.CONFIG.POTION_DROP_CHANCE) {
              const highFloor = d.floorNum >= 80;
              const types = highFloor ? ['speed','power','range','invincible','lightning'] : ['speed','power','range','invincible'];
              const r = Math.random();
              const type = r < 0.04 && highFloor ? 'lightning' : (r < 0.12 ? 'invincible' : types[Math.floor(Math.random()*3)]);
              d.potions.push(new SB.Potion(e.x + e.w/2 - 9, e.y, type));
            }
          }
          break;
        }
      }
      // Snowball vs Pumpkin Ghost — teleports it away
      if (d.pumpkinGhost && s.alive && SB.Physics.rectCollide(s, d.pumpkinGhost)) {
        d.pumpkinGhost.hit(); s.alive = false;
      }
      // Snowball vs Boss(es)
      for (const b of [d.boss, d.boss2]) {
        if (!b || !b.alive || !s.alive) continue;
        // Angler Fish mouth weakness: 2 hits to exposed mouth = instant kill
        if (b instanceof SB.AnglerFish && b.mouthOpen) {
          const mouthBox = {x:b.x+b.w*0.2, y:b.y+b.h*0.2, w:b.w*0.6, h:b.h*0.55};
          if (SB.Physics.rectCollide(s, mouthBox)) {
            b.mouthHitCount++; b.mouthHitFlash = 0.3;
            s.alive = false;
            SB.spawnParticles(s.x, s.y, 10, '#ff8800', 100, 0.4, 3);
            if (b.mouthHitCount >= 2) {
              // Trigger dramatic death sequence
              b.dying = true; b.deathTimer = 2.2; b.deathPhase = 0;
              b.mouthOpen = false; b.suctionActive = false;
              b.eyesPopped = true; b.inflateScale = 1;
              SB.Audio.sfxBossHit();
            }
            continue;
          }
        }
        if (SB.Physics.rectCollide(s, b)) {
          b.hit(d.player.ultraStarMode ? SB.CONFIG.ULTRA_STAR_POWER_MULT : 1);
          s.alive = false;
        }
      }
    }

    // Giant Snowball vs Enemies
    for (const gs of d.giantSnowballs) {
      if (gs.beingPushed) continue;
      for (const e of d.enemies) {
        if (!e.alive || gs.crushed.has(e)) continue;
        if (SB.Physics.rectCollide(gs, e)) {
          gs.crushed.add(e);
          // Comical launch — enemy flies off screen
          e.launchVX = gs.vx > 0 ? 300 : -300;
          e.launchVY = -400 - Math.random()*200;
          e.launchSpin = (Math.random()-0.5)*10;
          e.launched = true; e.launchLife = 1.2;
          e.alive = false;
          d.score += 500; // big point reward for crush
          SB.Audio.sfxCrush();
          SB.spawnParticles(e.x+e.w/2, e.y+e.h/2, 20, '#ffffff', 150, 0.6, 4);
          // Small chance of potion drop on crush
          if (Math.random() < 0.1) {
            const highFloor = d.floorNum >= 80;
            const types = highFloor ? ['speed','power','range','invincible','lightning','frost','shield','blizzard_horn'] : ['speed','power','range','invincible','frost','shield','blizzard_horn'];
            const r = Math.random();
            const type = r < 0.03 && highFloor ? 'lightning' : (r < 0.06 ? 'blizzard_horn' : (r < 0.08 ? 'invincible' : (r < 0.14 ? 'frost' : (r < 0.20 ? 'shield' : types[Math.floor(Math.random()*3)]))));
            d.potions.push(new SB.Potion(e.x + e.w/2 - 9, e.y, type));
          }
        }
      }
      // Giant Snowball vs Pumpkin Ghost
      if (d.pumpkinGhost && !gs.beingPushed && SB.Physics.rectCollide(gs, d.pumpkinGhost)) {
        d.pumpkinGhost.hit(); gs.vx = -gs.vx * 0.5;
      }
      // Giant Snowball vs Boss(es)
      for (const b of [d.boss, d.boss2]) {
        if (b && b.alive && !gs.beingPushed && SB.Physics.rectCollide(gs, b)) {
          b.hit(d.player.ultraStarMode ? SB.CONFIG.ULTRA_STAR_POWER_MULT * 2 : 2);
          gs.vx = -gs.vx * 0.6;
        }
      }
    }

    // Player vs Enemies (damage) — check both players
    for (const pl of [d.player, d.player2]) {
      if (!pl || pl.balloonMode || pl.invincibleTimer > 0 || pl.damageCooldown > 0) continue;
      for (const e of d.enemies) {
        if (!e.alive) continue;
        if (SB.Physics.rectCollide(pl, e)) { pl.takeDamage(); break; }
      }
    }

    // Player vs Enemy fires (Monster)
    if (!d.player.balloonMode && d.player.invincibleTimer <= 0 && d.player.damageCooldown <= 0) {
      for (const e of d.enemies) {
        if (!e.alive || !e.fires) continue;
        for (const f of e.fires) {
          if (SB.Physics.rectCollide(d.player, f)) {
            d.player.takeDamage();
            break;
          }
        }
      }
    }

    // Player vs Yeti bombs + ground fires
    if (!d.player.balloonMode && d.player.invincibleTimer <= 0 && d.player.damageCooldown <= 0) {
      for (const e of d.enemies) {
        if (!e.alive) continue;
        if (e.bombs) for (const b of e.bombs) {
          if (!b.exploded) {
            if (SB.Physics.rectCollide(d.player, { x:b.x-b.r, y:b.y-b.r, w:b.r*2, h:b.r*2 })) { d.player.takeDamage(); break; }
          } else {
            if (SB.Physics.rectCollide(d.player, { x:b.x-25, y:b.y-25, w:50, h:50 })) { d.player.takeDamage(); break; }
          }
        }
        if (e.groundFires) for (const gf of e.groundFires) {
          if (SB.Physics.rectCollide(d.player, {x:gf.x-gf.size, y:gf.y-gf.size, w:gf.size*2, h:gf.size*2})) { d.player.takeDamage(); break; }
        }
      }
    }

    // Player vs Boss(es) — both players
    for (const pl of [d.player, d.player2]) {
      if (!pl || pl.balloonMode || pl.damageCooldown > 0 || pl.invincibleTimer > 0) continue;
      for (const b of [d.boss, d.boss2]) {
        if (b && b.alive && SB.Physics.rectCollide(pl, b)) { pl.takeDamage(); break; }
      }
    }

    // Player vs Boss lava drips (Magma Slime)
    if (d.boss && d.boss.alive && d.boss.lavaDrips && !d.player.balloonMode && d.player.damageCooldown <= 0 && d.player.invincibleTimer <= 0) {
      for (const drip of d.boss.lavaDrips) {
        if (SB.Physics.rectCollide(d.player, { x:drip.x-5, y:drip.y-5, w:10, h:10 })) {
          d.player.takeDamage();
          break;
        }
      }
    }

    // Player vs Lightning (Thunder Djinn — check both twins)
    if (!d.player.balloonMode && d.player.damageCooldown <= 0 && d.player.invincibleTimer <= 0) {
      for (const b of [d.boss, d.boss2]) {
        if (b && b.alive && b.lightningStrikes) {
          for (const s of b.lightningStrikes) {
            if (s.warnTimer <= 0 && s.life > 0) {
              if (d.player.x + d.player.w > s.x - 10 && d.player.x < s.x + 10) {
                d.player.takeDamage();
                break;
              }
            }
          }
        }
      }
    }

    // Player vs Gorgon laser beams
    if (!d.player.balloonMode && d.player.damageCooldown <= 0 && d.player.invincibleTimer <= 0 && !d.player.petrified) {
      for (const b of [d.boss, d.boss2]) {
        if (b && b.alive && b.laserBeams) for (const lb of b.laserBeams) {
          if (SB.Physics.rectCollide(d.player, lb)) {
            d.player.petrified = true; d.player.petrifyTimer = 3.0; d.player.petrifiedBy = b;
            SB.Audio.sfxHit(); SB.spawnParticles(d.player.x+d.player.w/2, d.player.y+d.player.h/2, 15, '#aaaaaa', 60, 0.8, 4);
            break;
          }
        }
        // Falling bricks
        if (b && b.alive && b.fallingBricks) for (const fb of b.fallingBricks) {
          if (SB.Physics.rectCollide(d.player, fb)) { d.player.takeDamage(); break; }
        }
      }
    }
    // Petrification timer
    if (d.player.petrified) {
      d.player.petrifyTimer -= dt;
      if (d.player.petrifyTimer <= 0) { d.player.takeDamage(); d.player.petrified = false; }
    }

    // Player vs Cuckoo Clock pendulum
    if (!d.player.balloonMode && d.player.damageCooldown <= 0 && d.player.invincibleTimer <= 0) {
      for (const b of [d.boss, d.boss2]) {
        if (b && b.alive && b instanceof SB.CuckooClock) {
          const tip = b.getPendulumTip();
          if (SB.Physics.rectCollide(d.player, {x:tip.x-8, y:tip.y-8, w:16, h:16})) {
            d.player.takeDamage();
          }
        }
      }
    }

    // Player vs Angler Fish spit projectiles
    if (!d.player.balloonMode && d.player.damageCooldown <= 0 && d.player.invincibleTimer <= 0) {
      for (const b of [d.boss, d.boss2]) {
        if (b && b.alive && b.spitProjectiles) for (const sp of b.spitProjectiles) {
          if (SB.Physics.rectCollide(d.player, {x:sp.x-8, y:sp.y-8, w:16, h:16})) { d.player.takeDamage(); break; }
        }
      }
    }

    // Acid drip collision
    if (d._acidDrips) for (const ad of d._acidDrips) {
      for (const pl of [d.player, d.player2]) {
        if (pl && pl.damageCooldown <= 0 && pl.invincibleTimer <= 0 && !pl.balloonMode && SB.Physics.rectCollide(pl, {x:ad.x-4, y:ad.y-4, w:8, h:8})) pl.takeDamage();
      }
    }
    // Shadow platforms — no collision (pass through)
    for (const p of d.platforms) { if (p.special === 'shadow') p.type = 'shadow_pass'; }

    // Player vs new boss projectiles (Jester balls, Cauldron acid, Necromancer minions)
    if (!d.player.balloonMode && d.player.damageCooldown <= 0 && d.player.invincibleTimer <= 0) {
      for (const b of [d.boss, d.boss2]) {
        if (!b || !b.alive) continue;
        // Jester bouncing balls
        if (b.balls) for (const ball of b.balls) {
          if (SB.Physics.rectCollide(d.player, {x:ball.x-6, y:ball.y-6, w:12, h:12})) { d.player.takeDamage(); break; }
        }
        // Cauldron acid spills
        if (b.acidSpills) for (const a of b.acidSpills) {
          if (SB.Physics.rectCollide(d.player, {x:a.x-6, y:a.y-6, w:12, h:12})) { d.player.takeDamage(); break; }
        }
        // Necromancer minions
        if (b.minions) for (const m of b.minions) {
          if (SB.Physics.rectCollide(d.player, {x:m.x-5, y:m.y-5, w:10, h:10})) { d.player.takeDamage(); break; }
        }
        // Mech Spider web traps
        if (b.webTraps) for (const w of b.webTraps) {
          if (w.life > 0 && SB.Physics.rectCollide(d.player, {x:w.x-20, y:w.y-10, w:40, h:20})) { d.player.speed = SB.CONFIG.PLAYER_SPEED * 0.4; }
        }
      }
    }

    // Player vs Pumpkin Ghost — either player
    if (d.pumpkinGhost) {
      for (const pl of [d.player, d.player2]) {
        if (!pl || pl.damageCooldown > 0 || pl.invincibleTimer > 0) continue;
        if (SB.Physics.rectCollide(pl, d.pumpkinGhost)) {
          pl.takeDamage(); d.pumpkinGhost = null; break;
        }
      }
    }

    // Balloon form vs enemies — both players
    for (const pl of [d.player, d.player2]) {
      if (!pl || !pl.balloonMode) continue;
      for (const e of d.enemies) {
        if (!e.alive) continue;
        if (SB.Physics.rectCollide(pl, e)) { e.alive = false; d.score += 100; SB.spawnParticles(e.x+e.w/2, e.y+e.h/2, 12, '#88ff44', 100, 0.4, 3); }
      }
      for (const b of [d.boss, d.boss2]) {
        if (b && b.alive && SB.Physics.rectCollide(pl, b)) { b.hit(1); pl.x += (pl.x > b.x ? 30 : -30); }
      }
    }

    // Player vs Potions — both players
    for (const p of d.potions) {
      for (const pl of [d.player, d.player2]) {
        if (!pl || !SB.Physics.rectCollide(pl, p)) continue;
        SB.Audio.sfxPotion();
        SB.spawnParticles(p.x, p.y, 10, '#ffff88', 60, 0.4, 2);
        switch (p.type) {
          case 'speed': pl.speed = SB.CONFIG.PLAYER_SPEED * 1.4; break;
          case 'power': pl.shotPower = 2; break;
          case 'range': pl.shotRange = 1.6; break;
          case 'invincible':
            pl.balloonMode = true; pl.balloonTimer = SB.CONFIG.INVINCIBLE_TIME; pl.noGravity = true;
            break;
          case 'lightning':
            // Screen darken + violet flash
            d.violetFlash = 1.2; d.screenShake = 0.8;
            SB.Audio.sfxThunder();
            // Map-clearing lightning strikes
            d._lightningStrikes = []; d._lightningTimer = 1.8;
            d._boltAfterimages = []; // lingering glow
            for (let i = 0; i < 5; i++) {
              setTimeout(() => {
                if (this._current === 'Playing') {
                  const lx = SB.Utils.rand(60, SB.CONFIG.W-60);
                  d._lightningStrikes.push({x:lx, life:0.5, idx:i});
                  d._boltAfterimages.push({x:lx, life:0.8});
                  d.screenShake = Math.max(d.screenShake, 0.3);
                  SB.Audio.sfxThunder();
                  // Violet spark ripples along platform surfaces
                  for (const plat of d.platforms) {
                    if (plat.type === 'solid' && lx > plat.x && lx < plat.x+plat.w) {
                      for (let s = 0; s < 6; s++) {
                        SB.spawnParticles(plat.x + Math.random()*plat.w, plat.y, 3, '#9944ff', 40, 0.4, 2);
                      }
                    }
                  }
                  // Kill all regular enemies with electrical skeleton effect
                  for (const e of d.enemies) {
                    if (e.alive && !e.launched) {
                      e.electrocuted = true; e.electroTimer = 0.5;
                      e.alive = false;
                      e.launchVX = 0; e.launchVY = 0; // stay in place for skeleton
                      e.launchSpin = 0; e.launchLife = 0.8;
                      d.score += 150;
                      d.moneyCards.push(new SB.MoneyCard(e.x+e.w/2-10, e.y-10));
                    }
                  }
                  SB.spawnParticles(lx, 0, 20, '#ffffff', 200, 0.8, 4);
                  SB.spawnParticles(lx, SB.CONFIG.H, 15, '#9944ff', 100, 0.5, 3);
                }
              }, i * 120);
            }
            SB.spawnParticles(d.player.x+d.player.w/2, d.player.y+d.player.h/2, 30, '#9944ff', 150, 1.0, 6);
            break;
          case 'frost':
            d.player.frostAura = true; d.player.frostTimer = 15;
            SB.spawnParticles(d.player.x+d.player.w/2, d.player.y+d.player.h/2, 12, '#44dddd', 60, 0.5, 3);
            break;
          case 'shield':
            d.player.shieldActive = true;
            SB.spawnParticles(d.player.x+d.player.w/2, d.player.y+d.player.h/2, 10, '#aaddff', 50, 0.4, 2);
            break;
          case 'blizzard_horn':
            // Wind gust pushes all enemies to one side
            const windDir = d.player.facing;
            for (const e of d.enemies) {
              if (!e.alive) continue;
              e.x += windDir * 300 * 0.5; e.vy -= 100;
              e.x = SB.Utils.clamp(e.x, 0, SB.CONFIG.W - e.w);
            }
            SB.Audio.sfxCrush();
            SB.spawnParticles(d.player.x+d.player.w/2, d.player.y, 20, '#ddeeff', 200, 0.8, 5);
            break;
        }
        p.alive = false; break;
      }
    }

    // Player vs Money Cards — both players
    for (const m of d.moneyCards) {
      for (const pl of [d.player, d.player2]) {
        if (!pl || !SB.Physics.rectCollide(pl, m)) continue;
        d.score += SB.CONFIG.MONEY_VALUE; m.alive = false; m.collected = true;
        SB.Audio.sfxMoney(); SB.spawnParticles(m.x, m.y, 5, '#ffd700', 40, 0.3, 2);
        break;
      }
    }

    // Player vs Heart — both players
    for (const h of d.hearts) {
      for (const pl of [d.player, d.player2]) {
        if (!pl || !SB.Physics.rectCollide(pl, h)) continue;
        if (pl.lives < 5) { pl.lives++; SB.Audio.sfxPotion(); SB.spawnParticles(h.x+h.w/2, h.y+h.h/2, 15, '#ff4466', 80, 0.6, 4); }
        h.alive = false; break;
      }
    }

    // Player vs Ultra-Star — either player
    if (d.ultraStar) {
      for (const pl of [d.player, d.player2]) {
        if (!pl || !SB.Physics.rectCollide(pl, d.ultraStar)) continue;
        pl.ultraStarMode = true; pl.ultraStarTimer = SB.CONFIG.ULTRA_STAR_DURATION;
        pl.speed = SB.CONFIG.PLAYER_SPEED * SB.CONFIG.ULTRA_STAR_SPEED_MULT;
        pl.shotPower = 5; pl.invincible = true; pl.invincibleTimer = SB.CONFIG.ULTRA_STAR_DURATION;
        d.ultraStar.alive = false; d.ultraStar = null;
        SB.Audio.sfxPotion(); SB.Audio.sfxClear();
        SB.spawnParticles(pl.x+pl.w/2, pl.y+pl.h/2, 30, '#ffffff', 150, 1.0, 6);
        break;
      }
    }

    // Ultra-star timer
    if (d.player.ultraStarMode) {
      d.player.ultraStarTimer -= dt;
      if (d.player.ultraStarTimer <= 0) {
        d.player.ultraStarMode = false;
        d.player.speed = SB.CONFIG.PLAYER_SPEED;
        d.player.shotPower = 1;
        d.player.invincible = false;
        d.player.invincibleTimer = 0;
      }
    }

    // King Blizzard - drop Ultra-Star after first wave survived
    if (d.boss && d.boss instanceof SB.KingBlizzard && d.boss.alive && d.boss.firstWaveSurvived && !d.boss.ultraStarDropped && !d.ultraStar) {
      d.boss.ultraStarDropped = true;
      d.ultraStar = new SB.UltraStar(SB.Utils.rand(100, SB.CONFIG.W - 130), 100);
      SB.spawnParticles(d.ultraStar.x, d.ultraStar.y, 15, '#ffffff', 80, 0.8, 4);
    }

    // TRAIN mechanic - press T after boss defeated
    if (d.showingTrainPrompt) {
      d._trainPromptTimer = (d._trainPromptTimer || 0) + dt;
      if (SB.Input.pressed('KeyT')) {
        d.showingTrainPrompt = false;
        if (Math.random() < SB.CONFIG.TRAIN_SUCCESS_CHANCE) {
          // SUCCESS!
          d.trainResult = 'success';
          d.trainResultTimer = 2.0;
          d.trainedMonster = new SB.TrainedMonster(d.player.x + 40, d.player.y - 50, d._defeatedBossType || 'iron_mole');
          // Free Ultra-Star for successful training!
          d.ultraStar = new SB.UltraStar(d.player.x + 50, d.player.y - 80);
          SB.Audio.sfxClear();
          SB.spawnParticles(d.player.x+d.player.w/2, d.player.y, 35, '#ffffff', 150, 1.5, 6);
          SB.spawnParticles(d.player.x+d.player.w/2, d.player.y, 25, '#ffd700', 120, 1.5, 5);
        } else {
          // FAIL - lose and restart
          d.trainResult = 'fail';
          d.trainResultTimer = 1.5;
          SB.Audio.sfxDeath();
          const self = this;
          setTimeout(() => { self._gameOver(); }, 1500);
        }
      }
      // Auto-dismiss train prompt after 5 seconds
      if (d._trainPromptTimer > 5) {
        d.showingTrainPrompt = false;
        d.stageClear = true;
        d.stageClearTimer = 1.0;
        if (d.allClearBonus > 0) d.score += d.allClearBonus;
        // Spawn heart for boss clear
        d.hearts.push(new SB.Heart(SB.Utils.rand(100, SB.CONFIG.W - 130), -40));
      }
    }

    // --- GAME STATE CHECKS ---

    // Check if all enemies defeated
    const allDead = d.enemies.every(e => !e.alive);
    const bossDead = (!d.boss || !d.boss.alive) && (!d.boss2 || !d.boss2.alive);
    const isBossLevel = d.boss !== null;

    if (allDead && bossDead && !d.stageClear && !d.showingTrainPrompt) {
      // Show TRAIN prompt after boss defeat (before stage clear)
      if (isBossLevel && !d.trainResult) {
        d.showingTrainPrompt = true;
        d._defeatedBossType = d.boss ? d.boss.type : (d.boss2 ? d.boss2.type : 'iron_mole');
      } else {
        d.stageClear = true;
        d.stageClearTimer = 1.8;
        if (d.allClearBonus > 0) d.score += d.allClearBonus;
        // Spawn heart for boss clear
        if (isBossLevel) d.hearts.push(new SB.Heart(SB.Utils.rand(100, SB.CONFIG.W - 130), -40));
      }
    }

    // Handle stage clear sequence
    if (d.stageClear) {
      d.stageClearTimer -= dt;
      if (d.stageClearTimer <= 0) {
        d.floorNum++;
        d.levelIndex = d.floorNum - 1;
        // Floor 200 cleared — show code reveal
        if (d.floorNum === 200 && !d._codeRevealed) {
          d._codeRevealed = true;
          d._codeRevealPhase = 0;
          d._codeRevealTimer = 0;
          d.stageClear = false; // keep playing for the reveal
          d.showingBossIntro = true; // reuse intro overlay system
          d.bossIntroTimer = 999; // hold until sequence done
        }
        // Victory after Floor 200 cleared + code shown
        else if (d.floorNum > 200 || (d.floorNum === 200 && d._codeRevealed && d._codeRevealPhase >= 3)) {
          this.switchTo('Victory');
          SB.Audio.stopMusic();
        } else {
          const score = d.score;
          const p1Lives = d.player.lives;
          const p2Lives = d.player2 ? d.player2.lives : 0;
          this._data.score = score;
          this._data._carryLives = [p1Lives, p2Lives];
          this.switchTo('Playing');
        }
      }
      return;
    }

    // Check for ALL CLEAR (all enemies killed by single snowball chain)
    if (allDead && !d.stageClear) {
      if (d.giantSnowballs.some(gs => gs.crushed.size >= d.enemies.length)) {
        d.allClearBonus = 2000;
        d.score += d.allClearBonus;
        // Rain money cards
        for (let i = 0; i < 12; i++) {
          setTimeout(() => {
            if (this._current === 'Playing') {
              d.moneyCards.push(new SB.MoneyCard(
                SB.Utils.rand(50, SB.CONFIG.W - 70),
                -20
              ));
            }
          }, i * 150);
        }
        SB.Audio.sfxClear();
        SB.spawnParticles(SB.CONFIG.W/2, SB.CONFIG.H/2, 40, '#ffd700', 200, 1.5, 5);
        // Spawn rare heart for perfect clear
        d.hearts.push(new SB.Heart(SB.Utils.rand(100, SB.CONFIG.W - 130), -30));
      }
    }

    // Timer
    d.timer -= dt;
    if (d.timer <= 30 && d.timer > 0) {
      // Pumpkin ghost warning at 30s
      if (Math.floor(d.timer) === 30 && !d.pumpkinGhost) {
        SB.Audio.sfxWarn();
      }
    }
    if (d.timer <= 0 && !d.pumpkinGhost) {
      // Spawn pumpkin ghost
      d.pumpkinGhost = new SB.PumpkinGhost(SB.CONFIG.W/2, SB.CONFIG.H/2);
      SB.Audio.sfxPumpkin();
    }

    // Game over check — both players dead
    const p1Dead = !d.player.alive && d.player.lives <= 0;
    const p2Dead = !d.player2 || (!d.player2.alive && d.player2.lives <= 0);
    if (p1Dead && p2Dead) { this._gameOver(); }

    // Respawn after death
    for (const pl of [d.player, d.player2]) {
      if (!pl || pl.alive || pl.lives <= 0) continue;
      pl.alive = true;
      const rlvl = SB.getLevelData(d.floorNum);
      pl.x = rlvl.playerStart.x + (pl === d.player2 ? 50 : 0);
      pl.y = rlvl.playerStart.y;
      pl.vx = 0; pl.vy = 0; pl.invincible = true; pl.invincibleTimer = 3;
      d.pumpkinGhost = null; d.timer = Math.max(d.timer, 30);
    }

    // Clean up dead enemies (with animation delay)
    const deadEnemies = d.enemies.filter(e => !e.alive && !e.deathAnimTimer);
    for (const e of deadEnemies) e.deathAnimTimer = 0.3;
    for (const e of d.enemies) {
      if (!e.alive && e.deathAnimTimer !== undefined) {
        e.deathAnimTimer -= dt;
      }
    }
  },

  _updateStageClear(dt) {
    const d = this._data;
    d.stageClearTimer -= dt;
    if (d.stageClearTimer <= 0) {
      this.switchTo('Playing');
    }
  },

  _gameOver() {
    this._current = 'GameOver';
    SB.Audio.stopMusic();
    SB.Audio.sfxDeath();
  },

  render(ctx, alpha) {
    switch (this._current) {
      case 'Title': this._renderTitle(ctx); break;
      case 'Playing': this._renderPlaying(ctx, alpha); break;
      case 'GameOver': this._renderGameOver(ctx); break;
      case 'Victory': this._renderVictory(ctx); break;
    }
    // Draw touch buttons on top of scene
    const showJumpSnow = this._current === 'Playing';
    const is2P = !!(this._data.player2 || this._pendingMode === '2P');
    SB.TouchButtons.draw(ctx, showJumpSnow, is2P);
  },

  _renderTitle(ctx) {
    const t = Date.now() / 1000;
    // Winter night sky
    ctx.fillStyle = '#010615';
    ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
    const grad = ctx.createLinearGradient(0, 0, 0, SB.CONFIG.H);
    grad.addColorStop(0, '#050d28'); grad.addColorStop(1, '#010615');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);

    // Stage spotlight
    const spotGrad = ctx.createRadialGradient(SB.CONFIG.W/2, 340, 20, SB.CONFIG.W/2, 340, 350);
    spotGrad.addColorStop(0, 'rgba(100,150,255,0.15)'); spotGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = spotGrad; ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);

    // Falling snowflakes
    for (let i = 0; i < 50; i++) {
      const sx = (i * 97 + Math.sin(t*0.7 + i) * 20) % SB.CONFIG.W;
      const sy = (i * 73 + t * 25) % SB.CONFIG.H;
      ctx.fillStyle = `rgba(255,255,255,${0.15 + (i%5)*0.06})`;
      ctx.beginPath(); ctx.arc(sx, sy, 1.5 + (i%3)*0.8, 0, Math.PI*2); ctx.fill();
    }

    // Musical notes floating up in abundance
    const notes = ['♪','♫','♬','🎵','🎶','🎼'];
    for (let i = 0; i < 20; i++) {
      const nx = (i * 85 + t * 50) % SB.CONFIG.W;
      const ny = (SB.CONFIG.H + 40 - (t * 45 + i * 55) % (SB.CONFIG.H + 100));
      ctx.fillStyle = `rgba(255,255,180,${0.2 + (i%5)*0.08})`;
      ctx.font = `${14 + (i%4)*4}px serif`; ctx.textAlign = 'center';
      ctx.fillText(notes[i % notes.length], nx, ny);
      ctx.textAlign = 'start';
    }

    // Sound visualization bars at bottom
    for (let i = 0; i < 20; i++) {
      const barH = 8 + Math.abs(Math.sin(t*6 + i*0.4)) * 25;
      const hue = (i * 18 + t * 30) % 360;
      ctx.fillStyle = `hsla(${hue}, 80%, 60%, 0.5)`;
      ctx.fillRect(40 + i * 38, SB.CONFIG.H - 8 - barH, 28, barH);
    }

    // Beat timing for singing animation
    const beat = Math.sin(t * 4.3); // bouncy rhythm
    const bob = Math.abs(beat) * 10;
    const mouthOpen = beat > 0.3; // mouth opens on beat peaks
    const headTilt = Math.sin(t * 2.15) * 6;

    // === RAY singing (left) ===
    ctx.save();
    ctx.translate(0, bob);
    // Tilt head back like belting
    ctx.translate(230, 280);
    ctx.rotate(headTilt * 0.02);
    ctx.translate(-230, -280);
    SB.Sprites.drawPlayer(ctx, 230, 280, 50, 68, 1, false, false, 'ray');
    // Open singing mouth
    if (mouthOpen) {
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(238, 310, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    }
    // Microphone arm
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(255, 295); ctx.lineTo(265, 270); ctx.stroke();
    // Microphone
    ctx.fillStyle = '#333'; ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(267, 267, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(267, 267, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // === JAY singing (right) ===
    ctx.save();
    ctx.translate(0, bob * 0.9);
    ctx.translate(520, 280);
    ctx.rotate(-headTilt * 0.02);
    ctx.translate(-520, -280);
    SB.Sprites.drawPlayer(ctx, 520, 280, 50, 68, -1, false, false, 'jay');
    if (mouthOpen) {
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(512, 310, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    }
    // Microphone arm
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(495, 295); ctx.lineTo(485, 270); ctx.stroke();
    ctx.fillStyle = '#333'; ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(483, 267, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(483, 267, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Karaoke lyrics — "Frosty the Snowman"
    const lyrics = [
      'Frosty the Snowman',
      'was a jolly happy soul!',
      'With a corncob pipe and a button nose,',
      'and two eyes made out of coal!',
    ];
    const lyricIdx = Math.floor((t * 0.6) % lyrics.length);
    const nextIdx = (lyricIdx + 1) % lyrics.length;
    const fadeIn = ((t * 0.6) % 1);
    // Current line
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 8;
    ctx.fillText(lyrics[lyricIdx], SB.CONFIG.W/2, 420);
    // Next line preview
    ctx.fillStyle = `rgba(150,150,150,${0.3 + fadeIn*0.4})`; ctx.font = '16px monospace';
    ctx.shadowBlur = 0;
    ctx.fillText(lyrics[nextIdx], SB.CONFIG.W/2, 445);
    ctx.textAlign = 'start';
    ctx.shadowBlur = 0;

    // Snowman labels under the performers
    ctx.fillStyle = '#5588ee'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
    ctx.fillText('🎤 RAY', 255, 365);
    ctx.fillStyle = '#ee5555';
    ctx.fillText('🎤 JAY', 545, 365);
    ctx.textAlign = 'start';

    // Title
    ctx.shadowColor = '#4488ff'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center';
    ctx.fillText('SNOWMAN', SB.CONFIG.W/2, 155);
    ctx.fillText('BROS', SB.CONFIG.W/2, 205);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ff3388'; ctx.lineWidth = 3; ctx.shadowColor = '#ff3388'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(SB.CONFIG.W/2-140, 212); ctx.lineTo(SB.CONFIG.W/2+140, 212); ctx.stroke();
    ctx.shadowBlur = 0;

    // Subtitle bounces with beat
    ctx.fillStyle = '#ffffff'; ctx.font = '16px monospace';
    ctx.fillText('Ray & Jay\'s Frozen Adventure', SB.CONFIG.W/2, 240);

    // Controls
    ctx.fillStyle = '#888';
    ctx.font = '14px monospace';
    const controls = [
      'ARROWS — Move & Jump',
      'X / SPACE — Throw Snow',
      'FREEZE enemies, PUSH snowballs to crush!',
    ];
    controls.forEach((c, i) => ctx.fillText(c, SB.CONFIG.W/2, 440 + i*22));

    // Mode select
    const mode = SB.Scenes._pendingMode || '1P';
    ctx.fillStyle = mode === '1P' ? '#ffcc00' : '#666';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('[1] 1P SOLO', SB.CONFIG.W/2 - 80, 380);
    ctx.fillStyle = mode === '2P' ? '#ffcc00' : '#666';
    ctx.fillText('[2] 2P CO-OP', SB.CONFIG.W/2 + 80, 380);
    // Controls
    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText(mode === '2P' ? 'P1: Arrows+Space/X  |  P2: WASD+Q' : 'ARROWS — Move & Jump  |  X/SPACE — Throw', SB.CONFIG.W/2, 410);
    // P2 preview
    if (mode === '2P') {
      SB.Sprites.drawPlayer(ctx, 230, 320, 36, 52, 1, false, false, 'ray');
      SB.Sprites.drawPlayer(ctx, 540, 320, 36, 52, -1, false, false, 'jay');
      ctx.fillStyle = '#5588ee'; ctx.font = '12px monospace';
      ctx.textAlign = 'center'; ctx.fillText('P1', 248, 385); ctx.fillText('P2', 558, 385);
      ctx.textAlign = 'start';
    }
    // Code entry UI
    if (SB.Scenes._codeEntry !== undefined && SB.Scenes._codeEntry !== null) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(SB.CONFIG.W/2 - 150, 340, 300, 120);
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
      ctx.strokeRect(SB.CONFIG.W/2 - 150, 340, 300, 120);
      ctx.fillStyle = '#ffd700'; ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ENTER CODE', SB.CONFIG.W/2, 365);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 24px monospace';
      ctx.fillText(SB.Scenes._codeEntry || '____', SB.CONFIG.W/2, 400);
      ctx.fillStyle = '#888'; ctx.font = '11px monospace';
      ctx.fillText('Type digits + Enter | Esc to cancel', SB.CONFIG.W/2, 430);
    }
    // Code result
    if (SB.Scenes._codeResult === 'success') {
      ctx.fillStyle = '#44ff44'; ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CODE ACCEPTED! ' + (SB.Scenes._pendingReward === 'lightning' ? 'LIGHTNING POTION' : 'ULTRA-STAR') + ' GRANTED!', SB.CONFIG.W/2, 480);
    } else if (SB.Scenes._codeResult === 'fail') {
      ctx.fillStyle = '#ff4444'; ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center'; ctx.fillText('INVALID CODE', SB.CONFIG.W/2, 480);
    }
    // Hint
    if (SB.Scenes._codeEntry === undefined || SB.Scenes._codeEntry === null) {
      ctx.fillStyle = '#555'; ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Press C to enter a code', SB.CONFIG.W/2, 490);
    }
    // Start prompt
    const alpha = 0.5 + Math.sin(t * 3) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS ENTER TO START', SB.CONFIG.W/2, 555);
    ctx.textAlign = 'start';
  },

  _renderPlaying(ctx, alpha) {
    const d = this._data;
    if (!d.player) return;

    // Screen shake offset
    const shakeX = d.screenShake ? (Math.random()-0.5) * d.screenShake * 12 : 0;
    const shakeY = d.screenShake ? (Math.random()-0.5) * d.screenShake * 8 : 0;
    ctx.save();
    if (d.screenShake > 0.01) ctx.translate(shakeX, shakeY);

    // Background
    const floorNum = d.floorNum || 1;
    const isKingBlizzard = d.boss && d.boss instanceof SB.KingBlizzard && d.boss.alive;
    const t = Date.now() / 1000;

    if (isKingBlizzard) {
      // --- KING BLIZZARD VORTEX BACKGROUND ---
      // Deep violet base
      ctx.fillStyle = '#050010';
      ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);

      // Swirling vortex
      const cx = SB.CONFIG.W/2, cy = SB.CONFIG.H/2;
      for (let r = 50; r < 500; r += 12) {
        const hue = (r * 0.8 + t * 40) % 360;
        const alpha = 0.15 + 0.08 * Math.sin(r * 0.02 + t);
        ctx.strokeStyle = `hsla(${hue}, 80%, 50%, ${alpha})`;
        ctx.lineWidth = 3 + Math.sin(r * 0.03) * 1.5;
        ctx.beginPath();
        for (let a = 0; a < Math.PI * 2; a += 0.05) {
          const or = r + Math.sin(a * 5 + t * 2 + r * 0.01) * 15;
          const sx = cx + Math.cos(a + t * 0.5 + r * 0.005) * or;
          const sy = cy + Math.sin(a + t * 0.5 + r * 0.005) * or;
          if (a === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        }
        ctx.closePath(); ctx.stroke();
      }
      // Flashing rainbow bursts
      for (let i = 0; i < 5; i++) {
        const burstHue = (t * 60 + i * 72) % 360;
        const bx = cx + Math.cos(t * 0.3 + i * 1.2) * 180;
        const by = cy + Math.sin(t * 0.4 + i * 1.3) * 140;
        const burstAlpha = 0.06 + 0.04 * Math.sin(t * 2 + i);
        const burstGrad = ctx.createRadialGradient(bx, by, 0, bx, by, 80);
        burstGrad.addColorStop(0, `hsla(${burstHue}, 100%, 60%, ${burstAlpha*3})`);
        burstGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = burstGrad;
        ctx.beginPath(); ctx.arc(bx, by, 80, 0, Math.PI*2); ctx.fill();
      }
      // Dark center pull
      const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 250);
      centerGrad.addColorStop(0, 'rgba(5,0,16,0.7)');
      centerGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = centerGrad;
      ctx.beginPath(); ctx.arc(cx, cy, 250, 0, Math.PI*2); ctx.fill();
    } else {
      // --- THEMED BACKGROUND ---
      const theme = SB.getTheme(floorNum);
      const [c1, c2] = (theme && theme.bgGrad) ? theme.bgGrad : (d.bgGrad || ['#020818', '#0a1030']);
      const grad = ctx.createLinearGradient(0, 0, 0, SB.CONFIG.H);
      grad.addColorStop(0, c1);
      grad.addColorStop(1, c2);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
    }

    // Atmospheric particles (replaces plain snowflakes)
    const theme = SB.getTheme(floorNum);
    const pColor = (theme && theme.bgParticle) ? theme.bgParticle : '#aaccff';
    const atmosphere = (theme && theme.atmosphere) ? theme.atmosphere : 'ice';
    for (let i = 0; i < 25; i++) {
      const sx = (i * 137 + Math.sin(t * 0.7 + i) * 15) % SB.CONFIG.W;
      const sy = (i * 89 + t * 25) % SB.CONFIG.H;
      ctx.globalAlpha = (0.15 + (i % 5) * 0.06) * (isKingBlizzard ? 1.5 : 1);
      ctx.fillStyle = isKingBlizzard ? `hsl(${(t*40+i*30)%360},80%,70%)` : pColor;
      const size = atmosphere === 'sand' ? 1.2 : atmosphere === 'ember' ? 1.8 : atmosphere === 'crystal' ? 2.2 : 1.5;
      ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Lava (Floor 200)
    if (d.hasLava && d.lavaLevel < SB.CONFIG.H) {
      const lavaGrad = ctx.createLinearGradient(0, d.lavaLevel, 0, SB.CONFIG.H);
      lavaGrad.addColorStop(0, '#ff4400');
      lavaGrad.addColorStop(0.3, '#ff6600');
      lavaGrad.addColorStop(0.7, '#cc2200');
      lavaGrad.addColorStop(1, '#881100');
      ctx.fillStyle = lavaGrad;
      ctx.fillRect(0, Math.max(0, d.lavaLevel), SB.CONFIG.W, SB.CONFIG.H);
      // Lava surface bubbles
      ctx.fillStyle = '#ffaa00';
      const bt = Date.now()/200;
      for (let i = 0; i < SB.CONFIG.W; i += 40) {
        const bx = i + Math.sin(bt + i*0.3) * 15;
        const by = Math.max(0, d.lavaLevel) + Math.sin(bt*1.7 + i*0.5) * 5;
        ctx.beginPath(); ctx.arc(bx, by, 4 + Math.sin(bt*2 + i)*2, 0, Math.PI*2); ctx.fill();
      }
    }

    // Platforms — neon borders with dark fill
    const pt = SB.getTheme(floorNum);
    const pFill = (pt && pt.platformFill) ? pt.platformFill : '#1a2255';
    const pBorder = (pt && pt.platformBorder) ? pt.platformBorder : '#ff3388';
    const pHighlight = (pt && pt.platformHighlight) ? pt.platformHighlight : '#4488ff';
    const isBossFloor = floorNum % 10 === 0;

    for (const p of d.platforms) {
      if (p.type === 'solid') {
        // Dark fill
        ctx.fillStyle = pFill;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // Thick neon border
        ctx.strokeStyle = isKingBlizzard
          ? `hsl(${(t*80)%360},90%,60%)`
          : (isBossFloor ? '#ff4444' : pBorder);
        ctx.lineWidth = isBossFloor ? 4 : 3;
        ctx.strokeRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
        // Extra glow on boss floors
        if (isBossFloor) {
          ctx.shadowColor = isKingBlizzard
            ? `hsl(${(t*80)%360},100%,50%)`
            : '#ff4444';
          ctx.shadowBlur = isKingBlizzard ? 12 : 8;
          ctx.strokeStyle = isKingBlizzard
            ? `hsla(${(t*80)%360},100%,60%,0.6)`
            : 'rgba(255,68,68,0.5)';
          ctx.lineWidth = 6;
          ctx.strokeRect(p.x - 2, p.y - 2, p.w + 4, p.h + 4);
          ctx.shadowBlur = 0;
        }
        // Bright top highlight edge
        ctx.fillStyle = isKingBlizzard
          ? `hsl(${(t*80)%360},100%,70%)`
          : pHighlight;
        ctx.fillRect(p.x + 2, p.y, p.w - 4, isBossFloor ? 5 : 3);
        // Bottom shadow
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(p.x + 2, p.y + p.h - 3, p.w - 4, 3);
      } else if (p.type === 'hazard') {
        ctx.fillStyle = '#220808';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#ff2222';
        ctx.lineWidth = 3;
        ctx.strokeRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
        const hazardAlpha = 0.4 + Math.sin(t * 8) * 0.3;
        ctx.fillStyle = `rgba(255,50,10,${hazardAlpha})`;
        for (let i = 0; i < p.w; i += 10) ctx.fillRect(p.x + i + 1, p.y + 2, 6, p.h - 4);
      } else if (p.type === 'crumble' || p.special === 'crumble') {
        const life = p._crumbleLife || 1.5;
        const shake = life < 0.5 ? Math.sin(Date.now()/30)*3 : 0;
        ctx.fillStyle = life < 0.5 ? `rgba(180,60,40,${0.5+Math.abs(Math.sin(Date.now()/60))*0.5})` : '#887766';
        ctx.fillRect(p.x+shake, p.y, p.w, p.h);
        ctx.strokeStyle = life < 0.5 ? '#ff2222' : '#665544'; ctx.lineWidth = 2;
        ctx.strokeRect(p.x+shake+1, p.y+1, p.w-2, p.h-2);
        if (life < 0.5) { ctx.strokeStyle = '#ff0000'; ctx.beginPath(); ctx.moveTo(p.x+10,p.y); ctx.lineTo(p.x+p.w/2,p.y+p.h); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x+p.w-10,p.y); ctx.lineTo(p.x+p.w/3,p.y+p.h); ctx.stroke(); }
      }
    }
    // Draw special platform indicators
    for (const p of d.platforms) {
      if (!p.special || p.type === 'broken' || p.type === 'shadow_pass') continue;
      const sp = p.special;
      ctx.save();
      if (sp === 'conveyor') {
        ctx.fillStyle = '#556677'; ctx.fillRect(p.x, p.y+2, p.w, p.h-2);
        ctx.strokeStyle = '#8899aa'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
        const dir = (Math.floor(p.x/50)%2===0)?1:-1;
        for (let i=0; i<p.w; i+=16) { ctx.fillStyle = '#aabbcc'; ctx.fillRect(p.x+i+((Date.now()/100)%16)*dir, p.y+4, 8, 3); }
      } else if (sp === 'steam') {
        ctx.fillStyle = '#665544'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#887766'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
        if (p._steaming) { const a = p._steamLife/0.6; ctx.fillStyle = `rgba(255,255,255,${a*0.6})`; for (let i=0;i<p.w;i+=10) { ctx.beginPath(); ctx.arc(p.x+i+5, p.y-10-Math.random()*20, 5+Math.random()*8, 0, Math.PI*2); ctx.fill(); } }
      } else if (sp === 'trampoline') {
        ctx.fillStyle = '#44aacc'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#88ddff'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
      } else if (sp === 'spiked') {
        ctx.fillStyle = '#554444'; ctx.fillRect(p.x, p.y, p.w, 4);
        ctx.fillStyle = '#ff4444'; for (let i=0;i<p.w;i+=6) { ctx.beginPath(); ctx.moveTo(p.x+i, p.y+p.h); ctx.lineTo(p.x+i+3, p.y); ctx.lineTo(p.x+i+6, p.y+p.h); ctx.fill(); }
      } else if (sp === 'phase') {
        const blink = Math.sin(Date.now()/200)*0.5+0.5;
        ctx.fillStyle = `rgba(180,180,255,${0.3+blink*0.7})`; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = `rgba(200,200,255,${blink})`; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
      } else if (sp === 'sticky') {
        ctx.fillStyle = '#aa8800'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = 'rgba(255,200,0,0.3)'; for (let i=0;i<p.w;i+=8) ctx.beginPath(); ctx.arc(p.x+i+4, p.y+p.h/2, 3, 0, Math.PI*2); ctx.fill();
      } else if (sp === 'ice') {
        ctx.fillStyle = '#cceeff'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(p.x+10, p.y+4, 4, 0, Math.PI*2); ctx.fill();
      } else if (sp === 'magnetic') {
        ctx.fillStyle = '#664444'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
        const pulse = Math.sin(Date.now()/300)*0.3+0.7;
        ctx.fillStyle = `rgba(255,100,100,${pulse*0.4})`; ctx.fillRect(p.x+2, p.y+2, p.w-4, p.h-4);
      } else if (sp === 'seesaw') {
        const tilt = p._tilt || 0;
        ctx.save(); ctx.translate(p.x+p.w/2, p.y+p.h/2); ctx.rotate(tilt);
        ctx.fillStyle = '#887744'; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.strokeStyle = '#aa9944'; ctx.lineWidth = 2; ctx.strokeRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.fillStyle = '#664400'; ctx.fillRect(-4, -p.h/2, 8, p.h);
        ctx.restore();
      } else if (sp === 'portal') {
        const glow = Math.sin(Date.now()/200)*0.3+0.7;
        ctx.fillStyle = `rgba(100,50,200,${glow*0.5})`; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = `rgba(200,150,255,${glow})`; ctx.lineWidth = 3; ctx.strokeRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#fff'; ctx.fillRect(p.x+p.w-6, p.y+2, 4, p.h-4);
      } else if (sp === 'zerog') {
        ctx.fillStyle = 'rgba(100,150,200,0.5)'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 1; ctx.strokeRect(p.x, p.y, p.w, p.h);
      } else if (sp === 'antigrav') {
        ctx.fillStyle = '#331144'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#9944ff'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
      } else if (sp === 'forcefield') {
        ctx.fillStyle = 'rgba(100,150,255,0.2)'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#88bbff'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = 'rgba(150,200,255,0.6)'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.w, p.y+p.h); ctx.moveTo(p.x+p.w, p.y); ctx.lineTo(p.x, p.y+p.h); ctx.stroke();
      } else if (sp === 'accordion') {
        const w = p.w; ctx.fillStyle = '#998844'; ctx.fillRect(p.x, p.y, w, p.h);
        ctx.strokeStyle = '#bbaa66'; ctx.lineWidth = 1; ctx.strokeRect(p.x, p.y, w, p.h);
        for (let i=0;i<w;i+=12) { ctx.strokeStyle = '#776633'; ctx.beginPath(); ctx.moveTo(p.x+i, p.y); ctx.lineTo(p.x+i, p.y+p.h); ctx.stroke(); }
      } else if (sp === 'laser') {
        ctx.fillStyle = '#331111'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#ff4422'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
      } else if (sp === 'mimic') {
        ctx.fillStyle = p._mimicAngry > 1 ? '#884444' : '#777766'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = p._mimicAngry > 1 ? '#ff4444' : '#999988'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
        if (p._mimicAngry > 1) { ctx.fillStyle = '#fff'; for (let i=0;i<p.w;i+=14) { ctx.fillRect(p.x+i+2, p.y+2, 4, 4); } }
      } else if (sp === 'acid') {
        ctx.fillStyle = '#334422'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#88ff00'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
      } else if (sp === 'shadow') {
        ctx.strokeStyle = 'rgba(100,100,120,0.5)'; ctx.lineWidth = 1; ctx.setLineDash([5,5]); ctx.strokeRect(p.x, p.y, p.w, p.h); ctx.setLineDash([]);
      } else if (sp === 'crystal') {
        if (p._crystalIntact) {
          ctx.fillStyle = '#aaddff'; ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
          ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(p.x+8, p.y+4, 3, 0, Math.PI*2); ctx.fill();
        } else {
          ctx.fillStyle = 'rgba(100,150,200,0.3)'; ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.strokeStyle = 'rgba(150,200,255,0.4)'; ctx.lineWidth = 1; ctx.setLineDash([3,3]); ctx.strokeRect(p.x, p.y, p.w, p.h); ctx.setLineDash([]);
        }
      }
      ctx.restore();
    }

    // Entities sorted by Y for depth
    const entities = [];
    entities.push(d.player);
    if (d.player2) entities.push(d.player2);
    for (const e of d.enemies) if (e.alive || e.launched || (e.deathAnimTimer !== undefined && e.deathAnimTimer > 0)) entities.push(e);
    if (d.boss && d.boss.alive) entities.push(d.boss);
    if (d.boss2 && d.boss2.alive) entities.push(d.boss2);
    for (const gs of d.giantSnowballs) if (gs.alive) entities.push(gs);
    if (d.trainedMonster && d.trainedMonster.alive) entities.push(d.trainedMonster);
    entities.sort((a, b) => (a.y + a.h) - (b.y + b.h));

    for (const e of entities) {
      if (e === d.player) d.player.draw(ctx);
      else if (e === d.player2) d.player2.draw(ctx);
      else if (e instanceof SB.TrainedMonster) e.draw(ctx);
      else if (e instanceof SB.Boss) e.draw(ctx);
      else if (e instanceof SB.GiantSnowball) e.draw(ctx);
      else if (e instanceof SB.Enemy) {
        if (e.launched) {
          ctx.save(); ctx.translate(e.x+e.w/2, e.y+e.h/2);
          // Electrical skeleton death
          if (e.electrocuted && e.electroTimer > 0) {
            // Flashing yellow grid silhouette
            const flashAlpha = Math.abs(Math.sin(Date.now()/30)) * 0.8;
            ctx.fillStyle = `rgba(255,255,0,${flashAlpha})`;
            ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
            // Cartoon bones visible
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            // Skull
            ctx.beginPath(); ctx.arc(0, -e.h*0.2, 5, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-2, -e.h*0.22, 1, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(2, -e.h*0.22, 1, 0, Math.PI*2); ctx.fill();
            // Spine
            ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(0, -e.h*0.1); ctx.lineTo(0, e.h*0.15); ctx.stroke();
            // Ribs
            for (let r=0;r<3;r++) { ctx.beginPath(); ctx.moveTo(-4, -e.h*0.05+r*4); ctx.lineTo(4, -e.h*0.05+r*4); ctx.stroke(); }
            // Arm bones
            ctx.beginPath(); ctx.moveTo(0, -e.h*0.02); ctx.lineTo(-8, e.h*0.05); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -e.h*0.02); ctx.lineTo(8, e.h*0.05); ctx.stroke();
            // Leg bones
            ctx.beginPath(); ctx.moveTo(0, e.h*0.15); ctx.lineTo(-5, e.h*0.3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, e.h*0.15); ctx.lineTo(5, e.h*0.3); ctx.stroke();
            // Violet spark particles
            if (Math.random() < 0.4) {
              SB.spawnParticles(e.x, e.y, 1, '#9944ff', 20, 0.2, 1.5);
            }
          } else if (!e.electrocuted) {
            ctx.rotate(e.launchSpin * e.launchLife);
          }
          ctx.translate(-(e.x+e.w/2), -(e.y+e.h/2));
          ctx.globalAlpha = e.launchLife / 1.2;
          if (!e.electrocuted) e.draw(ctx);
          ctx.restore();
        } else if (e.alive) e.draw(ctx);
        else {
          const alpha = e.deathAnimTimer / 0.3;
          ctx.globalAlpha = alpha;
          e.draw(ctx);
          ctx.globalAlpha = 1;
        }
      }
    }

    // Angler Fish suction vortex + spit projectiles
    for (const b of [d.boss, d.boss2]) {
      if (b && b.alive && b instanceof SB.AnglerFish) {
        // Suction vortex lines
        if (b.mouthOpen) {
          const acx = b.x + b.w/2, acy = b.y + b.h/2;
          for (let i = 0; i < 6; i++) {
            const a = (Date.now()/300 + i*Math.PI/3) % (Math.PI*2);
            ctx.strokeStyle = 'rgba(100,150,100,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(acx, acy);
            ctx.lineTo(acx + Math.cos(a)*120, acy + Math.sin(a)*120);
            ctx.stroke();
          }
        }
        // Spit projectiles
        if (b.spitProjectiles) for (const sp of b.spitProjectiles) {
          ctx.fillStyle = '#88aa44'; ctx.beginPath(); ctx.arc(sp.x, sp.y, 5, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#aacc66'; ctx.beginPath(); ctx.arc(sp.x-1, sp.y-1, 2, 0, Math.PI*2); ctx.fill();
        }
      }
    }

    // King Blizzard mini clones
    if (d.boss && d.boss instanceof SB.KingBlizzard && d.boss.alive) {
      for (const c of d.boss.miniClones) {
        if (c.life > 0) SB.Sprites.drawMiniClone(ctx, c.x, c.y, c.w, c.h);
      }
    }

    // Snowballs
    for (const s of d.snowballs) s.draw(ctx);

    // Potions
    for (const p of d.potions) p.draw(ctx);

    // Money cards
    for (const m of d.moneyCards) m.draw(ctx);

    // Hearts
    for (const h of d.hearts) h.draw(ctx);

    // Particles
    for (const p of SB.Particles) {
      const alpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Violet flash overlay when lightning strikes
    if (d.violetFlash > 0) {
      ctx.fillStyle = `rgba(40,0,60,${d.violetFlash*0.4})`;
      ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
    }
    // Bolt afterimages — lingering glow on platforms
    if (d._boltAfterimages) for (const ai of d._boltAfterimages) {
      const alpha = ai.life / 0.8;
      const grad = ctx.createLinearGradient(ai.x-30, 0, ai.x+30, 0);
      grad.addColorStop(0, 'rgba(100,100,255,0)');
      grad.addColorStop(0.5, `rgba(200,200,255,${alpha*0.3})`);
      grad.addColorStop(1, 'rgba(100,100,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(ai.x-30, 0, 60, SB.CONFIG.H);
    }
    // Lightning strikes — thick jagged neon-white + electric-blue forked bolts
    if (d._lightningStrikes) for (const ls of d._lightningStrikes) {
      ctx.save();
      const lAlpha = ls.life / 0.5;
      // Outer electric-blue glow
      ctx.strokeStyle = '#4488ff';
      ctx.lineWidth = 8;
      ctx.shadowColor = '#4488ff';
      ctx.shadowBlur = 25 * lAlpha;
      ctx.beginPath(); ctx.moveTo(ls.x, 0); ctx.lineTo(ls.x, SB.CONFIG.H); ctx.stroke();
      // Neon-white core bolt — jagged forked path
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      ctx.shadowColor = '#ffffcc';
      ctx.shadowBlur = 18 * lAlpha;
      ctx.beginPath();
      ctx.moveTo(ls.x, 0);
      const midX = ls.x + Math.sin(ls.idx*2.5)*25;
      ctx.lineTo(midX, SB.CONFIG.H*0.3);
      ctx.lineTo(midX-10, SB.CONFIG.H*0.42);
      ctx.lineTo(midX+8, SB.CONFIG.H*0.52);
      ctx.lineTo(ls.x+Math.cos(ls.idx)*15, SB.CONFIG.H*0.68);
      ctx.lineTo(ls.x-8, SB.CONFIG.H*0.82);
      ctx.lineTo(ls.x, SB.CONFIG.H);
      ctx.stroke();
      // Branch bolt
      ctx.strokeStyle = '#ddeeff';
      ctx.lineWidth = 2;
      ctx.shadowBlur = 10 * lAlpha;
      ctx.beginPath(); ctx.moveTo(midX-8, SB.CONFIG.H*0.4); ctx.lineTo(midX-40, SB.CONFIG.H*0.55); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(midX+6, SB.CONFIG.H*0.5); ctx.lineTo(midX+35, SB.CONFIG.H*0.65); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // Ultra-star
    if (d.ultraStar) d.ultraStar.draw(ctx);

    // Pumpkin ghost
    if (d.pumpkinGhost) d.pumpkinGhost.draw(ctx);

    // TRAIN prompt overlay (after boss defeat)
    if (d.showingTrainPrompt) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, SB.CONFIG.H/2 - 60, SB.CONFIG.W, 100);
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS DEFEATED!', SB.CONFIG.W/2, SB.CONFIG.H/2 - 25);
      ctx.fillStyle = 'white';
      ctx.font = '14px monospace';
      ctx.fillText('Press [T] to TRAIN (0.001% chance)', SB.CONFIG.W/2, SB.CONFIG.H/2 + 5);
      ctx.fillText('Or wait to continue...', SB.CONFIG.W/2, SB.CONFIG.H/2 + 25);
      ctx.textAlign = 'start';
    }

    // Train result messages
    if (d.trainResult === 'success' && d.trainResultTimer > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, SB.CONFIG.H/2 - 40, SB.CONFIG.W, 60);
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('✦ TRAINED MONSTER! ✦', SB.CONFIG.W/2, SB.CONFIG.H/2);
      ctx.textAlign = 'start';
    }
    if (d.trainResult === 'fail' && d.trainResultTimer > 0) {
      ctx.fillStyle = 'rgba(255,0,0,0.4)';
      ctx.fillRect(0, SB.CONFIG.H/2 - 40, SB.CONFIG.W, 60);
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('TRAIN FAILED!', SB.CONFIG.W/2, SB.CONFIG.H/2);
      ctx.textAlign = 'start';
    }

    // End screen shake
    ctx.restore();

    // HUD
    this._drawHUD(ctx);

    // Boss intro overlay
    if (d.showingBossIntro) {
      // Floor 200 code reveal sequence — treasure backdrop
      if (d._codeRevealed && d._codeRevealPhase < 3) {
        // Treasure room backdrop
        ctx.fillStyle = '#0a0805';
        ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
        // Warm golden glow
        const glowGrad = ctx.createRadialGradient(SB.CONFIG.W/2, SB.CONFIG.H/2, 50, SB.CONFIG.W/2, SB.CONFIG.H/2, 400);
        glowGrad.addColorStop(0, 'rgba(80,50,10,0.4)'); glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);

        // Treasure items scattered across the floor
        const treasure = [
          // Gold coins
          ...[...Array(30)].map(() => ({t:'coin', x:Math.random()*SB.CONFIG.W, y:SB.CONFIG.H-30-Math.random()*400, s:3+Math.random()*4, c:'#ffd700'})),
          // Silver bars
          ...[...Array(8)].map(() => ({t:'bar', x:Math.random()*SB.CONFIG.W, y:SB.CONFIG.H-20-Math.random()*350, s:5, c:'#c0c0c0'})),
          // Swords
          ...[...Array(4)].map(() => ({t:'sword', x:Math.random()*SB.CONFIG.W, y:SB.CONFIG.H-20-Math.random()*380, s:1, c:'#ddd'})),
          // Spears
          ...[...Array(3)].map(() => ({t:'spear', x:Math.random()*SB.CONFIG.W, y:SB.CONFIG.H-20-Math.random()*350, s:1, c:'#bbb'})),
          // Gems — ruby, sapphire, emerald, amethyst
          ...[...Array(12)].map(() => ({t:'gem', x:Math.random()*SB.CONFIG.W, y:SB.CONFIG.H-30-Math.random()*380, s:4+Math.random()*5, c:['#ff2244','#2244ff','#22cc44','#9944ff'][Math.floor(Math.random()*4)]})),
          // Minerals/crystals
          ...[...Array(6)].map(() => ({t:'crystal', x:Math.random()*SB.CONFIG.W, y:SB.CONFIG.H-20-Math.random()*360, s:3+Math.random()*4, c:'#aaddff'})),
        ];

        for (const tr of treasure) {
          ctx.save();
          const sparkle = 0.6 + Math.sin(Date.now()/200 + tr.x*0.1)*0.4;
          if (tr.t === 'coin') {
            ctx.fillStyle = tr.c; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 6*sparkle;
            ctx.beginPath(); ctx.ellipse(tr.x, tr.y, tr.s, tr.s*0.6, 0, 0, Math.PI*2); ctx.fill();
          } else if (tr.t === 'bar') {
            ctx.fillStyle = tr.c; ctx.shadowColor = '#eee'; ctx.shadowBlur = 3;
            ctx.fillRect(tr.x-6, tr.y-2, 12, 4); ctx.strokeStyle = '#999'; ctx.strokeRect(tr.x-6, tr.y-2, 12, 4);
          } else if (tr.t === 'sword') {
            ctx.strokeStyle = tr.c; ctx.lineWidth = 2; ctx.shadowColor = '#fff'; ctx.shadowBlur = 4*sparkle;
            ctx.beginPath(); ctx.moveTo(tr.x, tr.y-16); ctx.lineTo(tr.x, tr.y+10); ctx.stroke();
            ctx.strokeStyle = '#aa8800'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(tr.x-6, tr.y+10); ctx.lineTo(tr.x+6, tr.y+10); ctx.stroke();
            ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(tr.x, tr.y-18, 3, 0, Math.PI*2); ctx.fill();
          } else if (tr.t === 'spear') {
            ctx.strokeStyle = tr.c; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(tr.x, tr.y-22); ctx.lineTo(tr.x, tr.y+8); ctx.stroke();
            ctx.fillStyle = '#ccc'; ctx.beginPath(); ctx.moveTo(tr.x, tr.y-22); ctx.lineTo(tr.x-3, tr.y-30); ctx.lineTo(tr.x+3, tr.y-30); ctx.closePath(); ctx.fill();
          } else if (tr.t === 'gem') {
            ctx.fillStyle = tr.c; ctx.shadowColor = tr.c; ctx.shadowBlur = 8*sparkle;
            ctx.beginPath(); ctx.moveTo(tr.x, tr.y-tr.s); ctx.lineTo(tr.x+tr.s*0.7, tr.y); ctx.lineTo(tr.x, tr.y+tr.s*0.8);
            ctx.lineTo(tr.x-tr.s*0.7, tr.y); ctx.closePath(); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(tr.x-tr.s*0.15, tr.y-tr.s*0.3, tr.s*0.25, 0, Math.PI*2); ctx.fill();
          } else if (tr.t === 'crystal') {
            ctx.fillStyle = tr.c; ctx.shadowColor = '#aaddff'; ctx.shadowBlur = 5*sparkle;
            ctx.beginPath(); ctx.moveTo(tr.x, tr.y-tr.s); ctx.lineTo(tr.x+tr.s*0.5, tr.y+tr.s*0.2); ctx.lineTo(tr.x+tr.s*0.3, tr.y+tr.s*0.8);
            ctx.lineTo(tr.x-tr.s*0.3, tr.y+tr.s*0.8); ctx.lineTo(tr.x-tr.s*0.5, tr.y+tr.s*0.2); ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.5; ctx.stroke();
          }
          ctx.shadowBlur = 0; ctx.restore();
        }

        // Dark overlay for text readability
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, SB.CONFIG.H/2 - 60, SB.CONFIG.W, 120);

        // Messages
        const messages = [
          'GREAT JOB JAY AND RAY!',
          'THE CODE IS 6724.',
          'ENTER THIS CODE FOR A FREE LIGHTNING POTION OR ULTRA-STAR!'
        ];
        const flash = Math.abs(Math.sin(Date.now()/100));
        ctx.fillStyle = d._codeRevealPhase === 1 ? `rgba(255,215,0,${0.6+flash*0.4})` : '#ffffff';
        ctx.font = d._codeRevealPhase === 1 ? 'bold 36px monospace' : 'bold 28px monospace';
        ctx.textAlign = 'center';
        ctx.shadowColor = d._codeRevealPhase === 1 ? '#ffd700' : '#ffffff';
        ctx.shadowBlur = 15;
        ctx.fillText(messages[d._codeRevealPhase] || '', SB.CONFIG.W/2, SB.CONFIG.H/2);
        ctx.shadowBlur = 0;
        ctx.textAlign = 'start';
      } else if (d._kbSpeech && d._kbSpeechIndex < d._kbSpeech.length) {
        // King Blizzard speech — dramatic text crawl
        ctx.fillStyle = 'rgba(0,0,10,0.75)';
        ctx.fillRect(0, SB.CONFIG.H - 110, SB.CONFIG.W, 100);
        // Speech bubble border
        ctx.strokeStyle = '#6644aa';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#9944ff';
        ctx.shadowBlur = 8;
        ctx.strokeRect(4, SB.CONFIG.H - 108, SB.CONFIG.W - 8, 96);
        ctx.shadowBlur = 0;
        // Speaker label
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 13px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('KING BLIZZARD:', 16, SB.CONFIG.H - 82);
        // Speech text
        ctx.fillStyle = '#ddeeff';
        ctx.font = '12px monospace';
        const line = d._kbSpeech[d._kbSpeechIndex];
        // Word wrap
        const words = line.split(' ');
        let cx = 16, cy = SB.CONFIG.H - 60;
        for (const w of words) {
          const measure = ctx.measureText(w + ' ').width;
          if (cx + measure > SB.CONFIG.W - 20) { cx = 16; cy += 18; }
          ctx.fillText(w + ' ', cx, cy); cx += measure;
        }
        // Progress indicator
        ctx.fillStyle = '#666';
        ctx.font = '10px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(`${d._kbSpeechIndex + 1}/${d._kbSpeech.length}  [Enter to skip]`, SB.CONFIG.W - 16, SB.CONFIG.H - 18);
        ctx.textAlign = 'start';
        // Screen shake on dramatic lines
        if (d._kbSpeechIndex >= 18) d.screenShake = Math.max(d.screenShake, 0.4);
      } else {
        // Standard boss intro
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('WARNING!', SB.CONFIG.W/2, 240);
        ctx.fillStyle = 'white';
        ctx.font = '20px monospace';
        ctx.fillText(d.name, SB.CONFIG.W/2, 275);
        ctx.textAlign = 'start';
      }
    }

    // Stage clear overlay
    if (d.stageClear) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(d.boss ? 'BOSS DEFEATED!' : 'STAGE CLEAR!', SB.CONFIG.W/2, 280);
      ctx.fillStyle = 'white';
      ctx.font = '16px monospace';
      ctx.fillText(`SCORE: ${d.score}`, SB.CONFIG.W/2, 315);
      ctx.textAlign = 'start';
    }
  },

  _drawHUD(ctx) {
    const d = this._data;
    // HUD background
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, SB.CONFIG.W, 36);

    // Level name
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(d.name || '', 10, 22);

    // Score
    ctx.fillStyle = 'white';
    ctx.font = '13px monospace';
    ctx.fillText(`SCORE: ${d.score}`, 250, 22);

    // Lives — P1 + P2
    ctx.fillStyle = '#ff6666';
    const p1Lives = '♥'.repeat(d.player.lives);
    const p2Lives = d.player2 ? '  P2: ' + '♥'.repeat(d.player2.lives) : '';
    ctx.fillText(`P1:${p1Lives}${p2Lives}`, 400, 22);

    // Timer
    const timerColor = d.timer > 30 ? '#44ff44' : d.timer > 10 ? '#ffcc00' : '#ff4444';
    const timerBlink = d.timer <= 10 && Math.floor(Date.now()/400)%2 ? false : true;
    if (timerBlink) {
      ctx.fillStyle = timerColor;
      ctx.fillText(`TIME: ${Math.ceil(Math.max(0, d.timer))}`, 520, 22);
    }

    // Power-up indicators
    let px = 640;
    if (d.player.speed > SB.CONFIG.PLAYER_SPEED) {
      ctx.fillStyle = '#ff4444';
      ctx.fillText('SPD↑', px, 22); px += 50;
    }
    if (d.player.shotPower > 1) {
      ctx.fillStyle = '#4444ff';
      ctx.fillText('PWR↑', px, 22); px += 50;
    }
    if (d.player.shotRange > 1) {
      ctx.fillStyle = '#ffaa00';
      ctx.fillText('RNG↑', px, 22); px += 50;
    }
    if (d.player.balloonMode) {
      ctx.fillStyle = '#44ff44';
      ctx.fillText(`BALLOON ${Math.ceil(d.player.balloonTimer)}s`, px, 22);
    }
