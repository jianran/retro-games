    ctx.restore();
  },

  // -- FLOOR 150: Time-Weaver Spider (translucent turquoise + iridescent glow) --
  drawTimeWeaver(ctx, x, y, w, h, hp, maxHp) {
    ctx.save(); const t = Date.now()/300;
    const cx = x + w/2, cy = y + h/2;
    // Translucent turquoise body
    ctx.fillStyle = 'rgba(50,200,180,0.5)';
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.4, h*0.4, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(100,230,210,0.7)'; ctx.lineWidth = 2; ctx.stroke();
    // Iridescent shimmer
    for (let i=0;i<5;i++) {
      const sx = cx + Math.cos(t+i)*w*0.25, sy = cy + Math.sin(t*1.3+i)*h*0.2;
      ctx.fillStyle = `rgba(200,255,240,${0.3+Math.sin(t*2+i)*0.2})`;
      ctx.beginPath(); ctx.arc(sx, sy, 3+Math.sin(t+i)*1.5, 0, Math.PI*2); ctx.fill();
    }
    // Thread legs
    ctx.strokeStyle = 'rgba(100,220,200,0.5)'; ctx.lineWidth = 1.5;
    for (let i=0;i<8;i++) {
      const la = (i/8)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx+Math.cos(la)*w*0.3, cy+Math.sin(la)*h*0.25);
      ctx.lineTo(cx+Math.cos(la)*w*0.5, cy+Math.sin(la)*h*0.45+6);
      ctx.stroke();
    }
    // Eyes — multiple small
    for (let i=0;i<4;i++) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx-4+i*3, cy-6, 1.5, 0, Math.PI*2); ctx.fill();
    }
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 10;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#44ddcc' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 160: Mirror Doppelgänger (shadow-blue snowman + red eyes) --
  drawDoppelganger(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const cx = x + w/2, cy = y + h-16;
    // Shadow-blue snowman body
    const bodyGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, 16);
    bodyGrad.addColorStop(0, '#334466'); bodyGrad.addColorStop(1, '#112244');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#556688'; ctx.lineWidth = 2; ctx.stroke();
    // Head
    ctx.fillStyle = '#334466';
    ctx.beginPath(); ctx.arc(cx, y+10, 12, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#556688'; ctx.stroke();
    // Hat
    ctx.fillStyle = '#111133'; ctx.fillRect(cx-10, y-6, 20, 4);
    ctx.fillRect(cx-6, y-18, 12, 14);
    // Glowing red eyes
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(cx-4, y+7, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+6, y+7, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Cursed aura
    ctx.strokeStyle = 'rgba(255,0,0,0.2)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, y+h/2, 20, 0, Math.PI*2); ctx.stroke();
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 8;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#ff4444' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 170: Alchemist's Cauldron (soot-black iron + toxic lime-green acid) --
  drawCauldron(ctx, x, y, w, h, hp, maxHp) {
    ctx.save(); const t = Date.now()/200;
    const cx = x + w/2, cy = y + h/2;
    // Iron pot
    const iGrad = ctx.createLinearGradient(x, 0, x+w, 0);
    iGrad.addColorStop(0, '#1a1a1a'); iGrad.addColorStop(0.5, '#333333'); iGrad.addColorStop(1, '#111111');
    ctx.fillStyle = iGrad;
    ctx.beginPath();
    ctx.moveTo(x+4, y+10); ctx.lineTo(x, cy); ctx.quadraticCurveTo(cx, y+h+4, x+w, cy);
    ctx.lineTo(x+w-4, y+10); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.stroke();
    // Soot
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x+2, y+8, w-4, 6);
    // Toxic acid bubbles
    ctx.fillStyle = '#88ff00';
    for (let i=0;i<5;i++) {
      const bx = cx-12+i*6, by = cy + Math.sin(t*3+i)*2;
      ctx.beginPath(); ctx.arc(bx, by, 3+Math.sin(t*2+i)*1, 0, Math.PI*2); ctx.fill();
    }
    // Acid glow
    ctx.fillStyle = 'rgba(136,255,0,0.15)';
    ctx.beginPath(); ctx.arc(cx, cy+6, w*0.3, 0, Math.PI*2); ctx.fill();
    // Eyes on pot
    ctx.fillStyle = '#ff8800';
    ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(cx-6, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+6, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 10;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#88ff00' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 180: Necromancer Dragon (pale bone-white + ghostly green mist) --
  drawNecromancerDragon(ctx, x, y, w, h, hp, maxHp) {
    ctx.save(); const t = Date.now()/250;
    const cx = x + w/2, cy = y + h/2;
    // Bone-white ribs
    ctx.fillStyle = '#e8e0d0';
    ctx.strokeStyle = '#ccbbaa'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, y+4); ctx.lineTo(x+8, cy+6); ctx.lineTo(x+4, y+h-4);
    ctx.quadraticCurveTo(cx, y+h+8, x+w-4, y+h-4);
    ctx.lineTo(x+w-8, cy+6); ctx.closePath(); ctx.fill(); ctx.stroke();
    // Rib cage lines
    ctx.strokeStyle = '#bba899'; ctx.lineWidth = 1;
    for (let i=0;i<4;i++) {
      ctx.beginPath(); ctx.moveTo(x+10+i*10, cy+2); ctx.lineTo(x+14+i*10, y+h-6); ctx.stroke();
    }
    // Ghostly green mist aura
    const mistAlpha = 0.15 + Math.sin(t*1.5)*0.08;
    ctx.fillStyle = `rgba(100,255,100,${mistAlpha})`;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.5, h*0.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(150,255,150,${mistAlpha*0.7})`;
    ctx.beginPath(); ctx.arc(cx+Math.sin(t)*8, cy-8, w*0.2, 0, Math.PI*2); ctx.fill();
    // Eyes — pale green glow
    ctx.fillStyle = '#88ff88';
    ctx.shadowColor = '#44ff44'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(cx-6, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+6, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 12;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#44ff44' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 190: Living Castle Wall (charcoal-grey masonry + warning-red attack) --
  drawCastleWall(ctx, x, y, w, h, hp, maxHp, attacking) {
    ctx.save(); const t = Date.now()/300;
    const cx = x + w/2, cy = y + h/2;
    // Charcoal-grey masonry
    ctx.fillStyle = attacking ? '#553333' : '#3a3a3a';
    ctx.fillRect(x, y+6, w, h-6);
    // Brick lines
    ctx.strokeStyle = attacking ? '#442222' : '#2a2a2a';
    ctx.lineWidth = 1;
    for (let row=0; row<5; row++) {
      const by = y+8+row*10;
      ctx.beginPath(); ctx.moveTo(x, by); ctx.lineTo(x+w, by); ctx.stroke();
      const offset = row%2===0 ? 0 : 10;
      for (let col=offset; col<w; col+=20) {
        ctx.beginPath(); ctx.moveTo(x+col, by); ctx.lineTo(x+col, by+10); ctx.stroke();
      }
    }
    // Battlements on top
    ctx.fillStyle = attacking ? '#663333' : '#4a4a4a';
    for (let i=0;i<5;i++) {
      ctx.fillRect(x+8+i*16, y-4, 10, 12);
    }
    // Warning-red glow when attacking
    if (attacking) {
      ctx.fillStyle = 'rgba(255,0,0,0.2)';
      ctx.fillRect(x, y+6, w, h-6);
      ctx.fillStyle = '#ff0000';
      ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(cx-8, cy-6, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+8, cy-6, 3, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = '#666';
      ctx.beginPath(); ctx.arc(cx-8, cy-6, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+8, cy-6, 3, 0, Math.PI*2); ctx.fill();
    }
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 12;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? (attacking?'#ff4444':'#888888') : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // Ultra-Star (rainbow ice star)
  drawUltraStar(ctx, x, y, w, h) {
    ctx.save();
    const t = Date.now()/100;
    const cx = x + w/2, cy = y + h/2, r = w/2;
    // Rainbow glow
    const grad = ctx.createRadialGradient(cx, cy, r*0.2, cx, cy, r*1.5);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, '#88ccff');
    grad.addColorStop(0.5, '#ff88ff');
    grad.addColorStop(0.7, '#ffcc44');
    grad.addColorStop(1, 'rgba(100,200,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, r*1.5, 0, Math.PI*2); ctx.fill();

    // Star shape
    const spikes = 8, outerR = r, innerR = r*0.4;
    ctx.fillStyle = '#eef';
    ctx.strokeStyle = '#aaccff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < spikes*2; i++) {
      const radius = i%2===0 ? outerR : innerR;
      const angle = (i*Math.PI/spikes) - Math.PI/2 + Math.sin(t*2)*0.1;
      const sx = cx + Math.cos(angle)*radius;
      const sy = cy + Math.sin(angle)*radius;
      if (i===0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Inner sparkle
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx, cy, r*0.25, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },

  // King Blizzard — massive colossus (~1/3 screen)
  drawKingBlizzard(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const t = Date.now()/300;
    const cx = x + w/2, cy = y + h/2;

    // Outer dark aura — pulsating violet shadow
    const auraGrad = ctx.createRadialGradient(cx, cy, w*0.35, cx, cy, w*0.7);
    auraGrad.addColorStop(0, 'rgba(30,5,60,0.3)');
    auraGrad.addColorStop(0.7, 'rgba(60,10,80,0.15)');
    auraGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = auraGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.7, h*0.65, 0, 0, Math.PI*2); ctx.fill();

    // Shifting ice body — layered ellipses with different violet/blue tones
    for (let layer = 3; layer >= 0; layer--) {
      const scale = 0.5 - layer * 0.12;
      const hueShift = Math.sin(t + layer) * 20;
      const satShift = Math.sin(t*0.7 + layer*2) * 10;
      const bodyGrad = ctx.createRadialGradient(
        cx + Math.sin(t + layer*1.5)*8, cy + Math.cos(t*0.8 + layer)*6,
        w*0.02,
        cx, cy,
        w * scale
      );
      const hueVal = 250 + hueShift;
      bodyGrad.addColorStop(0, `hsla(${hueVal}, ${60+satShift}%, ${35+layer*10}%, 0.9)`);
      bodyGrad.addColorStop(0.5, `hsla(${hueVal-20}, ${50+satShift}%, ${20+layer*8}%, 0.85)`);
      bodyGrad.addColorStop(1, `hsla(${hueVal-40}, ${40+satShift}%, ${8+layer*4}%, 0.8)`);
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.ellipse(cx + Math.sin(t*0.5 + layer)*5, cy + Math.cos(t*0.6 + layer)*4,
        w*scale, h*scale*0.85, 0, 0, Math.PI*2);
      ctx.fill();
      // Layer outline
      ctx.strokeStyle = `hsla(${220+hueShift}, 70%, ${40+layer*15}%, 0.4)`;
      ctx.lineWidth = 2 + layer * 0.5;
      ctx.stroke();
    }

    // Crystalline ice spikes protruding from body
    ctx.fillStyle = '#334477';
    ctx.strokeStyle = '#6699cc';
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const angle = (i/8) * Math.PI * 2 + t * 0.1;
      const spikeLen = w * (0.4 + Math.sin(i*2.5 + t)*0.08);
      const sx = cx + Math.cos(angle) * w * 0.38;
      const sy = cy + Math.sin(angle) * h * 0.32;
      ctx.beginPath();
      ctx.moveTo(sx - 6, sy - 6);
      ctx.lineTo(sx + Math.cos(angle)*spikeLen, sy + Math.sin(angle)*spikeLen*0.8);
      ctx.lineTo(sx + 6, sy + 6);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    // Glowing crown — massive, jagged
    const crownW = w * 0.45, crownH = h * 0.15;
    ctx.fillStyle = '#554488';
    ctx.strokeStyle = '#9988cc';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#8866cc';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(cx - crownW/2, cy - h*0.3);
    for (let i = 0; i < 5; i++) {
      const cx2 = cx - crownW/2 + crownW*(i/4);
      ctx.lineTo(cx2 - crownW*0.06, cy - h*0.3 - crownH*(i%2===0?1.2:0.6));
      ctx.lineTo(cx2 + crownW*0.06, cy - h*0.3 - crownH*(i%2===0?0.6:1.2));
    }
    ctx.lineTo(cx + crownW/2, cy - h*0.3);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(cx, cy - h*0.3 - crownH*0.3, 6, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Burning red eyes — large, menacing
    const eyeY = cy - h*0.12;
    for (const side of [-1, 1]) {
      const ex = cx + side * w * 0.15;
      // Outer glow
      const eyeGlow = ctx.createRadialGradient(ex, eyeY, 2, ex, eyeY, w*0.08);
      eyeGlow.addColorStop(0, 'rgba(255,0,0,0.8)');
      eyeGlow.addColorStop(0.5, 'rgba(255,50,0,0.3)');
      eyeGlow.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = eyeGlow;
      ctx.beginPath(); ctx.arc(ex, eyeY, w*0.08, 0, Math.PI*2); ctx.fill();
      // Eye
      ctx.fillStyle = '#ff2200';
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 12 + Math.sin(t*3)*4;
      ctx.beginPath(); ctx.ellipse(ex, eyeY, w*0.04, w*0.025, 0, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      // Pupil
      ctx.fillStyle = '#440000';
      ctx.beginPath(); ctx.arc(ex, eyeY, w*0.015, 0, Math.PI*2); ctx.fill();
    }

    // Mouth — jagged ice crack
    ctx.strokeStyle = '#220044';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#440066';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(cx - w*0.12, cy + h*0.12);
    for (let i = 0; i < 5; i++) {
      const mx = cx - w*0.12 + w*0.24*(i/4);
      ctx.lineTo(mx, cy + h*0.12 + (i%2===0 ? -h*0.03 : h*0.03));
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Pulsing icy aura ring
    const ringAlpha = 0.12 + Math.sin(t*2)*0.06;
    ctx.strokeStyle = `rgba(100,160,255,${ringAlpha})`;
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.55, h*0.52, 0, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `rgba(160,200,255,${ringAlpha*0.6})`;
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.6, h*0.57, 0, 0, Math.PI*2); ctx.stroke();

    // HP bar — massive, spans nearly full width of boss
    const hpPct = hp/maxHp;
    const barW = w * 0.85, barH = 10, barX = cx - barW/2, barY = y - 24;
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
    ctx.strokeStyle = '#554488';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX - 2, barY - 2, barW + 4, barH + 4);
    const hpGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    hpGrad.addColorStop(0, hpPct > 0.3 ? '#44ff44' : '#ff4444');
    hpGrad.addColorStop(0.4, hpPct > 0.5 ? '#88ff44' : '#ffaa00');
    hpGrad.addColorStop(1, hpPct > 0.7 ? '#ffcc00' : '#ff0000');
    ctx.fillStyle = hpGrad;
    ctx.fillRect(barX, barY, barW * hpPct, barH);
    // HP segments
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    for (let i = 1; i < 10; i++) ctx.fillRect(barX + barW*(i/10) - 1, barY, 2, barH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`KING BLIZZARD  ${hp}/${maxHp}`, cx, barY - 8);
    ctx.textAlign = 'start';

    ctx.restore();
  },

  // Mini-boss clone (smaller King Blizzard)
  drawMiniClone(ctx, x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#223355';
    ctx.beginPath(); ctx.ellipse(x+w/2, y+h/2, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#4466aa';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ff3333';
    ctx.beginPath(); ctx.arc(x+w*0.35, y+h*0.35, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.65, y+h*0.35, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },

  // Trained Monster (tamed boss with collar)
  drawTrainedMonster(ctx, x, y, w, h, type) {
    ctx.save();
    // Use boss drawing but with a golden collar
    if (type === 'iron_mole') SB.Sprites.drawIronMole(ctx, x, y, w, h, 6, 6);
    else if (type === 'magma_slime') SB.Sprites.drawMagmaSlime(ctx, x, y, w, h, 8, 8);
    else if (type === 'thunder_djinn') SB.Sprites.drawThunderDjinn(ctx, x, y, w, h, 10, 10);
    else {
      ctx.fillStyle = '#6688aa';
      ctx.beginPath(); ctx.ellipse(x+w/2, y+h/2, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
    }
    // Golden collar
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(x+w/2, y+h*0.35, w*0.4, 0.2, Math.PI-0.2); ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(x+w/2, y+h*0.35-w*0.35, 4, 0, Math.PI*2); ctx.fill();
    // Sparkles
    const t = Date.now()/150;
    ctx.fillStyle = `rgba(255,215,0,${0.4+Math.sin(t)*0.3})`;
    ctx.beginPath(); ctx.arc(x+w-2, y+2, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },
};

// ============================================================
// PHYSICS
// ============================================================
SB.Physics = {
  rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  },

  // Resolve entity against platforms
  resolvePlatforms(entity, platforms, dt) {
    let onGround = false;

    // Apply gravity
    if (!entity.noGravity) {
      entity.vy += SB.CONFIG.GRAVITY * dt;
    }

    // Move X
    entity.x += entity.vx * dt;
    for (const p of platforms) {
      if (p.type === 'hazard') continue;
      if (this.rectCollide(entity, p)) {
        if (entity.vx > 0) {
          entity.x = p.x - entity.w;
          entity.vx = entity.bounceX ? -entity.vx * 0.7 : 0;
        } else if (entity.vx < 0) {
          entity.x = p.x + p.w;
          entity.vx = entity.bounceX ? -entity.vx * 0.7 : 0;
        }
      }
    }

    // Move Y
    entity.y += entity.vy * dt;
    for (const p of platforms) {
      if (p.type === 'hazard') continue;
      if (this.rectCollide(entity, p)) {
        if (entity.vy > 0) {
          // Landing
          entity.y = p.y - entity.h;
          entity.vy = 0;
          onGround = true;
          entity.onGround = true;
        } else if (entity.vy < 0) {
          // Hit ceiling
          entity.y = p.y + p.h;
          entity.vy = entity.bounceY ? -entity.vy * 0.5 : 0;
        }
      }
    }

    // Check hazard platforms
    for (const p of platforms) {
      if (p.type === 'hazard' && this.rectCollide(entity, p)) {
        if (entity.takeHazardDamage) entity.takeHazardDamage();
      }
    }

    // Clamp to canvas
    entity.x = SB.Utils.clamp(entity.x, 0, SB.CONFIG.W - entity.w);
    if (entity.y > SB.CONFIG.H) {
      entity.y = SB.CONFIG.H;
      entity.vy = 0;
      onGround = true;
      entity.onGround = true;
    }
    if (entity.y < -entity.h) entity.y = -entity.h;

    if (!onGround) entity.onGround = false;
    return onGround;
  },
};

// --- SNOWBALL (player projectile) ---
SB.Snowball = class {
  constructor(x, y, vx, vy) {
    this.x = x; this.y = y;
    this.w = SB.CONFIG.SNOW_W; this.h = SB.CONFIG.SNOW_H;
    this.vx = vx; this.vy = vy;
    this.life = SB.CONFIG.SNOWBALL_LIFETIME;
    this.alive = true;
    this.noGravity = true;
    this.bounceX = true; this.bounceY = true;
    this.onGround = false;
    this.freezeAmount = SB.CONFIG.FREEZE_PER_HIT;
  }

  update(dt, platforms) {
    this.life -= dt;
    if (this.life <= 0) { this.alive = false; return; }
    // Arc trajectory with slight gravity
    this.vy += 300 * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // Bounce off walls
    for (const p of platforms) {
      if (SB.Physics.rectCollide(this, p)) {
        if (this.vx > 0) { this.x = p.x - this.w; this.vx = -this.vx * 0.6; }
        else if (this.vx < 0) { this.x = p.x + p.w; this.vx = -this.vx * 0.6; }
        if (this.vy > 0) { this.y = p.y - this.h; this.vy = -this.vy * 0.5; }
        else if (this.vy < 0) { this.y = p.y + p.h; this.vy = -this.vy * 0.5; }
      }
    }
    if (this.x < 0 || this.x > SB.CONFIG.W || this.y > SB.CONFIG.H) {
      this.alive = false;
    }
  }

  draw(ctx) { SB.Sprites.drawSnowball(ctx, this.x, this.y, this.w, this.h); }
};

// --- GIANT SNOWBALL ---
SB.GiantSnowball = class {
  constructor(x, y, enemyType) {
    this.x = x - 8; this.y = y - 4;
    this.w = 36; this.h = 36;
    this.vx = 0; this.vy = 0;
    this.alive = true;
    this.noGravity = false;
    this.bounceX = true; this.bounceY = true;
    this.onGround = false;
    this.enemyType = enemyType;
    this.beingPushed = true;
    this.pushTimer = 0.3; // brief window to push it
    this.crushed = new Set(); // track crushed enemies to avoid double-count
    this.bounces = 0;
    this.bounceWalls = true;
  }

  update(dt, platforms, player) {
    if (this.beingPushed) {
      this.pushTimer -= dt;
      // Check if player is pushing
      if (SB.Physics.rectCollide(player, {
        x: this.x - 4, y: this.y - 4, w: this.w + 8, h: this.h + 8
      })) {
        if (player.vx !== 0) {
          this.vx = player.vx > 0 ? SB.CONFIG.GIANT_SNOWBALL_SPEED : -SB.CONFIG.GIANT_SNOWBALL_SPEED;
          this.beingPushed = false;
          SB.Audio.sfxThrow();
        }
      }
      if (this.pushTimer <= 0) {
        // Auto-launch in facing direction
        this.vx = player.facing > 0 ? SB.CONFIG.GIANT_SNOWBALL_SPEED : -SB.CONFIG.GIANT_SNOWBALL_SPEED;
        this.beingPushed = false;
      }
    } else {
      // Apply friction
      this.vx *= SB.CONFIG.GIANT_FRICTION;
      if (Math.abs(this.vx) < 5) this.vx = 0;
    }

    // Physics
    SB.Physics.resolvePlatforms(this, platforms, dt);

    // Wall bounce
    if (this.bounceWalls) {
      if (this.x <= 0 || this.x + this.w >= SB.CONFIG.W) {
        this.vx = -this.vx * 0.8;
        this.bounces++;
        this.x = SB.Utils.clamp(this.x, 0, SB.CONFIG.W - this.w);
      }
    }

    // Stop if no velocity and on ground
    if (this.onGround && Math.abs(this.vx) < 2 && !this.beingPushed) {
      this.alive = false;
    }

    // Off screen
    if (this.y > SB.CONFIG.H + 50) this.alive = false;
    if (Math.abs(this.vx) < 1 && Math.abs(this.vy) < 1 && this.onGround && !this.beingPushed) {
      this.alive = false;
    }
  }

  draw(ctx) { SB.Sprites.drawGiantSnowball(ctx, this.x, this.y, this.w, this.h); }
};

// --- PLAYER ---
SB.Player = class {
  constructor(scheme) {
    this.controlScheme = scheme || 'p1'; // 'p1' or 'p2'
    this.character = scheme === 'p2' ? 'jay' : 'ray';
    this.reset();
  }

  reset() {
    this.x = 100; this.y = 200;
    this.w = SB.CONFIG.PLAYER_W; this.h = SB.CONFIG.PLAYER_H;
    this.vx = 0; this.vy = 0;
    this.facing = 1;
    this.onGround = false;
    this.noGravity = false;
    this.bounceX = false; this.bounceY = false;
    this.alive = true;

    // Stats
    this.lives = SB.CONFIG.MAX_LIVES;
    this.speed = SB.CONFIG.PLAYER_SPEED;
    this.shotPower = 1; // how many freeze points per hit
    this.shotRange = 1; // multiplier
    this.shotCooldown = 0;
    this.shotCooldownTime = 0.25;

    // Invincibility
    this.invincible = false;
    this.invincibleTimer = 0;

    // Balloon mode
    this.balloonMode = false;
    this.balloonTimer = 0;

    // Victory pose
    this.victoryPose = false;
    this.victoryPoseTimer = 0;

    // Petrification
    this.petrified = false;
    this.petrifyTimer = 0;
    this.petrifiedBy = null;

    // Dash
    this.dashCooldown = 0; this.dashTimer = 0; this.dashing = false;
    this.dashSpeed = 600;

    // Shield
    this.shieldActive = false;

    // Combo
    this.combo = 1; this.comboTimer = 0;

    // Damage cooldown
    this.damageCooldown = 0;

    this.takeHazardDamage = () => this.takeDamage();
  }

  takeDamage() {
    if (this.invincible || this.balloonMode || this.damageCooldown > 0) return;
    // Shield absorbs one hit
    if (this.shieldActive) { this.shieldActive = false; SB.Audio.sfxFreeze(); SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 15, '#aaddff', 80, 0.4, 3); return; }
    this.lives--;
    this.damageCooldown = 2;
    this.invincible = true;
    this.invincibleTimer = 2;
    // Reset power-ups + combo
    this.speed = SB.CONFIG.PLAYER_SPEED; this.shotPower = 1; this.shotRange = 1; this.combo = 1;
    SB.Audio.sfxHit();
    if (this.lives <= 0) { this.alive = false; SB.Audio.sfxDeath(); }
    SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 20, '#ff8888', 100, 0.5, 3);
  }

  update(dt, platforms) {
    if (!this.alive) return;
    // Petrified — frozen solid
    if (this.petrified) { this.vx = 0; this.vy = 0; return; }

    // Timers
    this.shotCooldown = Math.max(0, this.shotCooldown - dt);
    this.damageCooldown = Math.max(0, this.damageCooldown - dt);
    if (this.invincible) {
      this.invincibleTimer -= dt;
      if (this.invincibleTimer <= 0) { this.invincible = false; }
    }
    if (this.victoryPose) {
      this.victoryPoseTimer -= dt;
      if (this.victoryPoseTimer <= 0) { this.victoryPose = false; }
    }
    if (this.balloonMode) {
      this.balloonTimer -= dt;
      if (this.balloonTimer <= 0) { this.balloonMode = false; this.noGravity = false; }
    }

    // Input — P1 arrows+ZX/Space, P2 WASD+Q/E
    const isP2 = this.controlScheme === 'p2';
    const left = SB.Input.down(isP2 ? 'KeyA' : 'ArrowLeft');
    const right = SB.Input.down(isP2 ? 'KeyD' : 'ArrowRight');
    const up = SB.Input.down(isP2 ? 'KeyW' : 'ArrowUp');
    const down = SB.Input.down(isP2 ? 'KeyS' : 'ArrowDown');
    const jump = SB.Input.pressed(isP2 ? 'KeyW' : 'ArrowUp') || SB.Input.pressed(isP2 ? 'KeyQ' : 'KeyZ');

    if (this.balloonMode) {
      this.vx = 0; this.vy = 0;
      if (left) this.vx = -this.speed * 1.3;
      if (right) this.vx = this.speed * 1.3;
      if (up) this.vy = -this.speed * 1.3;
      if (down) this.vy = this.speed * 1.3;
      this.x += this.vx * dt; this.y += this.vy * dt;
      this.x = SB.Utils.clamp(this.x, 0, SB.CONFIG.W - this.w);
      this.y = SB.Utils.clamp(this.y, 0, SB.CONFIG.H - this.h);
      if (left) this.facing = -1;
      if (right) this.facing = 1;
    } else {
      // Dash mechanic
      this.dashCooldown = Math.max(0, this.dashCooldown - dt);
      if (this.dashing) { this.dashTimer -= dt; if (this.dashTimer <= 0) this.dashing = false; }
      const dashKey = SB.Input.pressed('ShiftLeft') || SB.Input.pressed('ShiftRight');
      if (dashKey && this.onGround && this.dashCooldown <= 0 && !this.dashing) {
        this.dashing = true; this.dashTimer = 0.25; this.dashCooldown = 1.2;
        this.vx = this.facing * this.dashSpeed; SB.Audio.sfxJump();
      }
      // Normal movement
      if (!this.dashing) this.vx = 0;
      if (!this.dashing && left) { this.vx = -this.speed; this.facing = -1; }
      if (!this.dashing && right) { this.vx = this.speed; this.facing = 1; }
      if (jump && this.onGround) { this.vy = SB.CONFIG.PLAYER_JUMP; SB.Audio.sfxJump(); }
      SB.Physics.resolvePlatforms(this, platforms, dt);
    }
    // Combo timer
    if (this.combo > 1) { this.comboTimer -= dt; if (this.comboTimer <= 0) this.combo = Math.max(1, this.combo - 0.5); }

    // Collision with enemies (handled by scene)
  }

  shoot() {
    if (this.shotCooldown > 0) return null;
    this.shotCooldown = this.shotCooldownTime;
    SB.Audio.sfxThrow();
    const sx = this.x + (this.facing > 0 ? this.w : -8);
    const sy = this.y + this.h * 0.4;
    // Range potion = faster snowball = further reach in same lifetime
    const rangeMult = this.shotRange || 1;
    const vx = this.facing * SB.CONFIG.SNOWBALL_SPEED * rangeMult;
    const vy = -60 * (rangeMult > 1 ? 1.2 : 1);
    const sb = new SB.Snowball(sx, sy, vx, vy);
    // Power potion = more freeze per hit
    sb.freezeAmount = SB.CONFIG.FREEZE_PER_HIT * (this.shotPower || 1);
    return sb;
  }

  draw(ctx) {
    SB.Sprites.drawPlayer(ctx, this.x, this.y, this.w, this.h, this.facing, this.invincible, this.balloonMode, this.character, this.victoryPose);
  }
};

SB.Enemy = class {

    this.alive = true;
    this.type = type;

    this.frostSlowed = false; this.frostSlowTimer = 0;

    // patrol
    this.patrolLeft = x - 50;
    this.patrolRight = x + 50;

  }

    this.freezeLevel = Math.min(SB.CONFIG.MAX_FREEZE, this.freezeLevel + amount);
    this.vx *= 0.6; // slow when frozen

    SB.Audio.sfxFreeze();
    SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 5, '#ccddff', 40, 0.3, 2);
  }

  isFrozen() { return this.freezeLevel >= SB.CONFIG.MAX_FREEZE; }

  update(dt, platforms, player) {
    // Override in subclasses
  }

    // Override in subclasses
  }

// --- GOBLIN ---
SB.Goblin = class extends SB.Enemy {
  constructor(x, y) {
    super(x, y, 'goblin');
    this.patrolSpeed = 50 + Math.random() * 30;
    this.climbing = false; this.climbCooldown = 0;
  }
  update(dt, platforms, player) {
    const speed = this.patrolSpeed * (1 - this.freezeLevel/150);
    // Vertical tracking — climb toward player if on different platform levels
    if (player && this.onGround && !this.climbing && this.climbCooldown <= 0) {
      const vertDist = player.y - this.y;
      if (vertDist < -40 && Math.abs(player.x - this.x) < 100) {
        // Player is above — look for nearby platforms to climb
        for (const p of platforms) {
          if (p.y < this.y - 20 && Math.abs(p.x - this.x) < 80 && p.y > player.y - 20) {
            this.vy = -350; this.climbing = true; this.climbCooldown = 3;
            this.vx = (p.x + p.w/2 > this.x ? 1 : -1) * speed * 1.5;
            break;
          }
        }
      }
    }
    if (this.climbCooldown > 0) this.climbCooldown -= dt;
    // Vertical hunting — drop down if player is still below
    if (player && this.onGround && player.y > this.y + 60 && Math.abs(player.x - this.x) < 60 && Math.abs(player.vx) < 10) {
      for (const p of platforms) {
        if (this.y + this.h >= p.y && this.y <= p.y + 2 && this.x + this.w > p.x && this.x < p.x + p.w) {
          if (p.y + p.h < player.y + 10) { this.y += 4; break; } // drop through one-way platform
        }
      }
    }
    // Patrol
    this.vx = (this.climbing ? this.vx : this.facing * speed);
    this.x += this.vx * dt;
    if (this.x <= this.patrolLeft) { this.facing = 1; this.x = this.patrolLeft; this.climbing = false; }
    if (this.x + this.w >= this.patrolRight) { this.facing = -1; this.x = this.patrolRight - this.w; this.climbing = false; }
    // Gravity
    this.vy += SB.CONFIG.GRAVITY * dt;
    this.y += this.vy * dt;
    this.onGround = false;
    for (const p of platforms) {
      if (SB.Physics.rectCollide(this, p)) {
        if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; this.onGround = true; this.climbing = false; }
        else if (this.vy < 0) { this.y = p.y + p.h; this.vy = 0; }
      }
    }
    if (this.y > SB.CONFIG.H) { this.y = SB.CONFIG.H; this.vy = 0; this.onGround = true; }
  }
  draw(ctx) { SB.Sprites.drawGoblin(ctx, this.x, this.y, this.w, this.h, this.freezeLevel, this.facing); }
};

// --- NINJA ---
SB.Ninja = class extends SB.Enemy {
  constructor(x, y) {
    super(x, y, 'ninja');
    this.patrolSpeed = 70 + Math.random() * 20;
    this.tornadoTimer = 0;
    this.tornadoCooldown = 0;
    this.inTornado = false;
  }
  update(dt, platforms, player) {
    // Proximity-based tornado trigger
    if (!this.inTornado && player) {
      const dist = SB.Utils.dist(this, player);
      if (dist < 150 && this.tornadoCooldown <= 0) {
        this.inTornado = true; this.tornadoTimer = 1.2; this.tornadoCooldown = 3 + Math.random()*3;
        const dx = player.x - this.x, dy = player.y - this.y;
        const d = Math.sqrt(dx*dx+dy*dy) || 1;
        this.vx = dx/d * 220; this.vy = dy/d * 220;
      }
    }
    this.tornadoTimer -= dt;
    if (this.tornadoTimer <= 0 && this.inTornado) { this.inTornado = false; this.noGravity = false; this.vx = 0; this.vy = 0; }
    if (this.tornadoCooldown > 0 && !this.inTornado) this.tornadoCooldown -= dt;

    if (this.inTornado) {
      this.noGravity = true;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      if (this.tornadoTimer <= 0) {
        this.inTornado = false;
        this.noGravity = false;
        this.vx = 0;
        this.vy = 0;
      }
      this.x = SB.Utils.clamp(this.x, -10, SB.CONFIG.W + 10);
      this.y = SB.Utils.clamp(this.y, -10, SB.CONFIG.H + 10);
    } else {
      this.noGravity = false;
      // Thaw — freeze decays over time if not fully frozen
    if (this.freezeLevel > 0 && this.freezeLevel < SB.CONFIG.MAX_FREEZE) {
      this.freezeLevel = Math.max(0, this.freezeLevel - 10 * dt);
    }
    const frostMult = this.frostSlowed ? 0.3 : 1;
    this.vx = this.facing * this.patrolSpeed * (1 - this.freezeLevel/150) * frostMult;
      this.x += this.vx * dt;
      if (this.x <= this.patrolLeft) { this.facing = 1; this.x = this.patrolLeft; }
      if (this.x + this.w >= this.patrolRight) { this.facing = -1; this.x = this.patrolRight - this.w; }
      this.vy += SB.CONFIG.GRAVITY * dt;
      this.y += this.vy * dt;
      this.onGround = false;
      for (const p of platforms) {
        if (SB.Physics.rectCollide(this, p)) {
          if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; this.onGround = true; }
          else if (this.vy < 0) { this.y = p.y + p.h; this.vy = 0; }
        }
      }
    }
  }

  draw(ctx) {
    SB.Sprites.drawNinja(ctx, this.x, this.y, this.w, this.h, this.freezeLevel, this.inTornado);
  }
};

// --- MONSTER (fire breather) ---
SB.Monster = class extends SB.Enemy {
  constructor(x, y) {
    super(x, y, 'monster');
    this.patrolSpeed = 35 + Math.random() * 20;
    this.fireTimer = 0; this.fireCooldown = 2 + Math.random()*2;
    this.fires = []; this.cheekPuff = 0; // tell before fire
  }
  update(dt, platforms, player) {
    this.fireTimer -= dt; this.cheekPuff = Math.max(0, this.cheekPuff - dt);
    if (this.fireTimer <= 0) {
      this.fireCooldown -= dt;
      if (this.fireCooldown <= 0) {
        this.cheekPuff = 0.4; // puff cheeks as tell
        this.fireTimer = 1.8; this.fireCooldown = 2 + Math.random()*3;
      }
    }
    // Fire after cheek puff finishes
    if (this.fireTimer <= 1.4 && this.cheekPuff <= 0 && this.fires.length === 0) {
      const fx = this.facing > 0 ? this.x + this.w : this.x - 60;
      this.fires.push({x:fx, y:this.y+10, w:60, h:14, life:1.2});
      if (player && player.y > this.y + 20) {
        this.fires.push({x:this.x+4, y:this.y+this.h, w:28, h:60, life:1.0}); // downward fire
      }
    }

    // Update fires
    for (const f of this.fires) f.life -= dt;
    this.fires = this.fires.filter(f => f.life > 0);

    // Movement
    // Thaw — freeze decays over time if not fully frozen
    if (this.freezeLevel > 0 && this.freezeLevel < SB.CONFIG.MAX_FREEZE) {
      this.freezeLevel = Math.max(0, this.freezeLevel - 10 * dt);
    }
    const frostMult = this.frostSlowed ? 0.3 : 1;
    this.vx = this.facing * this.patrolSpeed * (1 - this.freezeLevel/150) * frostMult;
    this.x += this.vx * dt;
    if (this.x <= this.patrolLeft) { this.facing = 1; this.x = this.patrolLeft; }
    if (this.x + this.w >= this.patrolRight) { this.facing = -1; this.x = this.patrolRight - this.w; }
    this.vy += SB.CONFIG.GRAVITY * dt;
    this.y += this.vy * dt;
    this.onGround = false;
    for (const p of platforms) {
      if (SB.Physics.rectCollide(this, p)) {
        if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; this.onGround = true; }
        else if (this.vy < 0) { this.y = p.y + p.h; this.vy = 0; }
      }
    }
  }

  draw(ctx) {
    SB.Sprites.drawMonster(ctx, this.x, this.y, this.w, this.h, this.freezeLevel, this.cheekPuff);
    for (const f of this.fires) {
      ctx.globalAlpha = f.life;
      SB.Sprites.drawFire(ctx, f.x, f.y, f.w, f.h);
      ctx.globalAlpha = 1;
    }
  }
};

    this.climbing = false;
    this.climbTimer = 0;
  }

  update(dt, platforms, player) {
    if (this.onGround) {
      // Fast ground patrol
      // Thaw — freeze decays over time if not fully frozen
    if (this.freezeLevel > 0 && this.freezeLevel < SB.CONFIG.MAX_FREEZE) {
      this.freezeLevel = Math.max(0, this.freezeLevel - 10 * dt);
    }
    const frostMult = this.frostSlowed ? 0.3 : 1;
    this.vx = this.facing * this.patrolSpeed * (1 - this.freezeLevel/150) * frostMult;
      this.x += this.vx * dt;
      // Random jump
      if (Math.random() < 0.02 && !this.climbing) {
        this.vy = -400;
        this.climbing = true;
        this.climbTimer = 0.8;
      }
    }

    if (this.climbing) {
      this.climbTimer -= dt;
      if (this.climbTimer <= 0) this.climbing = false;
      // Move up walls
      this.vy = -100;
      // Move toward player if nearby
      if (player && Math.abs(player.x - this.x) < 150) {
        this.vx = player.x > this.x ? 80 : -80;
      }
    }

    this.x += this.vx * dt;
    if (this.x <= this.patrolLeft) { this.facing = 1; this.x = this.patrolLeft; }
    if (this.x + this.w >= this.patrolRight) { this.facing = -1; this.x = this.patrolRight - this.w; }

    this.y += this.vy * dt;

        if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; this.onGround = true; this.climbing = false; }
        else if (this.vy < 0 && !this.climbing) { this.y = p.y + p.h; this.vy = 0; }
        else if (this.vy < 0 && this.climbing) { /* pass through from below */ }
      }
    }
    if (this.y > SB.CONFIG.H) { this.y = SB.CONFIG.H; this.vy = 0; this.onGround = true; }

// --- YETI ---
SB.Yeti = class extends SB.Enemy {
  constructor(x, y) {
    super(x, y, 'yeti');
    this.patrolSpeed = 30 + Math.random() * 20;
    this.bombTimer = 0;
    this.bombCooldown = 2.5 + Math.random() * 2;
    this.bombs = [];
  }

  update(dt, platforms, player) {
    this.bombTimer -= dt;
    if (this.bombTimer <= 0) {
      this.bombCooldown -= dt;
      if (this.bombCooldown <= 0 && player) {
        // Throw fire bomb toward player
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.sqrt(dx*dx+dy*dy) || 1;
        this.bombs.push({
          x: this.x + this.w/2, y: this.y,
          vx: dx/dist * 250, vy: dy/dist * 250 - 100,
          r: 8, life: 3.0,
          exploded: false, explodeTimer: 0
        });
        this.bombTimer = 1.8;
        this.bombCooldown = 2.5 + Math.random() * 3;
      }
    }

    // Update bombs
    for (const b of this.bombs) {
      if (!b.exploded) {
        b.vy += SB.CONFIG.GRAVITY * dt;
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        // Check platform hit
        for (const p of platforms) {
          if (b.x + b.r > p.x && b.x - b.r < p.x + p.w &&
              b.y + b.r > p.y && b.y - b.r < p.y + p.h) {
            b.exploded = true;
            b.explodeTimer = 0.8;
            b.explodeX = b.x; b.explodeY = b.y;
            if (!this.groundFires) this.groundFires = [];
            for (let fi = 0; fi < 3; fi++) {
              this.groundFires.push({x: b.x-14+fi*14, y: b.y+6, life: 2.5, size: 8+fi*2});
            }
          }
        }
        if (b.y > SB.CONFIG.H) b.exploded = true;
        b.life -= dt;
      } else {
        b.explodeTimer -= dt;
      }
    }
    this.bombs = this.bombs.filter(b => b.life > 0 && b.explodeTimer > 0);
    if (!this.groundFires) this.groundFires = [];
    for (const gf of this.groundFires) gf.life -= dt;
    this.groundFires = this.groundFires.filter(gf => gf.life > 0);

    // Movement
    // Thaw — freeze decays over time if not fully frozen
    if (this.freezeLevel > 0 && this.freezeLevel < SB.CONFIG.MAX_FREEZE) {
      this.freezeLevel = Math.max(0, this.freezeLevel - 10 * dt);
    }
    const frostMult = this.frostSlowed ? 0.3 : 1;
    this.vx = this.facing * this.patrolSpeed * (1 - this.freezeLevel/150) * frostMult;
    this.x += this.vx * dt;
    if (this.x <= this.patrolLeft) { this.facing = 1; this.x = this.patrolLeft; }
    if (this.x + this.w >= this.patrolRight) { this.facing = -1; this.x = this.patrolRight - this.w; }
    this.vy += SB.CONFIG.GRAVITY * dt;
    this.y += this.vy * dt;
    this.onGround = false;
    for (const p of platforms) {
      if (SB.Physics.rectCollide(this, p)) {
        if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; this.onGround = true; }
        else if (this.vy < 0) { this.y = p.y + p.h; this.vy = 0; }
      }
    }
  }

  draw(ctx) {
    SB.Sprites.drawYeti(ctx, this.x, this.y, this.w, this.h, this.freezeLevel);
    for (const b of this.bombs) {
      if (!b.exploded) {
        SB.Sprites.drawFireBomb(ctx, b.x, b.y, b.r);
      } else {
        // Explosion
        const alpha = b.explodeTimer / 0.8;
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 25);
        ctx.globalAlpha = alpha;
        grad.addColorStop(0, '#ffff00');
        grad.addColorStop(0.4, '#ff8800');
        grad.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(b.x, b.y, 25, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    // Lingering ground fires
    if (this.groundFires) for (const gf of this.groundFires) {
      const alpha = gf.life/2.5;
      ctx.fillStyle = `rgba(255,100,0,${alpha*0.7})`;
      ctx.beginPath(); ctx.arc(gf.x, gf.y, gf.size, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,200,0,${alpha*0.5})`;
      ctx.beginPath(); ctx.arc(gf.x-1, gf.y-2, gf.size*0.5, 0, Math.PI*2); ctx.fill();
    }
  }
};

// --- BOSS BASE ---
SB.Boss = class {
  constructor(x, y, type, hp, maxHp) {
    this.x = x; this.y = y;
    this.w = 48; this.h = 48;
    this.vx = 0; this.vy = 0;
    this.onGround = false;
    this.noGravity = false;
    this.bounceX = false; this.bounceY = false;
    this.alive = true;
    this.type = type;
    this.hp = hp;
    this.maxHp = maxHp;
    this.facing = -1;
    this.attackTimer = 0;
    this.attackCooldown = 1.5;
    this.freezeLevel = 0;
    this.takeHazardDamage = () => {};
  }

  hit(amount) {
    this.hp -= amount;
    SB.Audio.sfxBossHit();
    SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 15, '#ffaa00', 120, 0.5, 4);
    if (this.hp <= 0) {
      this.alive = false;
      SB.Audio.sfxBossDefeat();
      SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 40, '#ffff00', 200, 1.0, 5);
    }
  }

  freeze(amount) {
    this.freezeLevel = Math.min(100, this.freezeLevel + amount);
    SB.Audio.sfxFreeze();
    if (this.freezeLevel >= 100) {
      this.freezeLevel = 0;
      this.hit(3); // Frozen solid does extra damage
    }
  }

  update(dt, platforms, player) {}
  draw(ctx) {}
};

// --- IRON MOLE ---
SB.IronMole = class extends SB.Boss {
  constructor(x, y) {
    super(x, y, 'iron_mole', 6, 6);
    this.w = 60; this.h = 84; // ~4x player, ~1/4 screen
    this.patrolSpeed = 50;
  }

  update(dt, platforms, player) {
    this.attackTimer -= dt;
    // Patrol bottom
    this.vx = this.facing * this.patrolSpeed;
    this.x += this.vx * dt;
    if (this.x <= 0) { this.facing = 1; this.x = 0; }
    if (this.x + this.w >= SB.CONFIG.W) { this.facing = -1; this.x = SB.CONFIG.W - this.w; }
    // Charge occasionally
    if (this.attackTimer <= 0 && player) {
      this.attackCooldown -= dt;
      if (this.attackCooldown <= 0) {
        this.vx = (player.x > this.x ? 1 : -1) * 250;
        this.attackTimer = 0.8;
        this.attackCooldown = 2.5;
      }
    }
    // Gravity
    this.vy += SB.CONFIG.GRAVITY * dt;
    this.y += this.vy * dt;
    for (const p of platforms) {
      if (SB.Physics.rectCollide(this, p)) {
        if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; this.onGround = true; }
      }
    }
  }

  draw(ctx) { SB.Sprites.drawIronMole(ctx, this.x, this.y, this.w, this.h, this.hp, this.maxHp); }
};

// --- MAGMA SLIME ---
SB.MagmaSlime = class extends SB.Boss {
  constructor(x, y) {
    super(x, y, 'magma_slime', 8, 8);
    this.w = 64; this.h = 80; // ~4x player, ~1/4 screen
    this.lavaDrips = [];
    this.dripTimer = 0;
  }

  update(dt, platforms, player) {
    this.dripTimer -= dt;
    if (this.dripTimer <= 0) {
      this.lavaDrips.push({ x: this.x + 10 + Math.random()*(this.w-20), y: this.y + this.h, vy: 60, life: 2.5 });
      this.dripTimer = 0.6 + Math.random() * 0.5;
    }
    for (const d of this.lavaDrips) {
      d.y += d.vy * dt;
      d.vy += 100 * dt;
      d.life -= dt;
    }
    this.lavaDrips = this.lavaDrips.filter(d => d.life > 0 && d.y < SB.CONFIG.H + 20);

    this.attackTimer -= dt;
    if (this.attackTimer <= 0 && player) {
      this.attackCooldown -= dt;
      if (this.attackCooldown <= 0) {
        // Jump toward player
        this.vy = -350;
        this.vx = (player.x > this.x ? 1 : -1) * 200;
        this.attackTimer = 1.2;
        this.attackCooldown = 3;
      }
    }

    // Slow horizontal drift toward player
    if (player && Math.abs(player.x - this.x) > 50) {
      this.vx += (player.x > this.x ? 30 : -30) * dt;
    }
    this.vx *= 0.95;

    this.x += this.vx * dt;
    this.x = SB.Utils.clamp(this.x, 0, SB.CONFIG.W - this.w);

    this.vy += SB.CONFIG.GRAVITY * dt;
    this.y += this.vy * dt;
    this.onGround = false;
    for (const p of platforms) {
      if (SB.Physics.rectCollide(this, p)) {
        if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; this.onGround = true; }
      }
    }
    if (this.y > SB.CONFIG.H) { this.y = SB.CONFIG.H; this.vy = 0; this.onGround = true; }
  }

  draw(ctx) {
    SB.Sprites.drawMagmaSlime(ctx, this.x, this.y, this.w, this.h, this.hp, this.maxHp);
    // Lava drips
    for (const d of this.lavaDrips) {
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.arc(d.x, d.y, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.arc(d.x, d.y-1, 2, 0, Math.PI*2); ctx.fill();
    }
  }
};

// --- THUNDER DJINN ---
SB.ThunderDjinn = class extends SB.Boss {
  constructor(x, y) {
    super(x, y, 'thunder_djinn', 10, 10);
    this.w = 46; this.h = 50;
    this.noGravity = true;
    this.baseY = y;
    this.lightningStrikes = [];
    this.lightningTimer = 0;
  }

  update(dt, platforms, player) {
    // Float back and forth across top
    this.x += this.vx * dt;
    this.y = this.baseY + Math.sin(Date.now()/1500) * 30;
    if (this.x <= 0) { this.vx = Math.abs(this.vx) || 80; }
    if (this.x + this.w >= SB.CONFIG.W) { this.vx = -Math.abs(this.vx) || -80; }
    this.vx += (Math.sin(Date.now()/1200) * 10) * dt;
    this.vx = SB.Utils.clamp(this.vx, -120, 120);

    // Lightning strikes
    this.lightningTimer -= dt;
    if (this.lightningTimer <= 0 && player) {
      const tx = player.x + SB.Utils.rand(-20, 20);
      this.lightningStrikes.push({
        x: tx, y: 0, targetY: player.y + player.h, life: 0.4, warnTimer: 0.3
      });
      this.lightningTimer = 1.2 + Math.random() * 1.5;
    }

    for (const s of this.lightningStrikes) {
      s.warnTimer -= dt;
      if (s.warnTimer <= 0) s.life -= dt;
    }
    this.lightningStrikes = this.lightningStrikes.filter(s => s.life > 0);
  }

  draw(ctx) {
    SB.Sprites.drawThunderDjinn(ctx, this.x, this.y, this.w, this.h, this.hp, this.maxHp);
    for (const s of this.lightningStrikes) {
      if (s.warnTimer > 0) {
        // Warning flash
        ctx.fillStyle = `rgba(255,255,0,${0.3+Math.sin(Date.now()/50)*0.3})`;
        ctx.fillRect(s.x - 8, 0, 16, SB.CONFIG.H);
      } else {
        SB.Sprites.drawLightning(ctx, s.x, 0, s.x, s.targetY);
      }
    }
  }
};

// --- CUCKOO CLOCK (Floor 40 Twin Boss) ---
SB.CuckooClock = class extends SB.Boss {
  constructor(x, y) {
    super(x, y, 'cuckoo_clock', 6, 6); // 12 total across twin clocks
    this.w = 48; this.h = 64; // medium, ~2.5x player
    this.noGravity = true;
    this.pendulumAngle = 0;
    this.pendulumSpeed = 2.5;
    this.pendulumLength = 50;
  }

  update(dt, platforms, player) {
    // Stationary — pendulum attack
    this.pendulumAngle += this.pendulumSpeed * dt;
    // Pendulum tip position (handled in draw for collision)

    this.attackTimer -= dt;
    if (this.attackTimer <= 0 && player) {
      this.attackCooldown -= dt;
      if (this.attackCooldown <= 0) {
        // Swing pendulum faster toward player
        this.pendulumSpeed = 5 + Math.random() * 2;
        this.attackTimer = 1.2;
        this.attackCooldown = 2;
      }
    } else {
      this.pendulumSpeed += (2.5 - this.pendulumSpeed) * 2 * dt;
    }
  }

  getPendulumTip() {
    const cx = this.x + this.w/2;
    const cy = this.y + this.h * 0.3;
    return {
      x: cx + Math.sin(this.pendulumAngle) * this.pendulumLength,
      y: cy + Math.cos(this.pendulumAngle) * this.pendulumLength,
    };
  }

  draw(ctx) {
    SB.Sprites.drawCuckooClock(ctx, this.x, this.y, this.w, this.h, this.hp, this.maxHp, this.pendulumAngle, this.pendulumLength);
  }
};

// --- FLOOR 50: PIG KING (pink + royal-blue, charges and rolls) ---
SB.PigKing = class extends SB.Boss {
  constructor(x, y) { super(x, y, 'pig_king', 14, 14); this.w = 62; this.h = 72; this.patrolSpeed = 55; this.rolling = false; }
  update(dt, platforms, player) {
    this.attackTimer -= dt;
    if (this.attackTimer <= 0) { this.attackCooldown -= dt; if (this.attackCooldown <= 0 && player) { this.rolling = true; this.vx = (player.x > this.x ? 1 : -1) * 300; this.attackTimer = 1.2; this.attackCooldown = 3; } }
    if (this.rolling) { this.vx *= 0.98; if (Math.abs(this.vx) < 10) this.rolling = false; }
    else { this.vx = this.facing * this.patrolSpeed; }
    this.x += this.vx * dt;
    if (this.x <= 0) { this.facing = 1; this.x = 0; } if (this.x + this.w >= SB.CONFIG.W) { this.facing = -1; this.x = SB.CONFIG.W - this.w; }
    this.vy += SB.CONFIG.GRAVITY * dt; this.y += this.vy * dt;
    for (const p of platforms) { if (SB.Physics.rectCollide(this, p) && this.vy > 0) { this.y = p.y - this.h; this.vy = 0; } }
  }
  draw(ctx) { SB.Sprites.drawPigKing(ctx, this.x, this.y, this.w, this.h, this.hp, this.maxHp); }
};

// --- FLOOR 60: ANGLER FISH (suction vortex + mouth weakness + dramatic death) ---
SB.AnglerFish = class extends SB.Boss {
  constructor(x, y) { super(x, y, 'angler_fish', 16, 16); this.w = 64; this.h = 56; this.noGravity = true;
    this.suctionActive = false; this.suctionTimer = 0; this.suctionCooldown = 4;
    this.suctionWarning = false; this.mouthOpen = false; this.mouthHitCount = 0;
    this.mouthHitFlash = 0; this.suctionForce = 350;
    this.suckedEnemies = []; this.spitProjectiles = [];
    // Death sequence
    this.dying = false; this.deathTimer = 0; this.deathPhase = 0; // 0=shock, 1=inflate, 2=explode
    this.inflateScale = 1; this.flashTimer = 0;
    this.eyesPopped = false;
  }
  update(dt, platforms, player) {
    this.mouthHitFlash = Math.max(0, this.mouthHitFlash - dt);
    // Death sequence
    if (this.dying) {
      this.deathTimer -= dt; this.flashTimer += dt;
      if (this.deathTimer <= 1.2 && this.deathPhase === 0) { this.deathPhase = 1; } // start inflating
      if (this.deathTimer <= 0.3 && this.deathPhase === 1) { this.deathPhase = 2; } // explode
      if (this.deathTimer <= 0 && this.deathPhase === 2) {
        this.alive = false; this.hp = 0;
        // Big explosion
        SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 50, '#ff88cc', 300, 1.5, 6);
        SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 40, '#ffd700', 250, 1.2, 4);
        SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 30, '#88ddff', 200, 1.0, 5);
        // Gold coin shower
        for (let i = 0; i < 20; i++) {
          setTimeout(() => {
            if (window._SB_sceneData) window._SB_sceneData.moneyCards.push(new SB.MoneyCard(SB.Utils.rand(50,SB.CONFIG.W-70), -20));
          }, i*50);
        }
        // Drop Heart
        if (window._SB_sceneData) window._SB_sceneData.hearts.push(new SB.Heart(this.x+this.w/2-12, this.y-20));
        SB.Audio.sfxBossDefeat();
        SB.Audio.sfxTriumph();
        // Trigger victory pose
        if (player) { player.victoryPose = true; player.victoryPoseTimer = 2.0; }
        return;
      }
      // Inflate during phase 1
      if (this.deathPhase === 1) this.inflateScale += dt * 1.5;
      return; // Don't do normal updates during death
    }
    // Suction cycle
    if (!this.suctionActive) {
      this.suctionCooldown -= dt;
      if (this.suctionCooldown <= 0) { this.suctionWarning = true; this.suctionTimer = 0.8; this.suctionActive = true; }
    } else {
      if (this.suctionWarning) { this.suctionTimer -= dt; if (this.suctionTimer <= 0) { this.suctionWarning = false; this.mouthOpen = true; this.suctionTimer = 3.0; } }
      else {
        this.suctionTimer -= dt;
        if (this.suctionTimer <= 0) { this.suctionActive = false; this.mouthOpen = false; this.mouthHitCount = 0; this.suctionCooldown = 4 + Math.random()*3; this.spitProjectiles = []; }
      }
    }
    // Vacuum pull on player
    if (this.mouthOpen && player && !player.balloonMode && !player.ultraStarMode) {
      const dx = (this.x + this.w/2) - player.x, dy = (this.y + this.h/2) - player.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const pull = this.suctionForce / (dist*0.3 + 30);
      player.x += dx/dist * pull * dt; player.y += dy/dist * pull * dt;
      // Player pulled into mouth = lose life
      if (SB.Physics.rectCollide(player, {x:this.x+this.w*0.2, y:this.y+this.h*0.25, w:this.w*0.6, h:this.h*0.5})) {
        player.takeDamage(); this.mouthOpen = false; this.suctionActive = false; this.mouthHitCount = 0; this.suctionCooldown = 5;
      }
    }
    // Suck in nearby enemies and spit as projectiles
    if (this.mouthOpen) {
      for (const e of (window._SB_enemies || [])) {
        if (!e || !e.alive || e === this) continue;
        const edx = (this.x+this.w/2)-e.x, edy = (this.y+this.h/2)-e.y;
        const edist = Math.sqrt(edx*edx+edy*edy)||1;
        if (edist < 200) { e.x += edx/edist * 180 * dt; e.y += edy/edist * 180 * dt; }
        if (edist < 25) { this.spitProjectiles.push({x:this.x+this.w/2, y:this.y, vx:SB.Utils.rand(-350,350), vy:-300, life:2.5}); e.alive = false; }
      }
    }
    // Update spit projectiles
    for (const sp of this.spitProjectiles) { sp.vy += 500*dt; sp.x += sp.vx*dt; sp.y += sp.vy*dt; sp.life -= dt; }
    this.spitProjectiles = this.spitProjectiles.filter(sp => sp.life > 0);
    // Drift toward player when not suctioning
    if (!this.mouthOpen && player) { this.x += ((player.x - this.x) * 0.3) * dt; }
    this.x = SB.Utils.clamp(this.x, 0, SB.CONFIG.W - this.w); this.y = 30 + Math.sin(Date.now()/1800)*15;
  }

// --- FLOOR 70: GORGON STATUE (mossy slate grey + emerald snake hair) ---
SB.GorgonStatue = class extends SB.Boss {
  constructor(x, y) { super(x, y, 'gorgon', 18, 18); this.w = 54; this.h = 70; this.noGravity = true;
    this.phase2 = false; this.eyesOpen = false; this.eyeTimer = 0; this.eyeOpenDuration = 2.5; this.eyeCooldown = 5;
    this.laserBeams = []; // {x, y, w, h, vy, life, horizontal}
    this.snakeSpawnTimer = 0; this.snakeSpawnCooldown = 6;
    this.shakeHead = false; this.shakeHeadTimer = 0;
    this.fallingBricks = []; // {x, y, w, h, vy, life}
    this.brickTimer = 0;
    this.position = 'center';
  }
  update(dt, platforms, player) {
    // Phase check
    if (this.hp <= 9 && !this.phase2) { this.phase2 = true; }
    // Eye laser cycle
    if (!this.eyesOpen) {
      this.eyeCooldown -= dt;
      if (this.eyeCooldown <= 0) { this.eyesOpen = true; this.eyeTimer = this.eyeOpenDuration;
        // Fire two laser beams
        const eyeY = this.y + this.h*0.42;
        const lw = SB.CONFIG.W, lh = 6;
        this.laserBeams.push({x:0, y:eyeY-2, w:lw, h:lh, vy:0, life:this.eyeOpenDuration, horizontal:true, top:true});
        this.laserBeams.push({x:0, y:eyeY+8, w:lw, h:lh, vy:0, life:this.eyeOpenDuration, horizontal:true, top:false});
        if (this.phase2) {
          // Vertical sweeping lasers in phase 2
          this.laserBeams.push({x:SB.CONFIG.W*0.3, y:0, w:lh, h:SB.CONFIG.H, vy:80, life:this.eyeOpenDuration, horizontal:false});
          this.laserBeams.push({x:SB.CONFIG.W*0.7, y:SB.CONFIG.H, w:lh, h:SB.CONFIG.H, vy:-80, life:this.eyeOpenDuration, horizontal:false});
        }
        this.shakeHead = true; this.shakeHeadTimer = 0.5;
      }
    } else {
      this.eyeTimer -= dt; this.shakeHeadTimer -= dt;
      if (this.shakeHeadTimer <= 0) this.shakeHead = false;
      if (this.eyeTimer <= 0) { this.eyesOpen = false; this.eyeCooldown = this.phase2 ? 3.5 : 5; this.laserBeams = []; }
    }
    // Update laser beams
    for (const lb of this.laserBeams) {
      lb.life -= dt;
      if (!lb.horizontal) { lb.x += lb.vy * dt; if (lb.x < 0 || lb.x > SB.CONFIG.W) lb.vy = -lb.vy; }
    }
    this.laserBeams = this.laserBeams.filter(lb => lb.life > 0);
    // Snake minion spawning
    this.snakeSpawnTimer -= dt;
    if (this.snakeSpawnTimer <= 0) { this.snakeSpawnCooldown -= dt; if (this.snakeSpawnCooldown <= 0 && this.eyesOpen) {
      this.shakeHead = true; this.shakeHeadTimer = 0.4;
      for (let i=0;i<3;i++) {
        if (window._SB_enemies) window._SB_enemies.push(new SB.SnakeMinion(this.x+this.w/2-12, this.y+20, player));
      }
      this.snakeSpawnTimer = 6 + Math.random()*3; this.snakeSpawnCooldown = this.phase2 ? 5 : 8;
    }}
    // Falling bricks (phase 2)
    if (this.phase2 && this.eyesOpen) {
      this.brickTimer -= dt;
      if (this.brickTimer <= 0) {
        this.fallingBricks.push({x:SB.Utils.rand(40, SB.CONFIG.W-60), y:-20, w:22, h:18, vy:SB.Utils.rand(180,350), life:5});
        this.brickTimer = 0.4 + Math.random()*0.6;
      }
    }
    for (const fb of this.fallingBricks) { fb.y += fb.vy*dt; fb.vy += 300*dt; fb.life -= dt; }
    this.fallingBricks = this.fallingBricks.filter(fb => fb.life > 0 && fb.y < SB.CONFIG.H+30);
    // Stay centered
    this.x = SB.CONFIG.W/2 - this.w/2;
  }
  draw(ctx) {
    SB.Sprites.drawGorgonStatue(ctx, this.x, this.y, this.w, this.h, this.hp, this.maxHp, this.eyesOpen, this.phase2, this.laserBeams, this.shakeHead);
    // Draw laser beams
    for (const lb of this.laserBeams) {
      const grad = ctx.createLinearGradient(lb.x, 0, lb.x+lb.w, 0);
      grad.addColorStop(0, 'rgba(200,200,200,0.1)'); grad.addColorStop(0.5, 'rgba(255,255,255,0.5)'); grad.addColorStop(1, 'rgba(200,200,200,0.1)');
      ctx.fillStyle = grad;
      if (lb.horizontal) ctx.fillRect(lb.x, lb.y, lb.w, lb.h);
      else ctx.fillRect(lb.x, lb.y, lb.w, lb.h);
    }
    // Draw falling bricks
    for (const fb of this.fallingBricks) {
      ctx.fillStyle = '#776655'; ctx.fillRect(fb.x, fb.y, fb.w, fb.h);
      ctx.strokeStyle = '#554433'; ctx.lineWidth = 1.5; ctx.strokeRect(fb.x, fb.y, fb.w, fb.h);
    }
  }
};

// --- SNAKE MINION (Floor 70, crawls along floors) ---
SB.SnakeMinion = class extends SB.Enemy {

    if (player) this.player = player;

    }
    if (!onPlat) this.y = SB.CONFIG.H - 40;
    this.x = SB.Utils.clamp(this.x, 0, SB.CONFIG.W - this.w);

// --- KING BLIZZARD (Floor 200 Boss) ---
SB.KingBlizzard = class extends SB.Boss {
  constructor(x, y) {
    super(x, y, 'king_blizzard', SB.CONFIG.KING_BLIZZARD_HP, SB.CONFIG.KING_BLIZZARD_HP);
    this.w = 220; this.h = 260; // ~1/3 of the screen — massive colossus
    this.noGravity = true;
    this.teleportTimer = 0;
    this.teleportCooldown = 0.8;
    this.blizzardActive = false;
    this.blizzardTimer = 0;
    this.blizzardCooldown = 5;
    this.blizzardWarning = 0;
    this.miniClones = [];
    this.cloneSpawnTimer = 0;
    this.cloneSpawnCooldown = 8;
    this.darkIceActive = false;
    this.phase = 1;
    this.ultraStarDropped = false;
    this.firstWaveSurvived = false;
    this.waveTimer = 15;
  }

  update(dt, platforms, player) {
    if (!this.alive) return;

    // Phase transition
    if (this.hp <= this.maxHp/2) this.phase = 2;

    // First wave tracking
    this.waveTimer -= dt;
    if (this.waveTimer <= 0) this.firstWaveSurvived = true;

    // Teleport toward player (hyper-velocity)
    this.teleportTimer -= dt;
    if (this.teleportTimer <= 0) {
      this.teleportCooldown -= dt;
      if (this.teleportCooldown <= 0 && player) {
        // Teleport near player
        const tx = player.x + SB.Utils.rand(-60, 60);
        const ty = player.y + SB.Utils.rand(-80, 20);
        this.x = SB.Utils.clamp(tx, -this.w/3, SB.CONFIG.W - this.w/1.5);
        this.y = SB.Utils.clamp(ty, -this.h/4, SB.CONFIG.H - this.h);
        this.teleportTimer = 0.8 + (this.phase === 2 ? 0 : 0.3);
        this.teleportCooldown = this.phase === 2 ? 0.5 : 0.8;
        SB.spawnParticles(this.x+this.w/2, this.y+this.h/2, 10, '#5588cc', 80, 0.3, 3);
      }
    }

    // Blizzard attack
    if (!this.blizzardActive) {
      this.blizzardCooldown -= dt;
      if (this.blizzardCooldown <= 0) {
        this.blizzardWarning = SB.CONFIG.BLIZZARD_WARNING_TIME;
        this.blizzardActive = true;
        this.blizzardTimer = 1.5;
      }
    } else {
      if (this.blizzardWarning > 0) {
        this.blizzardWarning -= dt;
      } else {
        this.blizzardTimer -= dt;
        if (this.blizzardTimer <= 0) {
          this.blizzardActive = false;
          this.blizzardCooldown = this.phase === 2 ? 3 : 5;
        }
      }
    }

    // Spawn mini-boss clones
    this.cloneSpawnTimer -= dt;
    if (this.cloneSpawnTimer <= 0) {
      this.cloneSpawnCooldown -= dt;
      if (this.cloneSpawnCooldown <= 0) {
        const cloneCount = this.phase === 2 ? 3 : 2;
        for (let i = 0; i < cloneCount; i++) {
          this.miniClones.push({
            x: SB.Utils.rand(40, SB.CONFIG.W - 60),
            y: SB.Utils.rand(40, SB.CONFIG.H - 200),
            w: SB.CONFIG.PLAYER_W, h: SB.CONFIG.PLAYER_H,
            vx: SB.Utils.rand(-120, 120),
            vy: SB.Utils.rand(-80, 80),
            life: 12 + (this.phase === 2 ? 6 : 0),
            attackTimer: 0,
          });
        }
        this.cloneSpawnTimer = 8 + Math.random() * 4;
        this.cloneSpawnCooldown = this.phase === 2 ? 5 : 8;
      }
    }

    // Update mini clones
    for (const c of this.miniClones) {
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      if (c.x <= 0 || c.x + c.w >= SB.CONFIG.W) c.vx = -c.vx;
      if (c.y <= 20 || c.y + c.h >= SB.CONFIG.H - 40) c.vy = -c.vy;
      c.attackTimer -= dt;
      if (c.attackTimer <= 0 && player) {
        // Clone fires projectile toward player (handled in scene)
        c.attackTimer = 1.5 + Math.random();
      }
    }
    this.miniClones = this.miniClones.filter(c => c.life > 0);

    // Dark ice aura (slows player) - always active
    this.darkIceActive = true;

    // Movement
    if (player && !this.blizzardActive) {
      const dx = player.x - this.x;
      const dy = player.y - this.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const speed = SB.CONFIG.KING_BLIZZARD_SPEED * (this.phase === 2 ? 1.3 : 1);
      this.vx += (dx/dist * speed - this.vx) * 3 * dt;
      this.vy += (dy/dist * speed*0.6 - this.vy) * 3 * dt;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
    }
    this.x = SB.Utils.clamp(this.x, -this.w/3, SB.CONFIG.W - this.w/1.5);
    this.y = SB.Utils.clamp(this.y, -this.h/4, SB.CONFIG.H - this.h);
  }

  draw(ctx) { SB.Sprites.drawKingBlizzard(ctx, this.x, this.y, this.w, this.h, this.hp, this.maxHp); }
};

// --- ULTRA-STAR ---
SB.UltraStar = class {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 28; this.h = 28;
    this.vy = -40;
    this.alive = true;
    this.life = 15;
    this.glowPhase = 0;
  }

  update(dt, platforms) {
    this.life -= dt;
    if (this.life <= 0) { this.alive = false; return; }
    this.glowPhase += dt * 3;
    this.vy += SB.CONFIG.GRAVITY * 0.4 * dt;
    this.y += this.vy * dt;
    for (const p of platforms) {
      if (SB.Physics.rectCollide(this, p)) {
        if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; }
      }
    }
    if (this.life < 5 && Math.floor(Date.now()/200)%2) this.alive = true;
  }

  draw(ctx) { SB.Sprites.drawUltraStar(ctx, this.x, this.y, this.w, this.h); }
};

// --- TRAINED MONSTER ---
SB.TrainedMonster = class {
  constructor(x, y, bossType) {
    this.x = x; this.y = y;
    this.w = 42; this.h = 42;
    this.vx = 0; this.vy = 0;
    this.alive = true;
    this.noGravity = true;
    this.bossType = bossType;
    this.duration = SB.CONFIG.TRAINED_MONSTER_DURATION;
    this.onGround = false;
    this.takeHazardDamage = () => {};
  }

  update(dt, platforms, player, enemies, bosses) {
    this.duration -= dt;
    if (this.duration <= 0) { this.alive = false; return; }
    if (player) {
      const dx = player.x - this.x;
      this.vx = dx * 1.5;
      this.x += this.vx * dt;
      this.y = player.y - 60;
    }
    this.x = SB.Utils.clamp(this.x, 0, SB.CONFIG.W - this.w);
    this.y = SB.Utils.clamp(this.y, 20, SB.CONFIG.H - this.h - 50);
    for (const e of enemies) {
      if (!e.alive) continue;
      if (SB.Physics.rectCollide(this, e)) {
        e.alive = false;
        SB.spawnParticles(e.x+e.w/2, e.y+e.h/2, 8, '#ffd700', 60, 0.3, 2);
      }
    }
    for (const b of (bosses || [])) {
      if (b && b.alive && SB.Physics.rectCollide(this, b)) {
        b.hit(1);
        this.x += (this.x > b.x ? 40 : -40);
      }
    }
  }

  draw(ctx) { SB.Sprites.drawTrainedMonster(ctx, this.x, this.y, this.w, this.h, this.bossType); }
};

// --- PUMPKIN GHOST ---
SB.PumpkinGhost = class {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 34; this.h = 34;
    this.vx = 0; this.vy = 0;
    this.alive = true;
    this.noGravity = true;
    this.bounceX = false; this.bounceY = false;
    this.onGround = false;
    this.speed = 140;
    this.takeHazardDamage = () => {};
    this.teleportCooldown = 0;
  }

  update(dt, platforms, player) {
    if (!player) return;
    this.teleportCooldown = Math.max(0, this.teleportCooldown - dt);
    const dx = player.x - this.x;
    const dy = player.y - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    this.vx = (dx/dist) * this.speed;
    this.vy = (dy/dist) * this.speed;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.x = SB.Utils.clamp(this.x, 0, SB.CONFIG.W - this.w);
    this.y = SB.Utils.clamp(this.y, 0, SB.CONFIG.H - this.h);
  }

  hit() {
    // Teleport to random location far from player
    this.x = SB.Utils.rand(50, SB.CONFIG.W - this.w - 50);
    this.y = SB.Utils.rand(60, SB.CONFIG.H - this.h - 80);
    this.speed = Math.min(200, this.speed + 15); // gets faster each time
    SB.Audio.sfxFreeze();
    SB.spawnParticles(this.x + this.w/2, this.y + this.h/2, 12, '#ff8800', 80, 0.4, 3);
  }

  draw(ctx) { SB.Sprites.drawPumpkinGhost(ctx, this.x, this.y, this.w, this.h); }
};

// Procedural level generator for floors without explicit data
SB.generateLevel = function(floorNum) {
  // Boss floors every 10 — specific boss per floor
  if (floorNum % 10 === 0 && floorNum > 40 && floorNum < 200) {
    const bossMap = {
      50:'pig_king', 60:'angler_fish', 70:'gorgon', 80:'origami_dragon',
      90:'pharaoh', 100:'mech_spider', 110:'jester', 120:'black_hole',
      130:'nebula_phoenix', 140:'gemini', 150:'time_weaver', 160:'doppelganger',
      170:'cauldron', 180:'necromancer_dragon', 190:'castle_wall'
    };
    const bType = bossMap[floorNum] || 'iron_mole';
    // Twin encounters on specific floors
    const twinFloors = [110, 140, 170, 190];
    const isTwin = twinFloors.includes(floorNum);
    return {
      name: `FLOOR ${floorNum} — ${isTwin ? 'TWIN ' : ''}BOSS`, boss: true, bossType: bType,
      platforms: SB._genPlatforms(6 + (isTwin ? 1 : 0), floorNum),
      enemies: [],
      timeLimit: 90 + Math.floor(floorNum/10)*5,
      playerStart: { x:380, y:500 },
      bgGrad: [`#${Math.floor(5+floorNum/40).toString(16)}0a0a`, `#${Math.floor(8+floorNum/40).toString(16)}1a1a`],
      twins: isTwin,
    };
  }
  // Normal floors — enemy pools change as you climb
  const platforms = SB._genPlatforms(5 + Math.floor(floorNum/20), floorNum);
  const platYs = [];
  for (const p of platforms) { if (!platYs.includes(p.y)) platYs.push(p.y); }
  // Enemy pool evolves with floor progress
  const getEnemyPool = (fn) => {
    if (fn <= 10) return ['goblin'];
    if (fn <= 20) return ['goblin','ninja'];
    if (fn <= 30) return ['goblin','ninja','monster'];
    if (fn <= 40) return ['goblin','ninja','monster','monkey'];
    if (fn <= 60) return ['ninja','monster','monkey','yeti'];
    if (fn <= 90) return ['monster','monkey','yeti','jellyfish'];
    return ['monkey','yeti','jellyfish','snake'];
  };
  const pool = getEnemyPool(floorNum);
  const enemyCount = 3 + Math.floor(floorNum / 15);
  const enemies = [];
  for (let i = 0; i < Math.min(enemyCount, 8); i++) {
    const etype = pool[Math.floor(Math.random() * pool.length)];
    const platY = (platYs[Math.floor(Math.random() * platYs.length)] || 568) - 28;
    enemies.push({ type: etype, x: SB.Utils.rand(100, 700), y: SB.Utils.clamp(platY, 100, 500) });
  }
  const theme = SB.getTheme(floorNum);
  return {
    name: `FLOOR ${floorNum}`,
    boss: false,
    platforms,
    enemies,
    timeLimit: 60 + Math.floor(floorNum/5),
    playerStart: { x:380, y:500 },
    bgGrad: theme ? theme.bgGrad : ['#020818', '#0a1030'],
  };
};

SB._genPlatforms = function(count, floorNum) {
  const platforms = [{ x:0, y:568, w:800, h:32, type:'solid' }];
  // Pick a layout style based on floor number — 6 different patterns
  const style = (floorNum % 6);
  const heights = [520, 470, 420, 370, 320, 270, 220, 180];

  if (style === 0) {
    // STAIRCASE — alternating left/right steps up
    let y = 520;
    for (let i = 0; i < count && y > 160; i++) {
      const side = i % 2;
      const pw = SB.Utils.rand(130, 200);
      const px = side === 0 ? SB.Utils.rand(10, 60) : SB.Utils.rand(SB.CONFIG.W - pw - 60, SB.CONFIG.W - pw - 10);
      platforms.push({ x:px, y, w:pw, h:14, type:'solid' });
      y -= SB.Utils.rand(60, 82);
    }
  } else if (style === 1) {
    // PYRAMID — wide at bottom, narrow at top, centered
    const widths = [700, 560, 420, 300, 200, 140];
    for (let i = 0; i < Math.min(count, widths.length); i++) {
      const y = 520 - i * 70;
      const w = widths[i];
      platforms.push({ x:SB.CONFIG.W/2 - w/2, y, w, h:14, type:'solid' });
    }
  } else if (style === 2) {
    // SPLIT — two columns of platforms, left and right
    for (let i = 0; i < count; i++) {
      const y = 510 - i * 72;
      if (y < 160) break;
      const side = i % 2;
      const pw = SB.Utils.rand(100, 170);
      const px = side === 0 ? SB.Utils.rand(10, 60) : SB.Utils.rand(SB.CONFIG.W - pw - 60, SB.CONFIG.W - pw - 10);
      platforms.push({ x:px, y, w:pw, h:14, type:'solid' });
    }
  } else if (style === 3) {
    // SCATTER — random positions, criss-cross pattern
    const used = new Set();
    for (let i = 0; i < count; i++) {
      const y = heights[Math.floor(Math.random() * heights.length)];
      if (used.has(y)) continue; used.add(y);
      const pw = SB.Utils.rand(110, 220);
      const px = SB.Utils.rand(20, SB.CONFIG.W - pw - 20);
      platforms.push({ x:px, y, w:pw, h:14, type:'solid' });
    }
    platforms.sort((a, b) => b.y - a.y); // bottom to top
  } else if (style === 4) {
    // BRIDGES — long horizontal spans with gaps
    for (let i = 0; i < count; i++) {
      const y = 500 - i * 75;
      if (y < 150) break;
      const gap = SB.Utils.rand(80, 180);
      const leftW = SB.Utils.rand(180, 300);
      const rightW = SB.CONFIG.W - leftW - gap;
      platforms.push({ x:0, y, w:leftW, h:14, type:'solid' });
      platforms.push({ x:leftW + gap, y, w:Math.max(60, rightW), h:14, type:'solid' });
    }
  } else {
    // ARENA — ring of platforms around edges
    const ring = [
      { x:10, y:500, w:160, h:14 }, { x:630, y:500, w:160, h:14 },
      { x:10, y:420, w:130, h:14 }, { x:660, y:420, w:130, h:14 },
      { x:10, y:340, w:180, h:14 }, { x:610, y:340, w:180, h:14 },
      { x:100, y:260, w:200, h:14 }, { x:500, y:260, w:200, h:14 },
      { x:250, y:190, w:300, h:14 },
    ];
    for (let i = 0; i < Math.min(count + 2, ring.length); i++) {
      platforms.push(ring[i]);
    }
  }
  // Special platform types based on floor range
  const specialMap = {
    11:'conveyor', 15:'trampoline', 21:'steam', 31:'crumble', 41:'spiked',
    51:'phase', 61:'sticky', 71:'ice', 81:'magnetic', 91:'seesaw',
    101:'portal', 111:'zerog', 121:'antigrav', 131:'forcefield', 141:'accordion',
    151:'laser', 161:'mimic', 171:'acid', 181:'shadow', 191:'crystal'
  };
  // Apply special type to 1-2 platforms when available
  for (const [fn, spec] of Object.entries(specialMap)) {
    if (floorNum >= parseInt(fn)) {
      const candidates = platforms.filter(p => p !== platforms[0] && !p.special);
      if (candidates.length > 0 && Math.random() < 0.5) {
        const pick = candidates[Math.floor(Math.random() * candidates.length)];
        pick.special = spec;
        if (spec === 'crumble') pick._crumbleLife = 2.0;
        if (spec === 'phase') pick._phaseTimer = 3.0;
        if (spec === 'accordion') pick._accordionState = 0;
        if (spec === 'crystal') pick._crystalIntact = true;
      }
    }
  }
  return platforms;
};

// Map floor number to level data (hand-designed or procedural)
SB.getLevelData = function(floorNum) {
  // Check hand-designed levels first
  for (const lvl of SB.LevelData) {
    const match = lvl.name.match(/FLOOR (\d+)/);
    if (match && parseInt(match[1]) === floorNum) return lvl;
  }
  // Procedural generation for unlisted floors
  return SB.generateLevel(floorNum);
};

// Boss size multiplier by floor range (steady progression toward King Blizzard)
SB._getBossScale = function(floorNum) {
  if (floorNum <= 50) return 1.0;    // ~55×70 (~2.5x player)
  if (floorNum <= 80) return 1.3;    // ~72×91
  if (floorNum <= 120) return 1.6;   // ~88×112
  if (floorNum <= 160) return 2.0;   // ~110×140
  return 2.5;                         // ~138×175 (approaching colossus)
};

// ============================================================
// SCENE MANAGER
// ============================================================
SB.Scenes = {
  _current: null,
  _data: {},
  _transitionTimer: 0,
  _transitionTarget: null,
  _pendingMode: '1P', // default to 1P

  switchTo(name) {
    this._current = name;
    this._data = {};
    this._transitionTimer = 0;
    this._transitionTarget = null;
    if (name === 'Playing') this._initPlaying();
  },

  _initPlaying() {
    const d = this._data;
    if (!d.levelIndex) d.levelIndex = 0;
    // floorNum is 1-based actual floor number
    if (!d.floorNum) d.floorNum = 1;
    const lvl = SB.getLevelData(d.floorNum);
    if (!lvl) { this.switchTo('Victory'); return; }

    // Platforms
    d.platforms = lvl.platforms.map(p => ({...p}));

    // Players — carry lives from previous level
    const isTwoPlayer = (this._pendingMode === '2P');
    const carryLives = d._carryLives || [];
    d.player = new SB.Player('p1');
    d.player.x = lvl.playerStart.x; d.player.y = lvl.playerStart.y;
    if (carryLives[0]) d.player.lives = carryLives[0];
    d.player2 = null;
    if (isTwoPlayer) {
      d.player2 = new SB.Player('p2');
      d.player2.x = lvl.playerStart.x + 50; d.player2.y = lvl.playerStart.y;
      if (carryLives[1]) d.player2.lives = carryLives[1];
    }
    d._carryLives = null;

    // Enemies
    d.enemies = [];
    for (const ed of lvl.enemies) {
      const cls = { goblin:SB.Goblin, ninja:SB.Ninja, monster:SB.Monster, monkey:SB.Monkey, yeti:SB.Yeti, jellyfish:SB.Jellyfish, snake:SB.SnakeMinion }[ed.type];
      if (cls) {
        const e = new cls(ed.x, ed.y);
        e.patrolLeft = Math.max(0, ed.x - 80);
        e.patrolRight = Math.min(SB.CONFIG.W, ed.x + 80);
        d.enemies.push(e);
      }
    }

    // Boss
    d.boss = null;
    d.boss2 = null; // for twin encounters
    d.bossesTwin = false;
    if (lvl.boss) {
      const bx = SB.CONFIG.W/2 - 24;
      const floorNum = d.floorNum;
      if (lvl.bossType === 'iron_mole') d.boss = new SB.IronMole(bx, 430);
      else if (lvl.bossType === 'magma_slime') d.boss = new SB.MagmaSlime(bx, 410);
      else if (lvl.bossType === 'thunder_djinn') {
        // Twin encounter on Floor 30
        d.boss = new SB.ThunderDjinn(bx - 90, 40);
        d.boss.w = 38; d.boss.h = 44;
        d.boss2 = new SB.ThunderDjinn(bx + 90, 80);
        d.boss2.w = 38; d.boss2.h = 44;
        d.bossesTwin = true;
      }
      else if (lvl.bossType === 'cuckoo_clock') {
        // Twin encounter on Floor 40
        d.boss = new SB.CuckooClock(bx - 100, 80);
        d.boss2 = new SB.CuckooClock(bx + 100, 120);
        d.bossesTwin = true;
      }
      else if (lvl.bossType === 'king_blizzard') d.boss = new SB.KingBlizzard(60, 40);
      else if (lvl.bossType) {
        // Procedural boss — scale by floor range
        const scale = SB._getBossScale(floorNum);
        const bw = Math.floor(55 * scale), bh = Math.floor(70 * scale);
        const createBoss = (t, bx, by) => {
          let b = null;
          if (t === 'iron_mole') b = new SB.IronMole(bx, by);
          else if (t === 'magma_slime') b = new SB.MagmaSlime(bx, by);
          else if (t === 'thunder_djinn') b = new SB.ThunderDjinn(bx, by);
          else if (t === 'cuckoo_clock') b = new SB.CuckooClock(bx, by);
          else if (t === 'pig_king') b = new SB.PigKing(bx, by);
          else if (t === 'angler_fish') b = new SB.AnglerFish(bx, by);
          else if (t === 'gorgon') b = new SB.GorgonStatue(bx, by);
          else if (t === 'origami_dragon') b = new SB.OrigamiDragon(bx, by);
          else if (t === 'pharaoh') b = new SB.Pharaoh(bx, by);
          else if (t === 'mech_spider') b = new SB.MechSpider(bx, by);
          else if (t === 'jester') b = new SB.Jester(bx, by);
          else if (t === 'black_hole') b = new SB.BlackHole(bx, by);
          else if (t === 'nebula_phoenix') b = new SB.NebulaPhoenix(bx, by);
          else if (t === 'gemini') b = new SB.GeminiWarrior(bx, by, true); // gold
          else if (t === 'time_weaver') b = new SB.TimeWeaver(bx, by);
          else if (t === 'doppelganger') b = new SB.Doppelganger(bx, by);
          else if (t === 'cauldron') b = new SB.Cauldron(bx, by);
          else if (t === 'necromancer_dragon') b = new SB.NecromancerDragon(bx, by);
          else if (t === 'castle_wall') b = new SB.CastleWall(bx, by);
          if (b) { b.w = bw; b.h = bh; }
          return b;
        };
        d.boss = createBoss(lvl.bossType, bx, 430);
        if (lvl.twins) {
          if (lvl.bossType === 'gemini') {
            d.boss2 = new SB.GeminiWarrior(bx + 180, 400, false); // silver twin
            d.boss2.w = bw; d.boss2.h = bh;
          } else {
            d.boss2 = createBoss(lvl.bossType, bx + 180, 400);
          }
          d.bossesTwin = true;
        }
      }
    }

    // Other
    d.snowballs = [];
    d.giantSnowballs = [];
    d.potions = [];
    d.moneyCards = [];
    d.hearts = [];
    d.pumpkinGhost = null;
    d.ultraStar = null;
    d.trainedMonster = null;
    d.timer = lvl.timeLimit;
    d.score = d.score || 0;
    d.allClearBonus = 0;
    d.name = lvl.name;
    d.bgGrad = lvl.bgGrad;
    d.stageClear = false;
    d.stageClearTimer = 0;
    d.allEnemiesDefeated = false;
    d.showingTrainPrompt = false;
    d.trainResult = null; // 'success' | 'fail' | null
    d.trainResultTimer = 0;
    // Screen effects
    d.screenShake = 0;
    d.violetFlash = 0;

    // Lava (Floor 200)
    d.hasLava = lvl.hasLava || false;
    d.lavaLevel = d.hasLava ? SB.CONFIG.H + 50 : 0;
    d.lavaMaxLevel = 0; // Top of screen = fully engulfed

    // Apply code reward if pending
    if (this._pendingReward) {
      if (this._pendingReward === 'lightning') d.potions.push(new SB.Potion(SB.CONFIG.W/2-9, 100, 'lightning'));
      else if (this._pendingReward === 'ultra_star') d.ultraStar = new SB.UltraStar(SB.CONFIG.W/2-14, 100);
      this._pendingReward = null;
    }

    // Boss intro
    if (lvl.boss) {
      d.showingBossIntro = true;
      // King Blizzard gets the full speech treatment
      if (lvl.bossType === 'king_blizzard' && !d._kbSpeechShown) {
        d._kbSpeech = KB_SPEECH;
        d._kbSpeechIndex = 0;
        d._kbSpeechTimer = 0;
        d.bossIntroTimer = 40; // long intro for speech
