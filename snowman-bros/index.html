<!DOCTYPE html>

<title>Snowman Bros</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  background:#0a0a1a;
  overflow:hidden;
  touch-action:manipulation;
  -webkit-overflow-scrolling:none;
  overscroll-behavior:none;
  position:fixed;
  top:0; left:0; right:0; bottom:0;
}
body {
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Courier New',monospace;
}
canvas {
  display:block;
  max-width:100vw;
  max-height:100vh;
  width:auto;
  height:auto;
  border:3px solid #4488cc;
  border-radius:4px;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  box-shadow:0 0 40px rgba(68,136,204,0.3);
  touch-action:manipulation;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";

// ============================================================
// NAMESPACE
// ============================================================
const SB = {};
window.SnowmanBros = SB;

// ============================================================
// CONFIG
// ============================================================
SB.CONFIG = {
  W: 800, H: 600,
  TILE: 32,
  GRAVITY: 1400,
  PLAYER_SPEED: 220,
  PLAYER_JUMP: -520,
  SNOWBALL_SPEED: 380,
  SNOWBALL_LIFETIME: 1.2,
  MAX_FREEZE: 100,
  FREEZE_PER_HIT: 34,
  PUMPKIN_TIME: 90,
  POTION_DROP_CHANCE: 0.25,
  MAX_LIVES: 3,
  INVINCIBLE_TIME: 12,
  MONEY_VALUE: 500,
  GIANT_SNOWBALL_SPEED: 280,
  GIANT_FRICTION: 0.985,
  PLAYER_W: 28, PLAYER_H: 42,
  SNOW_W: 12, SNOW_H: 12,
  // Ultra-Star (Floor 200)
  ULTRA_STAR_DURATION: 60,
  ULTRA_STAR_SPEED_MULT: 2.0,
  ULTRA_STAR_POWER_MULT: 5,
  // King Blizzard
  KING_BLIZZARD_HP: 100,
  KING_BLIZZARD_SPEED: 600,
  BLIZZARD_WARNING_TIME: 1.0,
  DARK_ICE_SLOW: 0.7,
  DARK_ICE_RANGE_REDUCE: 0.6,
  LAVA_RISE_TIME: 1200, // 20 minutes in seconds
  // Trained Monster
  TRAIN_SUCCESS_CHANCE: 0.00001, // 0.001%
  TRAINED_MONSTER_DURATION: 30,
};

// ============================================================
// THEME SYSTEM — changes every 10 floors
// ============================================================
SB.THEMES = [

    bgParticle: '#aaccff',
    atmosphere: 'ice',
  },
  { // Floors 11-20: Emerald Depths
    name: 'Emerald Depths',
    bgGrad: ['#010a05', '#041a10'],
    platformFill: '#0a3318',
    platformBorder: '#ffdd00', // bright yellow border
    platformHighlight: '#22ff66',
    bgParticle: '#88ffaa',
    atmosphere: 'forest',
  },
  { // Floors 21-30: Terracotta Tombs
    name: 'Terracotta Tombs',
    bgGrad: ['#0d0503', '#1a0c06'],
    platformFill: '#331a0a',
    platformBorder: '#44ff88', // emerald green border
    platformHighlight: '#ff8833',
    bgParticle: '#ffaa66',
    atmosphere: 'sand',
  },
  { // Floors 31-40: Amethyst Caverns
    name: 'Amethyst Caverns',
    bgGrad: ['#060210', '#120830'],
    platformFill: '#1a1040',
    platformBorder: '#ff44cc', // magenta border
    platformHighlight: '#9955ff',
    bgParticle: '#cc88ff',
    atmosphere: 'crystal',
  },
  { // Floors 41-50: Obsidian Forge
    name: 'Obsidian Forge',
    bgGrad: ['#020202', '#0a0808'],
    platformFill: '#1a0a0a',
    platformBorder: '#ff6600', // orange border
    platformHighlight: '#ff4422',
    bgParticle: '#ff6644',

  },
  { // Floors 51-60: Abyssal Trench
    name: 'Abyssal Trench',
    bgGrad: ['#000510', '#020a20'],
    platformFill: '#0a1a2a',
    platformBorder: '#00ffcc', // teal border
    platformHighlight: '#44ddff',
    bgParticle: '#88eeff',
    atmosphere: 'bubble',
  },
  { // Floors 61-70: Crimson Wastes
    name: 'Crimson Wastes',
    bgGrad: ['#0a0105', '#15020a'],
    platformFill: '#2a0a15',
    platformBorder: '#ffcc00', // gold border
    platformHighlight: '#ff4466',
    bgParticle: '#ff8899',
    atmosphere: 'ash',
  },
  { // Floors 71-80: Storm Peaks
    name: 'Storm Peaks',
    bgGrad: ['#050510', '#0f0f20'],
    platformFill: '#1a1a35',
    platformBorder: '#ff00ff', // magenta border
    platformHighlight: '#6666ff',
    bgParticle: '#aaaaff',
    atmosphere: 'lightning',
  },
  { // Floors 81-90: Verdant Wilds
    name: 'Verdant Wilds',
    bgGrad: ['#010801', '#031205'],
    platformFill: '#0a200a',
    platformBorder: '#ff8800', // orange border
    platformHighlight: '#33dd33',
    bgParticle: '#77dd77',
    atmosphere: 'pollen',
  },
  { // Floors 91-100: Chromatic Spire
    name: 'Chromatic Spire',
    bgGrad: ['#040208', '#0c0618'],
    platformFill: '#181028',
    platformBorder: '#00ffff', // cyan border
    platformHighlight: '#aa44ff',
    bgParticle: '#ddaaff',
    atmosphere: 'prism',
  },
];

// Get theme for a given floor number (1-indexed)
SB.getTheme = function(floorNum) {
  // Floor 200 gets special King Blizzard theme
  if (floorNum >= 200) return null; // handled specially
  const idx = Math.floor((floorNum - 1) / 10) % SB.THEMES.length;
  return SB.THEMES[idx];
};

// ============================================================
// UTILS
// ============================================================
SB.Utils = {
  rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  },
  dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx*dx + dy*dy);
  },
  clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); },
  rand(min, max) { return min + Math.random() * (max - min); },
  randInt(min, max) { return Math.floor(min + Math.random() * (max - min + 1)); },
  lerp(a, b, t) { return a + (b - a) * t; },
  pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; },
};

// ============================================================
// INPUT
// ============================================================
SB.Input = {
  _keys: {},
  _justPressed: {},
  _prevKeys: {},
  init() {
    window.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyZ','KeyX','Enter','Escape','ShiftLeft','ShiftRight',
           'KeyW','KeyA','KeyS','KeyD','KeyQ','KeyE','Digit1','Digit2','KeyC','Backspace','Digit0','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9'].includes(e.code)) {
        e.preventDefault();
        SB.Input._keys[e.code] = true;
      }
    });
    window.addEventListener('keyup', e => {
      SB.Input._keys[e.code] = false;
    });
  },
  update() {
    for (const k in this._keys) {
      this._justPressed[k] = this._keys[k] && !this._prevKeys[k];
    }
    Object.assign(this._prevKeys, this._keys);
    for (const k in this._prevKeys) {
      if (!this._keys[k]) delete this._prevKeys[k];
    }
  },
  down(code) { return !!this._keys[code]; },
  pressed(code) { return !!this._justPressed[code]; },
};

// ============================================================
// TOUCH BUTTONS — on-screen controls
// ============================================================
SB.TouchButtons = {
  _canvas: null,
  _startPressCount: 0,
  _startPressTimer: 0,
  _pressed: {},
  _dragging: null,
  _dragStartPos: null,
  _dragStartBtn: null,
  _offsets: {}, // stores custom positions per button id

  init(canvas) {
    this._canvas = canvas;
    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = SB.CONFIG.W / rect.width;
      const scaleY = SB.CONFIG.H / rect.height;
      if (e.touches && e.touches.length > 0) {
        return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
      }
      return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
    };
    const findBtn = (pos) => {
      for (const b of this._getButtons()) {
        if (pos.x >= b.x && pos.x <= b.x + b.w && pos.y >= b.y && pos.y <= b.y + b.h) return b;
      }
      return null;
    };
    const onDown = (e) => {
      e.preventDefault();
      const pos = getPos(e);
      const btn = findBtn(pos);
      if (btn) {
        this._pressed[btn.id] = true;
        this._dragStartPos = { x: pos.x, y: pos.y };
        this._dragStartBtn = btn;
        this._dragStartOffset = { x: btn.x, y: btn.y };
        this._dragging = null; // not dragging yet — wait for movement
        this._handlePress(btn.id);
      }
    };
    const onMove = (e) => {
      if (!this._dragStartBtn) return;
      e.preventDefault();
      const pos = getPos(e);
      if (e.touches && e.touches.length > 1) return; // ignore multi-touch
      const dx = pos.x - this._dragStartPos.x;
      const dy = pos.y - this._dragStartPos.y;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        this._dragging = this._dragStartBtn.id;
        this._pressed[this._dragStartBtn.id] = false; // release button while dragging
        const newX = SB.Utils.clamp(this._dragStartOffset.x + dx, 2, SB.CONFIG.W - this._dragStartBtn.w - 2);
        const newY = SB.Utils.clamp(this._dragStartOffset.y + dy, SB.CONFIG.H - 180, SB.CONFIG.H - this._dragStartBtn.h - 2);
        this._offsets[this._dragStartBtn.id] = { x: newX, y: newY };
      }
    };
    const onUp = (e) => {
      if (this._dragging) {
        this._dragging = null;
      } else if (this._dragStartBtn) {
        this._pressed[this._dragStartBtn.id] = false;
      }
      this._dragStartBtn = null;
      this._dragStartPos = null;
      // Release all on touchend
      if (e.type === 'touchend' || e.type === 'touchcancel') {
        for (const k of Object.keys(this._pressed)) this._pressed[k] = false;
      }
    };
    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onUp);
    canvas.addEventListener('mouseleave', () => { for (const k of Object.keys(this._pressed)) this._pressed[k]=false; this._dragging=null; this._dragStartBtn=null; });
    canvas.addEventListener('touchstart', onDown, {passive:false});
    canvas.addEventListener('touchmove', onMove, {passive:false});
    canvas.addEventListener('touchend', onUp);
    canvas.addEventListener('touchcancel', onUp);
  },

  _getButtons() {
    const scale = Math.min(window.innerWidth / SB.CONFIG.W, window.innerHeight / SB.CONFIG.H);
    const tiny = scale < 0.65; // phone portrait
    const dirW = tiny ? 56 : 72;
    const dirH = tiny ? 42 : 52;
    const actW = tiny ? 72 : 90;
    const actH = tiny ? 42 : 48;
    const gap = tiny ? 3 : 6;
    const margin = tiny ? 4 : 8;
    const row1 = SB.CONFIG.H - dirH - margin; // bottom row
    const row2 = row1 - dirH - gap; // second row for 2P
    const is2P = SB.Scenes._pendingMode === '2P' || (SB.Scenes._data && SB.Scenes._data.player2);

    // P1 controls — stacked on left
    const defs = [
      // D-pad: LEFT + RIGHT side by side on bottom row
      { id:'left',  x: margin, y: row1, w: dirW, h: dirH, label: '◀', color: '#224466', colorPressed: '#112233', player:1 },
      { id:'right', x: margin + dirW + gap, y: row1, w: dirW, h: dirH, label: '▶', color: '#224466', colorPressed: '#112233', player:1 },
      // JUMP above d-pad
      { id:'jump',  x: margin, y: row1 - actH - gap, w: dirW*2 + gap, h: actH, label: 'JUMP', color: '#4488ff', colorPressed: '#2266cc', player:1 },
      // SNOW on right side
      { id:'snow',  x: SB.CONFIG.W - actW - margin, y: row1, w: actW, h: dirH, label: 'SNOW', color: '#88ccff', colorPressed: '#5599cc', player:1 },
      // START top-right
      { id:'start', x: SB.CONFIG.W - actW - margin, y: row1 - actH - gap - actH - gap, w: actW, h: actH, label: 'START', color: '#ff8844', colorPressed: '#cc6622', player:0 },
    ];

    // P2 controls when in co-op — mirrored on right
    if (is2P) {
      const p2x = SB.CONFIG.W - margin - dirW*2 - gap - dirW - gap - actW;
      defs.push(
        { id:'left2',  x: p2x, y: row2, w: dirW, h: dirH, label: '◀', color: '#662222', colorPressed: '#441111', player:2 },
        { id:'right2', x: p2x + dirW + gap, y: row2, w: dirW, h: dirH, label: '▶', color: '#662222', colorPressed: '#441111', player:2 },
        { id:'jump2',  x: p2x, y: row2 - actH - gap, w: dirW*2 + gap, h: actH, label: 'P2 JUMP', color: '#cc4444', colorPressed: '#992222', player:2 },
        { id:'snow2',  x: SB.CONFIG.W - actW - margin, y: row2, w: actW, h: dirH, label: 'P2 SNOW', color: '#ee6666', colorPressed: '#bb3333', player:2 }
      );
    }

    for (const b of defs) {
      if (this._offsets[b.id]) { b.x = this._offsets[b.id].x; b.y = this._offsets[b.id].y; }
    }
    return defs;
  },

  _handlePress(id) {
    if (id === 'jump') {
      SB.Input._keys['ArrowUp'] = true;
      setTimeout(() => { SB.Input._keys['ArrowUp'] = false; }, 80);
    } else if (id === 'snow') {
      SB.Input._keys['KeyX'] = true;
      setTimeout(() => { SB.Input._keys['KeyX'] = false; }, 80);
    } else if (id === 'left') {
      SB.Input._keys['ArrowLeft'] = true;
      setTimeout(() => { SB.Input._keys['ArrowLeft'] = false; }, 80);
    } else if (id === 'right') {
      SB.Input._keys['ArrowRight'] = true;
      setTimeout(() => { SB.Input._keys['ArrowRight'] = false; }, 80);
    } else if (id === 'jump2') {
      SB.Input._keys['KeyW'] = true;
      setTimeout(() => { SB.Input._keys['KeyW'] = false; }, 80);
    } else if (id === 'snow2') {
      SB.Input._keys['KeyE'] = true;
      setTimeout(() => { SB.Input._keys['KeyE'] = false; }, 80);
    } else if (id === 'left2') {
      SB.Input._keys['KeyA'] = true;
      setTimeout(() => { SB.Input._keys['KeyA'] = false; }, 80);
    } else if (id === 'right2') {
      SB.Input._keys['KeyD'] = true;
      setTimeout(() => { SB.Input._keys['KeyD'] = false; }, 80);
    } else if (id === 'start') {
      this._startPressCount++;
      if (this._startPressCount === 1) {
        this._startPressTimer = setTimeout(() => { this._startPressCount = 0; }, 500);
        // Single press = Enter (start game)
        SB.Input._keys['Enter'] = true;
        setTimeout(() => { SB.Input._keys['Enter'] = false; }, 80);
      } else if (this._startPressCount >= 2) {
        clearTimeout(this._startPressTimer);
        this._startPressCount = 0;
        // Double press = restart
        SB.Scenes._data = {};
        SB.Scenes._data.score = 0;
        SB.Scenes._data.floorNum = 1;
        SB.Scenes._data.levelIndex = 0;
        SB.Scenes.switchTo('Playing');
        SB.Audio.ensureCtx();
        SB.Audio.startMusic();
      }
    }
  },

  update() {
    // Directional buttons — held continuously
    if (this._pressed.left)   SB.Input._keys['ArrowLeft'] = true;
    if (this._pressed.right)  SB.Input._keys['ArrowRight'] = true;
    if (this._pressed.left2)  SB.Input._keys['KeyA'] = true;
    if (this._pressed.right2) SB.Input._keys['KeyD'] = true;
    // Action buttons — one-shot but keep held while pressed
    if (this._pressed.jump)   SB.Input._keys['ArrowUp'] = true;
    if (this._pressed.snow)   SB.Input._keys['KeyX'] = true;
    if (this._pressed.jump2)  SB.Input._keys['KeyW'] = true;
    if (this._pressed.snow2)  SB.Input._keys['KeyE'] = true;
  },

  draw(ctx, showJumpSnow, twoPlayer) {
    const btns = this._getButtons();
    for (const b of btns) {
      const isGameBtn = ['jump','snow','left','right','jump2','snow2','left2','right2'].includes(b.id);
      if (!showJumpSnow && isGameBtn) continue;
      if (b.player === 2 && !twoPlayer) continue;
      const pressed = this._pressed[b.id];
      ctx.save();
      // Button shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath(); ctx.roundRect(b.x+2, b.y+2, b.w, b.h, 8); ctx.fill();
      // Button body
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grad.addColorStop(0, pressed ? b.colorPressed : b.color);
      grad.addColorStop(1, pressed ? '#333' : '#222');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 8); ctx.fill();
      ctx.strokeStyle = pressed ? '#fff' : '#555';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 8); ctx.stroke();
      // Label
      ctx.fillStyle = pressed ? '#ffff00' : '#fff';
      ctx.font = 'bold 15px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2 + 5);
      ctx.textAlign = 'start';
      // Pressed indent
      if (pressed) {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath(); ctx.roundRect(b.x+2, b.y+2, b.w-4, b.h/2, 6); ctx.fill();
      }
      // Drag hint — subtle dots at top-right corner
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      for (let r=0;r<2;r++) for (let c=0;c<3;c++) {
        ctx.beginPath(); ctx.arc(b.x+b.w-10+c*4, b.y+6+r*4, 1, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
  },
};

// ============================================================
// AUDIO
// ============================================================
SB.Audio = {
  _ctx: null,
  _masterGain: null,
  _musicGain: null,
  _musicOscs: [],
  _musicTimeout: null,
  _musicNotes: [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25],
  _musicIndex: 0,
  init() {
    try {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { this._ctx = null; return; }
    this._masterGain = this._ctx.createGain();
    this._masterGain.gain.value = 0.3;
    this._masterGain.connect(this._ctx.destination);
    this._musicGain = this._ctx.createGain();
    this._musicGain.gain.value = 0.08;
    this._musicGain.connect(this._masterGain);
  },
  ensureCtx() {
    if (!this._ctx) this.init();
    if (this._ctx && this._ctx.state === 'suspended') this._ctx.resume();
  },
  play(freq, type, duration, vol=0.3, detune=0) {
    if (!this._ctx) return;
    const osc = this._ctx.createOscillator();
    const gain = this._ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    if (detune) osc.detune.value = detune;
    gain.gain.setValueAtTime(vol, this._ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this._masterGain);
    osc.start();
    osc.stop(this._ctx.currentTime + duration);
  },
  sfxThrow() { this.play(600, 'square', 0.1, 0.15); this.play(400, 'sine', 0.08, 0.1); },
  sfxJump() { this.play(200, 'triangle', 0.15, 0.12, 400); },
  sfxFreeze() { this.play(800, 'sawtooth', 0.08, 0.1); },
  sfxCrush() { this.play(100, 'square', 0.3, 0.2); this.play(60, 'sawtooth', 0.4, 0.25); },
  sfxClear() { for(let i=0;i<5;i++) setTimeout(()=>this.play(523+i*100,'sine',0.1,0.15),i*80); },
  sfxPotion() { this.play(1000, 'sine', 0.12, 0.15); this.play(1200, 'sine', 0.1, 0.1); },
  sfxMoney() { this.play(880, 'triangle', 0.06, 0.12); },
  sfxHit() { this.play(150, 'sawtooth', 0.2, 0.2); },
  sfxDeath() { this.play(80, 'sawtooth', 0.5, 0.5); this.play(60, 'square', 0.4, 0.6); },
  sfxBossHit() { this.play(40, 'sawtooth', 0.5, 0.3); this.play(30, 'square', 0.4, 0.4); },
  sfxBossDefeat() {
    for(let i=0;i<8;i++) setTimeout(()=>{this.play(100+i*50,'square',0.15,0.2);this.play(150+i*50,'sine',0.1,0.15);},i*100);
  },
  sfxPumpkin() { this.play(60, 'sawtooth', 0.3, 0.4); this.play(50, 'square', 0.35, 0.5); },
  sfxWarn() { this.play(440, 'square', 0.15, 0.15); },
  sfxTriumph() {
    const notes = [523,659,784,1047];
    notes.forEach((n,i) => setTimeout(() => { this.play(n,'square',0.15,0.15); this.play(n*1.5,'sine',0.1,0.1); }, i*100));
  },
  sfxThunder() {
    // Retro 16-bit thunderclap — noise burst + low rumble
    if (!this._ctx) return;
    const now = this._ctx.currentTime;
    // White noise burst
    const bufferSize = this._ctx.sampleRate * 0.3;
    const buffer = this._ctx.createBuffer(1, bufferSize, this._ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random()*2-1) * Math.exp(-i/(this._ctx.sampleRate*0.08));
    }
    const noise = this._ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = this._ctx.createGain();
    noiseGain.gain.setValueAtTime(0.4, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    noise.connect(noiseGain); noiseGain.connect(this._masterGain);
    noise.start(now); noise.stop(now + 0.3);
    // Low rumble
    const osc = this._ctx.createOscillator();
    const oscGain = this._ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(40, now);
    osc.frequency.exponentialRampToValueAtTime(15, now + 0.4);
    oscGain.gain.setValueAtTime(0.3, now);
    oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc.connect(oscGain); oscGain.connect(this._masterGain);
    osc.start(now); osc.stop(now + 0.4);
  },
  startMusic() {
    if (!this._ctx || this._musicTimeout) return;
    const playNote = () => {
      const note = this._musicNotes[this._musicIndex % this._musicNotes.length];
      const osc = this._ctx.createOscillator();
      const gain = this._ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = note;
      gain.gain.setValueAtTime(0.06, this._ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(this._musicGain);
      osc.start();
      osc.stop(this._ctx.currentTime + 0.3);
      this._musicIndex++;
      this._musicTimeout = setTimeout(playNote, 250);
    };
    playNote();
  },
  playTitleMusic() {
    if (!this._ctx || this._titleMusicTimeout) return;
    this._titleMusicGain = this._ctx.createGain();
    this._titleMusicGain.gain.value = 0.1;
    this._titleMusicGain.connect(this._masterGain);
    // "Frosty the Snowman" melody — notes and timing
    const melody = [
      // "Fros-ty the Snow-man"
      {n:392, d:0.35}, {n:392, d:0.2}, {n:392, d:0.35}, {n:330, d:0.25},
      {n:349, d:0.2}, {n:392, d:0.35}, {n:440, d:0.5},
      // "was a jol-ly hap-py soul"
      {n:392, d:0.25}, {n:349, d:0.2}, {n:330, d:0.25}, {n:294, d:0.2},
      {n:262, d:0.5}, {n:0, d:0.1},
      // "With a corn-cob pipe and a"
      {n:330, d:0.25}, {n:349, d:0.2}, {n:330, d:0.25}, {n:294, d:0.2},
      {n:262, d:0.25}, {n:294, d:0.2}, {n:330, d:0.25},
      // "but-ton nose and"
      {n:392, d:0.25}, {n:349, d:0.2}, {n:330, d:0.25}, {n:294, d:0.2},
      // "two eyes made out of coal!"
      {n:262, d:0.35}, {n:294, d:0.2}, {n:262, d:0.35}, {n:294, d:0.2},
      {n:330, d:0.6}, {n:0, d:0.8}, // pause before loop
    ];
    let time = this._ctx.currentTime;
    for (const {n, d} of melody) {
      if (n > 0) {
        const osc = this._ctx.createOscillator();
        const gain = this._ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = n;
        gain.gain.setValueAtTime(0.08, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + d * 0.9);
        osc.connect(gain); gain.connect(this._titleMusicGain);
        osc.start(time); osc.stop(time + d);
        // Harmony note
        const osc2 = this._ctx.createOscillator();
        const gain2 = this._ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = n * 0.5;
        gain2.gain.setValueAtTime(0.04, time);
        gain2.gain.exponentialRampToValueAtTime(0.001, time + d * 0.9);
        osc2.connect(gain2); gain2.connect(this._titleMusicGain);
        osc2.start(time); osc2.stop(time + d);
      }
      time += d;
    }
    // Schedule loop
    const totalDuration = melody.reduce((s, m) => s + m.d, 0);
    this._titleMusicTimeout = setTimeout(() => {
      this._titleMusicTimeout = null;
      if (SB.Scenes._current === 'Title') this.playTitleMusic();
    }, totalDuration * 1000);
  },
  stopTitleMusic() {
    if (this._titleMusicTimeout) { clearTimeout(this._titleMusicTimeout); this._titleMusicTimeout = null; }
    if (this._titleMusicGain) {
      this._titleMusicGain.gain.setValueAtTime(0.001, this._ctx.currentTime + 0.1);
      setTimeout(() => { if (this._titleMusicGain) { this._titleMusicGain.disconnect(); this._titleMusicGain = null; } }, 200);
    }
  },
  stopMusic() {
    if (this._musicTimeout) { clearTimeout(this._musicTimeout); this._musicTimeout = null; }
  },
};

// ============================================================
// PARTICLES
// ============================================================
SB.Particles = [];
SB.spawnParticles = function(x, y, count, color, speed=80, life=0.5, size=3) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = SB.Utils.rand(speed*0.3, speed);
    SB.Particles.push({
      x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd - spd*0.3,
      life, maxLife: life, size, color
    });
  }
};

// ============================================================
// SPRITE DRAWING
// ============================================================
SB.Sprites = {
  // Player snowman
  drawPlayer(ctx, x, y, w, h, facing, invincible, balloon, character, victoryPose) {
    if (invincible && Math.floor(Date.now()/80)%2) return; // flicker
    const isRay = character === 'ray';
    const overallColor = isRay ? '#3366cc' : '#cc3333'; // Ray=blue, Jay=red
    const overallLight = isRay ? '#5588ee' : '#ee5555';
    const overallDark = isRay ? '#2244aa' : '#aa2222';
    const letter = isRay ? 'R' : 'J';
    ctx.save();
    // Victory pose — jump + fist pump
    const victoryBob = victoryPose ? Math.abs(Math.sin(Date.now()/80)) * 12 : 0;
    const drawY = victoryPose ? y - victoryBob : y;
    if (balloon) {
      // Giant balloon form
      const bx = x + w/2, by = y + h/2;
      const grad = ctx.createRadialGradient(bx, by-10, 10, bx, by, 40);
      grad.addColorStop(0, '#88ff44');
      grad.addColorStop(0.6, '#44cc22');
      grad.addColorStop(1, '#228800');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(bx, by, 28, 36, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#116600';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Eyes
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(bx-8, by-8, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx+8, by-8, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'black';
      ctx.beginPath(); ctx.arc(bx-7, by-8, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx+9, by-8, 2.5, 0, Math.PI*2); ctx.fill();
      // String
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(bx, by-30); ctx.lineTo(bx, by-40); ctx.stroke();
    } else {
      // Victory pose translate
      const dy = drawY - y;
      ctx.translate(0, dy);

      // Body (bright white snowball)
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#aaccff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(x+w/2, y+h-16, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;

      // Victory pose: raised fist-pump arms
      if (victoryPose) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        const armWave = Math.sin(Date.now()/60)*5;
        // Left arm up
        ctx.beginPath(); ctx.moveTo(x+w/2-6, y+h-22); ctx.lineTo(x+w/2-14+armWave, y+h-38); ctx.stroke();
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(x+w/2-14+armWave, y+h-40, 4, 0, Math.PI*2); ctx.fill();
        // Right arm up
        ctx.beginPath(); ctx.moveTo(x+w/2+6, y+h-22); ctx.lineTo(x+w/2+14-armWave, y+h-38); ctx.stroke();
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(x+w/2+14-armWave, y+h-40, 4, 0, Math.PI*2); ctx.fill();
      }

      // Overalls — colored straps over the body
      const bodyCx = x + w/2, bodyCy = y + h - 16;
      // Left strap
      ctx.fillStyle = overallColor;
      ctx.strokeStyle = overallDark;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bodyCx - 9, bodyCy - 14);
      ctx.lineTo(bodyCx - 7, bodyCy - 2);
      ctx.lineTo(bodyCx + 1, bodyCy - 2);
      ctx.lineTo(bodyCx + 1, bodyCy - 14);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Right strap
      ctx.beginPath();
      ctx.moveTo(bodyCx + 1, bodyCy - 14);
      ctx.lineTo(bodyCx + 1, bodyCy - 2);
      ctx.lineTo(bodyCx + 9, bodyCy - 2);
      ctx.lineTo(bodyCx + 7, bodyCy - 14);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Strap highlight
      ctx.fillStyle = overallLight;
      ctx.fillRect(bodyCx - 7, bodyCy - 13, 2, 5);
      ctx.fillRect(bodyCx + 5, bodyCy - 13, 2, 5);
      // Center button
      ctx.fillStyle = '#ffd700';
      ctx.strokeStyle = '#cc9900';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(bodyCx + 1, bodyCy - 8, 2.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      // Letter badge
      ctx.fillStyle = overallColor;
      ctx.strokeStyle = overallDark;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(bodyCx - 6, bodyCy - 10, 14, 12, 3); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(letter, bodyCx + 1, bodyCy - 1);
      ctx.textAlign = 'start';

      // Head
      ctx.strokeStyle = '#aaccff';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(x+w/2, y+10, 12, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      // Hat — brighter
      ctx.fillStyle = '#111';
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.fillRect(x+w/2-10, y-6, 20, 4);
      ctx.fillRect(x+w/2-6, y-18, 12, 14);
      // Eyes
      ctx.fillStyle = '#000';
      const ex = facing > 0 ? 3 : -3;
      ctx.beginPath(); ctx.arc(x+w/2+ex-3, y+7, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+w/2+ex+5, y+7, 2.5, 0, Math.PI*2); ctx.fill();
      // Nose (bright carrot)
      ctx.fillStyle = '#ff6600';
      ctx.strokeStyle = '#ff8800';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x+w/2+ex+12, y+10);
      ctx.lineTo(x+w/2+ex+22, y+12);
      ctx.lineTo(x+w/2+ex+12, y+14);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    ctx.restore();
  },

  // Goblin (neon red)
  drawGoblin(ctx, x, y, w, h, freezePct, facing) {
    ctx.save();
    const f = freezePct / 100;
    // Brighter neon red body
    const r = Math.floor(220*(1-f) + 255*f*0.7);
    const g = Math.floor(30*(1-f) + 200*f*0.7);
    const b = Math.floor(30*(1-f) + 200*f*0.7);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(x+4, y+4, w-8, h-8);
    // White outline for contrast
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(x+3, y+3, w-6, h-6);
    // Snow/freeze overlay
    if (f > 0) {
      ctx.fillStyle = `rgba(200,230,255,${f*0.7})`;
      ctx.fillRect(x+4, y+4, w-8, h-8);
      if (f > 0.6) {
        ctx.fillStyle = `rgba(255,255,255,${f})`;
        for(let i=0;i<3;i++) {
          ctx.beginPath(); ctx.arc(x+6+i*8, y+6+i*5, 3*f, 0, Math.PI*2); ctx.fill();
        }
      }
    }
    // Eyes — glowing yellow
    ctx.fillStyle = '#ffff00';
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 4;
    ctx.fillRect(x+6, y+8, 5, 5);
    ctx.fillRect(x+17, y+8, 5, 5);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.fillRect(x+8, y+10, 2, 2);
    ctx.fillRect(x+19, y+10, 2, 2);
    // Horns
    ctx.fillStyle = '#ff2222';
    ctx.beginPath(); ctx.moveTo(x+6, y+4); ctx.lineTo(x+2, y-5); ctx.lineTo(x+10, y+4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+22, y+4); ctx.lineTo(x+26, y-5); ctx.lineTo(x+18, y+4); ctx.fill();
    ctx.restore();
  },

  // Ninja (neon blue)
  drawNinja(ctx, x, y, w, h, freezePct, tornado) {
    ctx.save();
    const f = freezePct / 100;
    if (tornado) {
      const cx = x + w/2, cy = y + h/2;
      for (let i=0;i<4;i++) {
        const a = Date.now()/80 + i*Math.PI/2;
        ctx.strokeStyle = `hsl(${220+Math.sin(Date.now()/30)*20},100%,${65+f*25}%)`;
        ctx.lineWidth = 4;
        ctx.shadowColor = '#4488ff';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 14, 8, a, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = `rgb(${Math.floor(20*(1-f))},${Math.floor(80*(1-f)+180*f*0.5)},${Math.floor(255*(1-f))})`;
      ctx.fillRect(x+2, y+2, w-4, h-4);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(x+1, y+1, w-2, h-2);
      if (f > 0) {
        ctx.fillStyle = `rgba(200,230,255,${f*0.7})`;
        ctx.fillRect(x+2, y+2, w-4, h-4);
      }
      // Mask
      ctx.fillStyle = '#000';
      ctx.fillRect(x+4, y+6, w-8, 6);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x+7, y+7, 3, 3);
      ctx.fillRect(x+17, y+7, 3, 3);
    }
    ctx.restore();
  },

  // Green Monster (neon green, cheek puff tell)
  drawMonster(ctx, x, y, w, h, freezePct, cheekPuff) {
    ctx.save();
    const f = freezePct / 100;
    const puff = cheekPuff || 0;
    ctx.fillStyle = `rgb(${Math.floor(20*(1-f))},${Math.floor(255*(1-f))},${Math.floor(40*(1-f))})`;
    ctx.beginPath(); ctx.roundRect(x+2, y+2, w-4, h-4, 6); ctx.fill();
    if (f > 0) {
      ctx.fillStyle = `rgba(200,230,255,${f*0.7})`;
      ctx.beginPath(); ctx.roundRect(x+2, y+2, w-4, h-4, 6); ctx.fill();
    }
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(x+1, y+1, w-2, h-2, 6); ctx.stroke();
    // Cheek puff tell — inflating before fire
    if (puff > 0) {
      const puffSize = puff * 20;
      ctx.fillStyle = '#88ff44';
      ctx.beginPath(); ctx.arc(x+6, y+12, 4+puffSize*0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+w-6, y+12, 4+puffSize*0.3, 0, Math.PI*2); ctx.fill();
    }
    // Mouth — glowing red
    ctx.fillStyle = '#ff2200';
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur = 5;
    ctx.fillRect(x+6, y+16, w-12, 8);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    for(let i=0;i<3;i++) ctx.fillRect(x+7+i*6, y+18, 3, 3);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x+8, y+10, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+20, y+10, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x+8, y+10, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+20, y+10, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },

  // Yellow Monkey (neon gold)
  drawMonkey(ctx, x, y, w, h, freezePct) {
    ctx.save();
    const f = freezePct / 100;
    ctx.fillStyle = `rgb(${Math.floor(255*(1-f)+200*f*0.5)},${Math.floor(230*(1-f)+200*f*0.5)},${Math.floor(20*(1-f)+150*f*0.5)})`;
    ctx.fillRect(x+2, y+2, w-4, h-4);
    if (f > 0) {
      ctx.fillStyle = `rgba(200,230,255,${f*0.7})`;
      ctx.fillRect(x+2, y+2, w-4, h-4);
    }
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(x+1, y+1, w-2, h-2);
    // Ears
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.arc(x+4, y+4, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+24, y+4, 5, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x+10, y+10, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+18, y+10, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x+10, y+10, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+18, y+10, 2.5, 0, Math.PI*2); ctx.fill();
    // Tail
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x+24, y+20); ctx.quadraticCurveTo(x+32, y+8, x+28, y+2); ctx.stroke();
    ctx.restore();
  },

  // Yeti (icy white-blue with neon accents)
  drawYeti(ctx, x, y, w, h, freezePct) {
    ctx.save();
    const f = freezePct / 100;
    ctx.fillStyle = `rgb(${Math.floor(220*(1-f)+255*f*0.5)},${Math.floor(220*(1-f)+255*f*0.5)},${Math.floor(255*(1-f))})`;
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill();
    if (f > 0) {
      ctx.fillStyle = `rgba(200,230,255,${f*0.7})`;
      ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill();
    }
    ctx.strokeStyle = '#aaccff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.stroke();
    // Horns — glowing
    ctx.fillStyle = '#aaddff';
    ctx.shadowColor = '#88ccff';
    ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.moveTo(x+6, y); ctx.lineTo(x+2, y-12); ctx.lineTo(x+10, y); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+26, y); ctx.lineTo(x+30, y-12); ctx.lineTo(x+22, y); ctx.fill();
    ctx.shadowBlur = 0;
    // Eyes — glowing red
    ctx.fillStyle = '#ff2222';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(x+8, y+10, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+24, y+10, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Fur texture
    ctx.fillStyle = '#eef';
    for(let i=0;i<4;i++) ctx.fillRect(x+4+i*7, y+18, 4, 3);
    ctx.restore();
  },

  // Potion
  drawPotion(ctx, x, y, w, h, type) {
    ctx.save();
    const colors = { speed:'#ff4444', power:'#4444ff', range:'#ffaa00', invincible:'#44ff44', lightning:'#9944ff', frost:'#44dddd', shield:'#aaddff', blizzard_horn:'#ddeeff' };
    ctx.fillStyle = colors[type] || '#fff';
    ctx.beginPath(); ctx.roundRect(x+2, y+6, w-4, h-6, 4); ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(x+2, y+6, w-4, h-6, 4); ctx.stroke();
    // Bottle neck
    ctx.fillStyle = '#ccc';
    ctx.fillRect(x+6, y, 4, 8);
    ctx.strokeStyle = '#333';
    ctx.strokeRect(x+6, y, 4, 8);
    // Lightning bolt icon — constantly flashing white-hot
    if (type === 'lightning') {
      const boltAlpha = 0.6 + Math.abs(Math.sin(Date.now()/60))*0.4;
      ctx.fillStyle = `rgba(255,255,255,${boltAlpha})`;
      ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8 * boltAlpha;
      ctx.beginPath();
      ctx.moveTo(x+w/2+2, y+8); ctx.lineTo(x+w/2-4, y+14);
      ctx.lineTo(x+w/2, y+14); ctx.lineTo(x+w/2-5, y+22);
      ctx.lineTo(x+w/2+4, y+15); ctx.lineTo(x+w/2, y+15);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0;
    }
    // Glow — hyper-saturated neon-purple crackling for lightning
    ctx.fillStyle = colors[type];
    ctx.globalAlpha = type==='lightning' ? (0.4 + Math.abs(Math.sin(Date.now()/50))*0.5) : (0.3 + Math.sin(Date.now()/200)*0.2);
    ctx.shadowColor = type==='lightning' ? '#9944ff' : 'transparent';
    ctx.shadowBlur = type==='lightning' ? 14 + Math.abs(Math.sin(Date.now()/70))*5 : 0;
    ctx.beginPath(); ctx.arc(x+w/2, y+h/2+3, type==='lightning'?11:8, 0, Math.PI*2); ctx.fill();
    // Secondary inner crackle for lightning
    if (type === 'lightning') {
      ctx.fillStyle = '#ddaaff';
      ctx.globalAlpha = 0.3 + Math.abs(Math.sin(Date.now()/40))*0.3;
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(x+w/2-1, y+h/2+2, 6, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  },

  // Heart item — pulsating crimson + golden border
  drawHeart(ctx, x, y, w, h) {
    ctx.save();
    const t = Date.now()/200;
    const cx = x + w/2, cy = y + h/2;
    const pulse = 1 + Math.sin(t*3)*0.1;
    // Golden shimmer border
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8 + Math.sin(t*2)*3;
    ctx.beginPath();
    const r = w*0.4*pulse;
    ctx.moveTo(cx, cy + r*0.8);
    ctx.bezierCurveTo(cx - r*1.2, cy - r*0.3, cx - r*0.6, cy - r*1.1, cx, cy - r*0.4);
    ctx.bezierCurveTo(cx + r*0.6, cy - r*1.1, cx + r*1.2, cy - r*0.3, cx, cy + r*0.8);
    ctx.fill();
    ctx.strokeStyle = '#daa520';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Crimson heart interior
    const heartGrad = ctx.createRadialGradient(cx-2, cy-3, 1, cx, cy, r);
    heartGrad.addColorStop(0, '#ff3344');
    heartGrad.addColorStop(0.7, '#cc1122');
    heartGrad.addColorStop(1, '#880011');
    ctx.fillStyle = heartGrad;
    ctx.beginPath();
    ctx.moveTo(cx, cy + r*0.7);
    ctx.bezierCurveTo(cx - r*1.0, cy - r*0.2, cx - r*0.5, cy - r*0.9, cx, cy - r*0.3);
    ctx.bezierCurveTo(cx + r*0.5, cy - r*0.9, cx + r*1.0, cy - r*0.2, cx, cy + r*0.7);
    ctx.fill();
    // Highlight shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(cx - r*0.3, cy - r*0.4, r*0.25, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },

  // Money card
  drawMoneyCard(ctx, x, y, w, h) {
    ctx.save();
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = '#b8860b';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('$', x+w/2, y+h-4);
    ctx.restore();
  },

  // Pumpkin ghost
  drawPumpkinGhost(ctx, x, y, w, h) {
    ctx.save();
    const t = Date.now()/150;
    const bob = Math.sin(t)*3;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath(); ctx.arc(x+w/2, y+h/2+bob, w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.arc(x+w/2-4, y+h/2-4+bob, w/4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w/2+4, y+h/2-4+bob, w/4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.arc(x+w/2, y+h/2+4+bob, 5, Math.PI, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = 'yellow';
    ctx.beginPath(); ctx.arc(x+w/2-5, y+h/2-3+bob, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w/2+5, y+h/2-3+bob, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'black';
    ctx.beginPath(); ctx.arc(x+w/2-4, y+h/2-3+bob, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w/2+6, y+h/2-3+bob, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },

  // Snowball projectile (bright white with glow)
  drawSnowball(ctx, x, y, w, h) {
    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(x+w/2, y+h/2, w/2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#aaddff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#eef';
    ctx.beginPath(); ctx.arc(x+w/2-2, y+h/2-2, w/5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },

  // Giant snowball (brighter with glow)
  drawGiantSnowball(ctx, x, y, w, h) {
    ctx.save();
    ctx.shadowColor = '#aaddff';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#f0f8ff';
    ctx.beginPath(); ctx.arc(x+w/2, y+h/2, w/2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#88bbee';
    ctx.lineWidth = 3;
    ctx.stroke();
    // Snow texture
    ctx.fillStyle = '#ffffff';
    for(let i=0;i<4;i++) {
      ctx.beginPath();
      ctx.arc(x+4+i*8, y+4+i*5, w/7, 0, Math.PI*2);
      ctx.fill();
    }
    // Frozen enemy inside
    ctx.fillStyle = 'rgba(180,220,255,0.5)';
    ctx.beginPath(); ctx.arc(x+w/2, y+h/2-2, w/3.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },

  // Boss: Iron Mole (~1/4 screen)
  drawIronMole(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const t = Date.now()/300;
    const cx = x + w/2, cy = y + h/2;
    // Body — metallic oval
    const bodyGrad = ctx.createRadialGradient(cx-5, cy-8, 4, cx, cy, w/2);
    bodyGrad.addColorStop(0, '#888');
    bodyGrad.addColorStop(0.5, '#555');
    bodyGrad.addColorStop(1, '#2a2a2a');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 3;
    ctx.stroke();
    // Drill nose — large spinning cone
    ctx.fillStyle = '#999';
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + w - 5, cy);
    ctx.lineTo(x + w + 18, cy - 10);
    ctx.lineTo(x + w + 18, cy + 10);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Drill ridges
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const ry = cy - 7 + i*5;
      ctx.beginPath(); ctx.moveTo(x + w - 2, ry); ctx.lineTo(x + w + 14, ry - 2); ctx.stroke();
    }
    // Eyes — glowing red
    ctx.fillStyle = '#ff2222';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(cx + w*0.15, cy - h*0.15, 5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // Metal plates
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.arc(cx, cy, w*0.3 + i*6, -0.6, 0.6); ctx.stroke();
    }
    // HP bar
    const hpPct = hp/maxHp;
    const barW = w * 0.8, barX = cx - barW/2, barY = y - 14;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(barX - 1, barY - 1, barW + 2, 8);
    ctx.fillStyle = hpPct > 0.3 ? '#44ff44' : '#ff4444';
    ctx.fillRect(barX, barY, barW * hpPct, 6);
    ctx.restore();
  },

  // Boss: Magma Slime (~1/4 screen)
  drawMagmaSlime(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const t = Date.now()/200;
    const cx = x + w/2, cy = y + h/2;
    // Body — undulating blob
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.moveTo(x, cy);
    ctx.quadraticCurveTo(x - 6, y - 8, cx - w*0.15, y);
    ctx.quadraticCurveTo(cx - w*0.1, y - 14 + Math.sin(t)*4, cx, y - 5);
    ctx.quadraticCurveTo(cx + w*0.1, y - 14 + Math.cos(t)*4, cx + w*0.15, y);
    ctx.quadraticCurveTo(x + w + 6, y - 8, x + w, cy);
    ctx.quadraticCurveTo(x + w + 8, y + h*0.3, x + w*0.85, y + h*0.85);
    ctx.quadraticCurveTo(cx, y + h + 10 + Math.sin(t*1.3)*5, x + w*0.15, y + h*0.85);
    ctx.quadraticCurveTo(x - 8, y + h*0.3, x, cy);
    ctx.fill();
    ctx.strokeStyle = '#aa2200';
    ctx.lineWidth = 3;
    ctx.stroke();
    // Glowing magma spots
    const spots = [
      {sx: cx-w*0.22, sy: cy-h*0.15, r: 7},
      {sx: cx+w*0.25, sy: cy+h*0.05, r: 8},
      {sx: cx-w*0.05, sy: cy+h*0.2, r: 6},
      {sx: cx+w*0.15, sy: cy-h*0.2, r: 6},
      {sx: cx-w*0.18, sy: cy+h*0.25, r: 5},
    ];
    for (const sp of spots) {
      ctx.fillStyle = '#ffaa00';
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(sp.sx, sp.sy, sp.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(sp.sx-1, sp.sy-1, sp.r*0.4, 0, Math.PI*2); ctx.fill();
    }
    // Eyes
    ctx.fillStyle = '#ffff00';
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(cx - w*0.12, cy - h*0.15, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + w*0.12, cy - h*0.15, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(cx - w*0.12, cy - h*0.15, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + w*0.12, cy - h*0.15, 3, 0, Math.PI*2); ctx.fill();
    // HP bar
    const hpPct = hp/maxHp;
    const barW = w * 0.8, barX = cx - barW/2, barY = y - 14;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(barX - 1, barY - 1, barW + 2, 8);
    ctx.fillStyle = hpPct > 0.3 ? '#ff8800' : '#ff0000';
    ctx.fillRect(barX, barY, barW * hpPct, 6);
    ctx.restore();
  },

  // Boss: Thunder Djinn (deep translucent purple + sky-blue electricity)
  drawThunderDjinn(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const t = Date.now()/150;
    // Body — translucent purple gradient
    const grad = ctx.createLinearGradient(x, y, x+w, y+h);
    grad.addColorStop(0, 'rgba(60,20,100,0.85)');
    grad.addColorStop(0.5, 'rgba(100,30,160,0.8)');
    grad.addColorStop(1, 'rgba(50,15,90,0.85)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(x+w/2, y);
    ctx.quadraticCurveTo(x+w+8, y+h/3, x+w, y+h*0.6);
    ctx.quadraticCurveTo(x+w-4, y+h, x+w/2, y+h);
    ctx.quadraticCurveTo(x+4, y+h, x, y+h*0.6);
    ctx.quadraticCurveTo(x-8, y+h/3, x+w/2, y);
    ctx.fill();
    ctx.strokeStyle = '#6644aa';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Sky-blue electric aura — crackling at base
    ctx.strokeStyle = `rgba(100,200,255,${0.4+Math.sin(t)*0.2})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#44bbff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    const baseY = y + h*0.85;
    ctx.moveTo(x+2, baseY);
    for (let i = 0; i < 8; i++) {
      ctx.lineTo(x+5+i*6, baseY + (i%2?10:-10) + Math.sin(t+i)*4);
    }
    ctx.moveTo(x+w-26, y+h*0.5);
    for (let i = 0; i < 6; i++) {
      ctx.lineTo(x+w-24+i*6, y+h*0.5 + (i%2?8:-8) + Math.cos(t+i)*3);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Eyes
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#88ccff';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(x+w*0.35, y+h*0.3, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.65, y+h*0.3, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0066ff';
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(x+w*0.35, y+h*0.3, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.65, y+h*0.3, 2.5, 0, Math.PI*2); ctx.fill();
    // HP bar
    const hpPct = hp/maxHp;
    const barW = w*0.7, barX = x + w*0.15, barY = y - 12;
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#8866ff' : '#ff4444';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // Fire breath
  drawFire(ctx, x, y, w, h) {
    ctx.save();
    const grad = ctx.createLinearGradient(x, y, x+w, y);
    grad.addColorStop(0, '#ff4400');
    grad.addColorStop(0.5, '#ffaa00');
    grad.addColorStop(1, '#ffdd00');
    ctx.fillStyle = grad;
    for(let i=0;i<w;i+=6) {
      const fh = h + Math.sin(Date.now()/50+i)*4;
      ctx.beginPath(); ctx.arc(x+i+3, y+fh/2, 5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  },

  // Fire bomb
  drawFireBomb(ctx, x, y, r) {
    ctx.save();
    const t = Date.now()/100;
    ctx.fillStyle = `hsl(${20+Math.sin(t)*10}, 100%, ${50+Math.sin(t*2)*10}%)`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#aa3300';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath(); ctx.arc(x-2, y-2, r/3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  },

  // Lightning bolt
  drawLightning(ctx, x, y, x2, y2) {
    ctx.save();
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(x, y);
    const midX = (x+x2)/2 + Math.sin(Date.now()/50)*10;
    ctx.lineTo(midX, (y+y2)*0.45);
    ctx.lineTo(midX+5, (y+y2)*0.5);
    ctx.lineTo(midX-3, (y+y2)*0.55);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  },

  // Boss: Cuckoo Clock (twin, medium)
  drawCuckooClock(ctx, x, y, w, h, hp, maxHp, angle, pendLen) {
    ctx.save();
    const cx = x + w/2, cy = y + h*0.35;
    // Clock body — wooden box
    const woodGrad = ctx.createLinearGradient(x, 0, x + w, 0);
    woodGrad.addColorStop(0, '#6b3300');
    woodGrad.addColorStop(0.3, '#8b5500');
    woodGrad.addColorStop(0.7, '#8b5500');
    woodGrad.addColorStop(1, '#5a2200');
    ctx.fillStyle = woodGrad;
    ctx.beginPath(); ctx.roundRect(x + 2, y + 8, w - 4, h - 10, 6); ctx.fill();
    ctx.strokeStyle = '#3a1100';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.roundRect(x + 2, y + 8, w - 4, h - 10, 6); ctx.stroke();
    // Clock face
    ctx.fillStyle = '#ffeedd';
    ctx.beginPath(); ctx.arc(cx, cy - 5, w*0.3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#884400';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Clock numbers
    ctx.fillStyle = '#330000';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    for (let i = 1; i <= 12; i++) {
      const na = (i/12)*Math.PI*2 - Math.PI/2;
      ctx.fillText(i, cx + Math.cos(na)*w*0.22, cy - 5 + Math.sin(na)*w*0.22 + 3);
    }
    // Clock hands
    ctx.strokeStyle = '#220000';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, cy - 5); ctx.lineTo(cx + 4, cy - 14); ctx.stroke();
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, cy - 5); ctx.lineTo(cx - 6, cy - 10); ctx.stroke();
    // Pendulum
    const pivotX = cx, pivotY = cy + w*0.3;
    const tipX = pivotX + Math.sin(angle) * pendLen;
    const tipY = pivotY + Math.cos(angle) * pendLen;
    ctx.strokeStyle = '#664400';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(pivotX, pivotY); ctx.lineTo(tipX, tipY); ctx.stroke();
    // Pendulum weight — sharp blade
    ctx.fillStyle = '#999';
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY - 8);
    ctx.lineTo(tipX + 6, tipY + 8);
    ctx.lineTo(tipX, tipY + 12);
    ctx.lineTo(tipX - 6, tipY + 8);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Roof
    ctx.fillStyle = '#8b4400';
    ctx.beginPath();
    ctx.moveTo(x, y + 10);
    ctx.lineTo(cx, y - 8);
    ctx.lineTo(x + w, y + 10);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#552200';
    ctx.stroke();
    // Eyes — menacing
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.arc(cx - 8, cy - 5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 8, cy - 5, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // HP bar
    const hpPct = hp/maxHp;
    const barW = w*0.7, barX = cx - barW/2, barY = y - 8;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#ffcc00' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 50: Pig King (bright pink + royal-blue cape) --
  drawPigKing(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const cx = x + w/2, cy = y + h/2;
    // Pink body
    ctx.fillStyle = '#ff6699';
    ctx.beginPath(); ctx.ellipse(cx, cy, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#cc4477';
    ctx.lineWidth = 3; ctx.stroke();
    // Royal-blue cape
    ctx.fillStyle = '#2244cc';
    ctx.beginPath();
    ctx.moveTo(x + 4, cy - 5);
    ctx.quadraticCurveTo(cx, cy + h*0.3, x + w - 4, cy - 5);
    ctx.quadraticCurveTo(cx, y + h + 10, x + 4, cy - 5);
    ctx.fill();
    ctx.strokeStyle = '#1133aa'; ctx.lineWidth = 2; ctx.stroke();
    // Crown
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.moveTo(cx-12, y-2); ctx.lineTo(cx-6, y-16);
    ctx.lineTo(cx, y-8); ctx.lineTo(cx+6, y-16); ctx.lineTo(cx+12, y-2);
    ctx.closePath(); ctx.fill();
    // Snout
    ctx.fillStyle = '#ff88aa';
    ctx.beginPath(); ctx.ellipse(cx, cy+4, 8, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff4466'; ctx.beginPath(); ctx.arc(cx-2, cy+3, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+2, cy+3, 2, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx-7, cy-6, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+7, cy-6, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx-6, cy-6, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+8, cy-6, 2, 0, Math.PI*2); ctx.fill();
    // HP bar
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 12;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#44ff44' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 60: Angler Fish (suction + death: eye-pop, inflate, explode) --
  drawAnglerFish(ctx, x, y, w, h, hp, maxHp, mouthOpen, suctionWarning, mouthHitFlash, dying, deathPhase, inflateScale, eyesPopped, flashTimer) {
    ctx.save(); const t = Date.now()/150;
    const cx = x + w/2, cy = y + h/2;
    const scale = inflateScale || 1;
    // Death flash: neon-pink ↔ muddy green
    let bodyColor1 = '#556633', bodyColor2 = '#334422';
    if (dying && flashTimer) {
      const flashCycle = Math.sin(flashTimer * 15);
      if (flashCycle > 0) { bodyColor1 = '#ff44aa'; bodyColor2 = '#ff2299'; }
    }
    // Body — inflating during death phase 1
    const bodyW = (mouthOpen || dying) ? w*0.55*scale : w*0.45*scale;
    const bodyH = h*0.5*scale;
    ctx.save();
    if (dying && deathPhase >= 1) { ctx.translate(cx, cy); ctx.scale(scale, scale); ctx.translate(-cx, -cy); }
    const bGrad = ctx.createRadialGradient(cx-4, cy, 4, cx, cy, bodyW);
    bGrad.addColorStop(0, bodyColor1); bGrad.addColorStop(1, bodyColor2);
    ctx.fillStyle = bGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy, bodyW, bodyH, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#223311'; ctx.lineWidth = 2; ctx.stroke();
    // Eyes — pop out on death!
    if (eyesPopped) {
      const eyeDist = 12 + (deathPhase >= 1 ? 8 : 0);
      for (const side of [-1, 1]) {
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx + side*eyeDist, cy-14, 5 + (deathPhase>=1?3:0), 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx + side*(eyeDist+1), cy-14, 2, 0, Math.PI*2); ctx.fill();
        // Spring lines
        ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx + side*6, cy-8); ctx.lineTo(cx + side*eyeDist, cy-14); ctx.stroke();
      }
    }
    // Lure bulb
    const lureColor = suctionWarning ? '#ff2222' : '#ffffff';
    const lureAlpha = suctionWarning ? (0.7 + Math.sin(t*8)*0.3) : (0.5 + Math.sin(t*5)*0.5);
    ctx.fillStyle = lureColor;
    ctx.globalAlpha = lureAlpha;
    ctx.shadowColor = lureColor;
    ctx.shadowBlur = suctionWarning ? 15 : 10;
    ctx.beginPath(); ctx.arc(cx, y - 4, suctionWarning ? 8 : 6, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    // Antenna
    ctx.strokeStyle = '#556633'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, y-2); ctx.lineTo(cx, y-18); ctx.stroke();
    // Mouth
    if (mouthOpen && !dying) {
      ctx.fillStyle = '#1a0a00';
      ctx.beginPath(); ctx.ellipse(cx, cy+4, w*0.35, h*0.28, 0, 0, Math.PI*2); ctx.fill();
      const coreGlow = mouthHitFlash ? '#ffffff' : '#ff6600';
      ctx.fillStyle = coreGlow;
      ctx.shadowColor = '#ff4400'; ctx.shadowBlur = mouthHitFlash ? 20 : 10;
      ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      for (let i=0;i<7;i++) { const ta = (i/7)*Math.PI-0.3; const tx = cx-w*0.28+i*(w*0.56/6); ctx.fillRect(tx-2, cy-2, 4, 8); }
    } else if (!dying) {
      ctx.fillStyle = '#fff';
      for (let i=0;i<5;i++) ctx.fillRect(x+8+i*8, cy, 3, 5);
    }
    // HP bar
    if (!dying) {
      const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 14;
      ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
      ctx.fillStyle = hpPct > 0.3 ? '#44ff44' : '#ff0000';
      ctx.fillRect(barX, barY, barW*hpPct, 3);
      if (mouthOpen) { ctx.fillStyle = '#ff6600'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center'; ctx.fillText('MOUTH EXPOSED!', cx, barY-6); ctx.textAlign = 'start'; }
    }
    ctx.restore(); ctx.restore();
  },

  // Jellyfish minion for Floor 60
  drawJellyfish(ctx, x, y, w, h, freezePct) {
    ctx.save(); const t = Date.now()/200;
    const cx = x + w/2, cy = y + h/2;
    const f = freezePct / 100;
    // Translucent bell
    ctx.fillStyle = `rgba(180,220,255,${0.5+f*0.3})`;
    ctx.strokeStyle = `rgba(140,200,240,${0.7+f*0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x+2, cy);
    ctx.quadraticCurveTo(cx, y-f*2, x+w-2, cy);
    ctx.quadraticCurveTo(cx, y+h-4, x+2, cy);
    ctx.fill(); ctx.stroke();
    // Tentacles
    ctx.strokeStyle = `rgba(160,210,240,${0.5+f*0.3})`;
    ctx.lineWidth = 1.5;
    for (let i=0;i<4;i++) {
      const tx = x+4+i*7, ty = cy+4;
      ctx.beginPath(); ctx.moveTo(tx, ty);
      ctx.quadraticCurveTo(tx+Math.sin(t+i)*4, ty+8, tx+Math.cos(t+i)*3, ty+14);
      ctx.stroke();
    }
    // Ice overlay
    if (f > 0.3) { ctx.fillStyle = `rgba(200,230,255,${f*0.6})`; ctx.beginPath(); ctx.arc(cx, cy-2, w*0.3, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  },

  // -- FLOOR 70: Gorgon Statue (petrifying lasers + snake minions + cave-in) --
  drawGorgonStatue(ctx, x, y, w, h, hp, maxHp, eyesOpen, phase2, laserBeams, shakeHead) {
    ctx.save(); const t = Date.now()/200;
    const cx = x + w/2, cy = y + h/2;
    // Stone body — mossy slate
    const sGrad = ctx.createLinearGradient(x, 0, x+w, 0);
    sGrad.addColorStop(0, '#667766'); sGrad.addColorStop(0.5, '#889988'); sGrad.addColorStop(1, '#556655');
    ctx.fillStyle = sGrad;
    ctx.fillRect(x+4, y+10, w-8, h-10);
    ctx.strokeStyle = '#445544'; ctx.lineWidth = 2;
    ctx.strokeRect(x+4, y+10, w-8, h-10);
    // Phase 2 cracks
    if (phase2) {
      ctx.strokeStyle = '#334433'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx-10, y+14); ctx.lineTo(cx-2, cy+4); ctx.lineTo(cx+6, y+h-6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+8, y+12); ctx.lineTo(cx+2, cy); ctx.stroke();
    }
    // Moss patches
    ctx.fillStyle = '#448844';
    ctx.beginPath(); ctx.arc(cx-12, cy+8, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+10, cy-5, 5, 0, Math.PI*2); ctx.fill();
    // Snake hair — writhing emerald lines
    ctx.strokeStyle = '#22cc44';
    ctx.lineWidth = 2;
    for (let i=0;i<6;i++) {
      const a = (i/6)*Math.PI-0.3+Math.sin(t+i)*0.3;
      const headShake = shakeHead ? Math.sin(t*15+i)*3 : 0;
      ctx.beginPath(); ctx.moveTo(cx-4+i*4, y+4);
      ctx.quadraticCurveTo(cx-10+i*8, y-12+Math.sin(t*2+i)*4+headShake, cx-8+i*8, y-16+headShake);
      ctx.stroke();
      ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(cx-8+i*8, y-16+Math.sin(t*2+i)*2+headShake, 2, 0, Math.PI*2); ctx.fill();
    }
    // Eyes — closed normally, open for lasers
    if (eyesOpen) {
      ctx.fillStyle = '#ff2222';
      ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(cx-6, cy-4, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+6, cy-4, 4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      // Jaw target indicator
      ctx.fillStyle = 'rgba(255,100,100,0.4)';
      ctx.beginPath(); ctx.arc(cx, y+h*0.78, 5, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle = '#445544'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx-9, cy-4); ctx.lineTo(cx-3, cy-4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+3, cy-4); ctx.lineTo(cx+9, cy-4); ctx.stroke();
    }
    // Laser beams from eyes (drawn externally via laserBeams array)
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 10;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#44ff44' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // Snake minion (crawls along floors)
  drawSnakeMinion(ctx, x, y, w, h, freezePct) {
    ctx.save(); const t = Date.now()/120;
    const cx = x + w/2, cy = y + h/2;
    const f = freezePct / 100;
    // Snake body — emerald green
    ctx.fillStyle = `rgb(${Math.floor(30*(1-f)+200*f*0.5)},${Math.floor(200*(1-f))},${Math.floor(50*(1-f)+200*f*0.5)})`;
    ctx.strokeStyle = '#118833'; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i=0;i<8;i++) {
      const sx = x + 2 + i*3 + Math.sin(t+i)*2;
      const sy = cy + Math.sin(t*2+i)*2;
      if (i===0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke(); ctx.lineWidth = 0;
    // Head
    ctx.fillStyle = '#22cc44';
    ctx.beginPath(); ctx.arc(x+w-4, cy, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(x+w-2, cy-1, 1.5, 0, Math.PI*2); ctx.fill();
    // Ice overlay
    if (f > 0.3) { ctx.fillStyle = `rgba(200,230,255,${f*0.6})`; ctx.beginPath(); ctx.arc(cx, cy-1, w*0.35, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  },

  // -- FLOOR 80: Origami Dragon (stark white paper + background reflection) --
  drawOrigamiDragon(ctx, x, y, w, h, hp, maxHp) {
    ctx.save(); const t = Date.now()/300;
    const cx = x + w/2, cy = y + h/2;
    // Paper body — stark white with fold lines
    ctx.fillStyle = '#f8f8f8';
    ctx.beginPath();
    ctx.moveTo(cx, y);
    ctx.lineTo(x + w, cy - 5);
    ctx.lineTo(cx + w*0.3, y + h);
    ctx.lineTo(x, cy + 8);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 1.5; ctx.stroke();
    // Fold creases
    ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(cx, y+h-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+5, cy+6); ctx.lineTo(x+w-10, cy-4); ctx.stroke();
    // Paper wings
    ctx.fillStyle = '#eeeeee';
    ctx.beginPath(); ctx.moveTo(cx-5, cy-15); ctx.lineTo(x-8, cy-25); ctx.lineTo(x-2, cy-10); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+5, cy-15); ctx.lineTo(x+w+8, cy-25); ctx.lineTo(x+w+2, cy-10); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#cccccc'; ctx.stroke();
    // Eyes — simple black dots
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(cx-6, y+12, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+6, y+12, 2.5, 0, Math.PI*2); ctx.fill();
    // Subtle reflection color bleed
    ctx.fillStyle = 'rgba(100,150,255,0.08)';
    ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(x+w, cy-5); ctx.lineTo(cx+w*0.3, y+h); ctx.closePath(); ctx.fill();
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 10;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#44ff44' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 90: Pharaoh (golden sarcophagus + lapis-lazuli blue bands) --
  drawPharaoh(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const cx = x + w/2, cy = y + h/2;
    // Sarcophagus — golden
    const gGrad = ctx.createLinearGradient(x, 0, x+w, 0);
    gGrad.addColorStop(0, '#bb8800'); gGrad.addColorStop(0.5, '#ffcc44'); gGrad.addColorStop(1, '#bb8800');
    ctx.fillStyle = gGrad;
    ctx.beginPath();
    ctx.moveTo(cx, y);
    ctx.quadraticCurveTo(x-2, cy, x+2, y+h);
    ctx.quadraticCurveTo(cx, y+h+4, x+w-2, y+h);
    ctx.quadraticCurveTo(x+w+2, cy, cx, y);
    ctx.fill();
    ctx.strokeStyle = '#886600'; ctx.lineWidth = 2; ctx.stroke();
    // Lapis-lazuli bands
    ctx.fillStyle = '#2244cc';
    ctx.fillRect(x+4, cy-6, w-8, 6);
    ctx.fillRect(x+4, cy+10, w-8, 6);
    ctx.strokeStyle = '#1133aa'; ctx.lineWidth = 1; ctx.strokeRect(x+4, cy-6, w-8, 6);
    ctx.strokeRect(x+4, cy+10, w-8, 6);
    // Gold stripes on bands
    ctx.fillStyle = '#ffd700';
    for (let i=0;i<3;i++) ctx.fillRect(x+8+i*16, cy-5, 4, 4);
    for (let i=0;i<3;i++) ctx.fillRect(x+8+i*16, cy+11, 4, 4);
    // Eyes — painted on
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(cx-6, cy-14, 5, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+6, cy-14, 5, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx-5, cy-14, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+7, cy-14, 2, 0, Math.PI*2); ctx.fill();
    // Nemes headdress stripes
    ctx.fillStyle = '#2244cc';
    ctx.fillRect(cx-2, y, 4, 16);
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 12;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#ffcc00' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 100: Mech-Spider (polished crimson shell + glowing red eyes) --
  drawMechSpider(ctx, x, y, w, h, hp, maxHp) {
    ctx.save(); const t = Date.now()/200;
    const cx = x + w/2, cy = y + h/2;
    // Crimson body
    const mGrad = ctx.createRadialGradient(cx, cy-4, 4, cx, cy, w/2);
    mGrad.addColorStop(0, '#ff3344'); mGrad.addColorStop(0.7, '#cc1122'); mGrad.addColorStop(1, '#880011');
    ctx.fillStyle = mGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.45, h*0.45, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#ff5566'; ctx.lineWidth = 2; ctx.stroke();
    // Mechanical legs — 6 legs
    ctx.strokeStyle = '#992233'; ctx.lineWidth = 2;
    for (let i=0;i<6;i++) {
      const la = (i/6)*Math.PI*2 + t*0.5;
      const lx = cx + Math.cos(la)*w*0.35, ly = cy + Math.sin(la)*h*0.3;
      ctx.beginPath(); ctx.moveTo(lx, ly);
      ctx.lineTo(lx + Math.cos(la)*18, ly + Math.sin(la)*18 + 8);
      ctx.stroke();
      // Joint
      ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(lx+Math.cos(la)*9, ly+Math.sin(la)*9, 2, 0, Math.PI*2); ctx.fill();
    }
    // Glowing eyes
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(cx-7, cy-8, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+7, cy-8, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-2, cy-10, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+2, cy-10, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 14;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#ff4444' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 110: Toybox Jester (checkered white + hot pink) --
  drawJester(ctx, x, y, w, h, hp, maxHp) {
    ctx.save(); const t = Date.now()/180;
    const cx = x + w/2, cy = y + h/2;
    // Body — checkered
    const sq = 8;
    for (let row = 0; row < Math.ceil(h/sq); row++) {
      for (let col = 0; col < Math.ceil(w/sq); col++) {
        ctx.fillStyle = (row+col)%2===0 ? '#ffffff' : '#ff44aa';
        ctx.fillRect(x+col*sq, y+8+row*sq, sq, sq);
      }
    }
    // Clipped to body shape
    ctx.globalCompositeOperation = 'destination-in';
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(cx, cy+2, w/2, h/2.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = '#cc2288'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(cx, cy+2, w/2, h/2.2, 0, 0, Math.PI*2); ctx.stroke();
    // Jester hat — three points
    ctx.fillStyle = '#ff44aa';
    ctx.beginPath(); ctx.moveTo(cx-14, y-4); ctx.lineTo(cx-10, y-16); ctx.lineTo(cx-2, y-4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx-4, y-4); ctx.lineTo(cx, y-20); ctx.lineTo(cx+4, y-4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+2, y-4); ctx.lineTo(cx+10, y-14); ctx.lineTo(cx+14, y-4); ctx.closePath(); ctx.fill();
    // Bell
    ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(cx, y-18, 3, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx-5, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+5, cy-6, 3, 0, Math.PI*2); ctx.fill();
    // Grin
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy+2, 7, 0.2, Math.PI-0.2); ctx.stroke();
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 8;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#ff44aa' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 120: Black Hole Core (deep violet vortex + pitch-black center) --
  drawBlackHole(ctx, x, y, w, h, hp, maxHp) {
    ctx.save(); const t = Date.now()/200;
    const cx = x + w/2, cy = y + h/2;
    // Outer vortex rings
    for (let r = 4; r >= 0; r--) {
      const rad = w*0.5 - r*6;
      const alpha = 0.1 + r*0.08;
      ctx.strokeStyle = `hsla(${270+r*15+Math.sin(t+r)*10}, 80%, ${30+r*10}%, ${alpha})`;
      ctx.lineWidth = 2 + r*0.5;
      ctx.beginPath(); ctx.arc(cx, cy, rad, t*(0.3+r*0.2), t*(0.3+r*0.2)+Math.PI*1.8); ctx.stroke();
    }
    // Pitch-black center
    const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, w*0.2);
    cGrad.addColorStop(0, '#000000'); cGrad.addColorStop(0.8, '#0a0015'); cGrad.addColorStop(1, 'rgba(20,0,40,0)');
    ctx.fillStyle = cGrad;
    ctx.beginPath(); ctx.arc(cx, cy, w*0.2, 0, Math.PI*2); ctx.fill();
    // Accretion glow
    ctx.fillStyle = 'rgba(80,20,120,0.3)';
    ctx.beginPath(); ctx.arc(cx, cy, w*0.35, 0, Math.PI*2); ctx.fill();
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 12;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#8844cc' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 130: Nebula Phoenix (cosmic magenta + cyan gradients, stardust) --
  drawNebulaPhoenix(ctx, x, y, w, h, hp, maxHp) {
    ctx.save(); const t = Date.now()/250;
    const cx = x + w/2, cy = y + h/2;
    // Wing gradients
    for (const side of [-1, 1]) {
      const wGrad = ctx.createLinearGradient(cx, cy-side*10, cx+side*w*0.7, cy-side*20);
      wGrad.addColorStop(0, '#ff22aa'); wGrad.addColorStop(0.5, '#8822ff'); wGrad.addColorStop(1, '#22ccff');
      ctx.fillStyle = wGrad;
      ctx.beginPath();
      ctx.moveTo(cx, cy-8);
      ctx.quadraticCurveTo(cx+side*w*0.4, cy-h*0.45, cx+side*w*0.6, cy-5);
      ctx.quadraticCurveTo(cx+side*w*0.4, cy+8, cx, cy+8);
      ctx.fill();
    }
    // Body
    const bGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, w*0.25);
    bGrad.addColorStop(0, '#ff44cc'); bGrad.addColorStop(1, '#8811aa');
    ctx.fillStyle = bGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy, w*0.25, h*0.3, 0, 0, Math.PI*2); ctx.fill();
    // Stardust trail
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i=0;i<8;i++) {
      const sx = cx + Math.cos(t*2+i)*w*0.4, sy = cy+6 + Math.sin(t+i)*4 + i*3;
      ctx.beginPath(); ctx.arc(sx, sy, 1.5+Math.sin(t+i)*0.8, 0, Math.PI*2); ctx.fill();
    }
    // Eyes
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx-5, cy-5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+5, cy-5, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx-5, cy-5, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+5, cy-5, 1.5, 0, Math.PI*2); ctx.fill();
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 12;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#ff44cc' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },

  // -- FLOOR 140: Gemini Constellation (twin warriors: gold + silver) --
  drawGeminiGold(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const cx = x + w/2, cy = y + h/2;
    const gGrad = ctx.createLinearGradient(x, 0, x+w, 0);
    gGrad.addColorStop(0, '#ffcc00'); gGrad.addColorStop(0.5, '#ffd700'); gGrad.addColorStop(1, '#aa8800');
    ctx.fillStyle = gGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#886600'; ctx.lineWidth = 3; ctx.stroke();
    // Star emblem
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(cx, cy-8); ctx.lineTo(cx+3, cy-2); ctx.lineTo(cx+9, cy-1);
    ctx.lineTo(cx+4, cy+3); ctx.lineTo(cx+5, cy+9); ctx.lineTo(cx, cy+5);
    ctx.lineTo(cx-5, cy+9); ctx.lineTo(cx-4, cy+3); ctx.lineTo(cx-9, cy-1);
    ctx.lineTo(cx-3, cy-2); ctx.closePath(); ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx-5, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+5, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx-5, cy-6, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+5, cy-6, 1.5, 0, Math.PI*2); ctx.fill();
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 10;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#ffd700' : '#ff0000';
    ctx.fillRect(barX, barY, barW*hpPct, 3);
    ctx.restore();
  },
  drawGeminiSilver(ctx, x, y, w, h, hp, maxHp) {
    ctx.save();
    const cx = x + w/2, cy = y + h/2;
    const sGrad = ctx.createLinearGradient(x, 0, x+w, 0);
    sGrad.addColorStop(0, '#cccccc'); sGrad.addColorStop(0.5, '#eeeeee'); sGrad.addColorStop(1, '#999999');
    ctx.fillStyle = sGrad;
    ctx.beginPath(); ctx.ellipse(cx, cy, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#666666'; ctx.lineWidth = 3; ctx.stroke();
    // Moon emblem
    ctx.fillStyle = '#ddd';
    ctx.beginPath(); ctx.arc(cx+2, cy-3, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#999'; ctx.beginPath(); ctx.arc(cx+4, cy-4, 5, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx-5, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+5, cy-6, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx-5, cy-6, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+5, cy-6, 1.5, 0, Math.PI*2); ctx.fill();
    const hpPct = hp/maxHp, barW = w*0.7, barX = cx - barW/2, barY = y - 10;
    ctx.fillStyle = '#111'; ctx.fillRect(barX-1, barY-1, barW+2, 5);
    ctx.fillStyle = hpPct > 0.3 ? '#cccccc' : '#ff0000';
