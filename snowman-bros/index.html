    if (d.player.frostAura) { ctx.fillStyle = '#44dddd'; ctx.fillText('❄FROST', px, 22); px += 60; }
    if (d.player.shieldActive) { ctx.fillStyle = '#aaddff'; ctx.fillText('🛡', px, 22); px += 30; }
    if (d.player.combo > 1) { ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 13px monospace'; ctx.fillText(`${d.player.combo.toFixed(1)}x`, px, 22); }
    if (d.player.ultraStarMode) {
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 13px monospace';
      ctx.fillText(`★ULTRA ${Math.ceil(d.player.ultraStarTimer)}s`, 640, 22);
    }

    // King Blizzard warning
    if (d.boss && d.boss instanceof SB.KingBlizzard && d.boss.alive) {
      if (d.boss.blizzardActive && d.boss.blizzardWarning > 0) {
        const warnAlpha = 0.5 + Math.sin(Date.now()/100)*0.5;
        ctx.fillStyle = `rgba(255,50,50,${warnAlpha})`;
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('⚠ BLIZZARD! FIND COVER! ⚠', SB.CONFIG.W/2, SB.CONFIG.H - 20);
        ctx.textAlign = 'start';
      }
      // Phase indicator
      ctx.fillStyle = d.boss.phase === 2 ? '#ff4444' : '#ffaa00';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`PHASE ${d.boss.phase}`, SB.CONFIG.W/2, SB.CONFIG.H - 40);
      ctx.textAlign = 'start';
    }

    // Lava level indicator
    if (d.hasLava) {
      const lavaPct = Math.max(0, Math.min(100, Math.round((1 - d.lavaLevel/SB.CONFIG.H)*100)));
      ctx.fillStyle = '#ff4400';
      ctx.font = 'bold 11px monospace';
      ctx.fillText(`LAVA: ${lavaPct}%`, 700, SB.CONFIG.H - 10);
    }

    // Trained monster timer
    if (d.trainedMonster && d.trainedMonster.alive) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 12px monospace';
      ctx.fillText(`TRAINED ${Math.ceil(d.trainedMonster.duration)}s`, 10, SB.CONFIG.H - 30);
    }

    // Pumpkin warning
    if (d.timer <= 30 && d.timer > 0 && !d.pumpkinGhost) {
      const warnAlpha = 0.5 + Math.sin(Date.now()/200) * 0.5;
      ctx.fillStyle = `rgba(255,100,0,${warnAlpha})`;
      ctx.font = 'bold 12px monospace';
      ctx.fillText('⚠ PUMPKIN SOON!', 10, SB.CONFIG.H - 10);
    }
    ctx.textAlign = 'start';
  },

  _renderGameOver(ctx) {
    const t = Date.now() / 1000;
    ctx.fillStyle = '#050108';
    ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
    ctx.shadowColor = '#ff2222';
    ctx.shadowBlur = 25;
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 42px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', SB.CONFIG.W/2, 220);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'white';
    ctx.font = '18px monospace';
    ctx.fillText(`Final Score: ${this._data.score || 0}`, SB.CONFIG.W/2, 270);
    ctx.fillText(`Floor Reached: ${(this._data.levelIndex||0)+1}`, SB.CONFIG.W/2, 300);
    const alpha = 0.5 + Math.sin(t * 3) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = 'bold 16px monospace';
    ctx.fillText('PRESS ENTER TO RETRY', SB.CONFIG.W/2, 400);
    ctx.textAlign = 'start';
  },

  _renderVictory(ctx) {
    const t = Date.now() / 1000;
    // Dark violet victory background
    ctx.fillStyle = '#050110';
    ctx.fillRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
    // Rainbow particle celebration
    for (let i = 0; i < 30; i++) {
      const px = (i * 173 + Math.sin(t + i) * 30) % SB.CONFIG.W;
      const py = (i * 137 + t * 40) % SB.CONFIG.H;
      ctx.fillStyle = `hsl(${(t*60+i*30)%360},80%,60%)`;
      ctx.globalAlpha = 0.3 + (i%5)*0.1;
      ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('YOU WIN!', SB.CONFIG.W/2, 200);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'white';
    ctx.font = '18px monospace';
    ctx.fillText(`Final Score: ${this._data.score || 0}`, SB.CONFIG.W/2, 260);
    ctx.fillText('All bosses defeated!', SB.CONFIG.W/2, 295);
    ctx.fillText('The Treasure of The Snowmans is yours!', SB.CONFIG.W/2, 325);
    const alpha = 0.5 + Math.sin(t * 3) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = 'bold 16px monospace';
    ctx.fillText('PRESS ENTER FOR TITLE', SB.CONFIG.W/2, 420);
    ctx.textAlign = 'start';
  },
};

// ============================================================
// GAME LOOP
// ============================================================
SB.Game = {
  _lastTime: 0,
  _accumulator: 0,
  _fixedDt: 1/60,

  start() {
    const canvas = document.getElementById('game');
    canvas.width = SB.CONFIG.W;
    canvas.height = SB.CONFIG.H;
    // Responsive sizing for mobile
    const resize = () => {
      const maxW = window.innerWidth;
      const maxH = window.innerHeight;
      const scale = Math.min(maxW / SB.CONFIG.W, maxH / SB.CONFIG.H);
      canvas.style.width = (SB.CONFIG.W * scale) + 'px';
      canvas.style.height = (SB.CONFIG.H * scale) + 'px';
    };
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 100));
    this._ctx = canvas.getContext('2d');
    this._ctx.imageSmoothingEnabled = false;

    SB.Input.init();
    SB.TouchButtons.init(canvas);
    SB.Audio.init();
    SB.Scenes.switchTo('Title');
    // Start title music on first user interaction
    const startTitleMusic = () => {
      SB.Audio.ensureCtx();
      SB.Audio.playTitleMusic();
      window.removeEventListener('click', startTitleMusic);
      window.removeEventListener('keydown', startTitleMusic);
    };
    window.addEventListener('click', startTitleMusic);
    window.addEventListener('keydown', startTitleMusic);
    this._lastTime = performance.now();
    requestAnimationFrame(t => this._loop(t));
  },

  _loop(timestamp) {
    let frameDt = (timestamp - this._lastTime) / 1000;
    this._lastTime = timestamp;
    if (frameDt > 0.1) frameDt = 0.1; // cap

    this._accumulator += frameDt;
    while (this._accumulator >= this._fixedDt) {
      SB.Input.update();
      SB.TouchButtons.update();

      // Update particles
      for (const p of SB.Particles) {
        p.life -= this._fixedDt;
        p.x += p.vx * this._fixedDt;
        p.y += p.vy * this._fixedDt;
      }
      SB.Particles = SB.Particles.filter(p => p.life > 0);

      SB.Scenes.update(this._fixedDt);
      this._accumulator -= this._fixedDt;
    }

    const alpha = this._accumulator / this._fixedDt;
    const ctx = this._ctx;
    ctx.clearRect(0, 0, SB.CONFIG.W, SB.CONFIG.H);
    SB.Scenes.render(ctx, alpha);

    requestAnimationFrame(t => this._loop(t));
  },
};

// ============================================================
// BOOTSTRAP
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  SB.Game.start();
});
</script>
