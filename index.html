<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, must-revalidate">
<title>Retro Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:system-ui,sans-serif;padding:20px}
h1{text-align:center;font-size:36px;margin-bottom:4px;background:linear-gradient(90deg,#ff6644,#ffaa44,#ff6644);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#888;font-size:12px;margin-bottom:30px;letter-spacing:2px;text-transform:uppercase}
.games{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:1000px;margin:0 auto}
.card{width:220px;background:#111;border:2px solid #333;border-radius:10px;overflow:hidden;text-decoration:none;color:#fff;transition:all .2s;display:block}
.card:hover{border-color:#ff6644;transform:translateY(-4px)}
.card .img{height:100px;display:flex;align-items:center;justify-content:center;font-size:44px}
.card .txt{padding:10px}
.card .txt h3{font-size:14px;margin-bottom:3px}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;margin:1px}
.bg-pop{background:#44cc44;color:#000}.bg-new{background:#44aaff;color:#fff}.bg-off{background:#ffaa44;color:#000}
footer{text-align:center;color:#444;font-size:11px;margin-top:30px;padding-top:16px;border-top:1px solid #1a1a1a}
</style>
</head>
<body>
<h1>🕹️ Retro Games</h1>
<p class="subtitle">Free Browser Games — No Downloads — No Sign-Ups — Works Offline — 3 Games</p>
<div class="games">
<a class="card" href="snowman-bros/"><div class="img" style="background:linear-gradient(135deg,#0a1628,#1a3a5a)">⛄</div><div class="txt"><h3>Snowman Bros</h3><span class="badge bg-off">Offline</span></div></a>
<a class="card" href="elemental-merge/"><div class="img" style="background:linear-gradient(135deg,#1a1a2e,#16213e)">🌊🔥</div><div class="txt"><h3>Elemental Merge</h3><span class="badge bg-pop">POPULAR</span><span class="badge bg-off">Offline</span></div></a><a class="card" href="dragon-flight/"><div class="img" style="background:linear-gradient(135deg,#1a0a0a,#4a1a1a)">🐉</div><div class="txt"><h3>Dragon Flight</h3><span class="badge bg-off">Offline</span></div></a>
</div>
<footer>Retro Games &copy; 2026 — Play free, anywhere, no WiFi needed. 2 games and growing!</footer>
</body>
</html>
