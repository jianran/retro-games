<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Bug Blaster ✈️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <span id="score">Score: 0</span>
      <span id="gems-display">💎 0</span>
      <span id="power-display">Power: ★☆☆☆</span>
      <span id="lives-display">❤️❤️❤️</span>
      <span id="bomb-display">💣 --</span>
      <span id="spray-display">🦟💨 --</span>
    </div>
    <div id="game-area">
      <div id="player" class="plane pwr1">✈️</div>
      <div id="boss-bar" class="hidden">
        <div id="boss-name"></div>
        <div id="boss-bar-track"><div id="boss-bar-fill"></div></div>
      </div>
    </div>
    <div id="overlay">
      <div class="overlay-content">
        <h1 id="overlay-title">Sky Bug Blaster</h1>
        <p id="overlay-sub">Shoot bugs · Collect gems · Survive!</p>
        <p id="final-score"></p>
        <button id="action-btn">Start Game</button>
        <div class="instructions">
          <p>WASD / Arrow Keys — move</p>
          <p>SPACE — shoot</p>
          <p>B — BOMB (every 50 pts)</p>
          <p>M — SPRAY (every 60 s · kills all 🦟 · +100 pts)</p>
          <p>💎 10 gems → P2 &nbsp;|&nbsp; 25 → P3 &nbsp;|&nbsp; 50 → P4</p>
        </div>
      </div>
    </div>
  </div>
  <script src="dist/game.js"></script>
</body>
</html>
